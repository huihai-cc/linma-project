<!DOCTYPE html>

<head>
    <script>
  // --- 社内访问简易锁逻辑 ---
  (function() {
    // 【在这里设置你的真实密码】
    const MY_PASSWORD = "huihai2026！"; 
    
    // qc_tool_access 是存储在浏览器里的标识符，用来记住你已经登录过
    const storageKey = 'qc_tool_access';
    const isAuthorized = localStorage.getItem(storageKey);

    if (isAuthorized !== MY_PASSWORD) {
      const userInput = prompt("请输入社内专用访问密码：");
      
      if (userInput === MY_PASSWORD) {
        // 密码正确，在浏览器存个证明，下次不用再输
        localStorage.setItem(storageKey, MY_PASSWORD);
      } else {
        // 密码错误，清空页面并停止加载
        alert("密码错误，禁止访问！");
        document.write("<div style='color:red; text-align:center; margin-top:100px;'><h1>403 Forbidden</h1><p>非法访问，请联系管理员获取密码。</p></div>");
        window.stop(); // 停止后续资源加载
        throw new Error("Unauthorized Access");
      }
    }
  })();
</script>

<header>
    <h1>🔍 惠海用比较工具</h1>
    <span class="badge">🔒 完全本地运行</span>
</header>

<div class="page-sticky" id="page-sticky">
    <div class="tab-bar">
        <button class="tab-btn active" id="tab-diff"  onclick="switchTab('diff')">🔍 逐行比对</button>
        <button class="tab-btn"        id="tab-sort"  onclick="switchTab('sort')">🔤 升序比对</button>
        <button class="tab-btn"        id="tab-full"  onclick="switchTab('full')">🔎 包含关系比对</button>
        <button class="tab-btn"        id="tab-check" onclick="switchTab('check')">🔬 符号检查</button>
    </div>

    <!-- 逐行比对 -->
    <div class="tab-panel active" id="panel-diff">
        <div class="input-area">
            <div class="clean-info" id="clean-info-diff"></div>
            <div class="input-row">
                <div>
                    <div class="input-label">📄 文本 A（原文）<span class="label-tip"></span></div>
                    <textarea id="ta-diff" placeholder="请粘贴文本A..."></textarea>
                </div>
                <div>
                    <div class="input-label">📄 文本 B（对照）</div>
                    <textarea id="tb-diff" placeholder="请粘贴文本B..."></textarea>
                </div>
            </div>
        </div>
        <div class="controls">
            <button class="btn-diff"    onclick="runLineDiff()">🔍 开始比对（Ctrl+Enter）</button>
            <button class="btn-clear"   onclick="clearDiff()">🗑️ 清空</button>
            <button class="btn-export"  id="btn-exp-diff"     onclick="exportDiff()">💾 导出HTML</button>
            <button class="btn-hide-eq" id="btn-hide-eq-diff" onclick="toggleHideEq('diff')">🧹 隐藏一致行</button>
            <button class="btn-show-eq" id="btn-show-eq-diff" onclick="toggleShowEq('diff')">👁 显示全部行</button>
            <div class="opt-group">
                <label class="opt-item"><input type="checkbox" id="o-case-diff"> 忽略大小写</label>
                <label class="opt-item"><input type="checkbox" id="o-inv-diff" checked> 显示隐藏字符</label>
                <label class="opt-item"><input type="checkbox" id="o-fold-diff"> 折叠相同行</label>
            </div>
        </div>
        <div class="stats" id="stats-diff"></div>
        <div class="nav-bar" id="nav-bar-diff">
            <button class="btn-nav" onclick="navDiff(-1)">⬆ 上一个差异</button>
            <div class="nav-info">差异 <span class="nav-counter" id="nav-cur-diff">0</span> / <span class="nav-counter" id="nav-tot-diff">0</span></div>
            <button class="btn-nav" onclick="navDiff(1)">下一个差异 ⬇</button>
            <span style="color:#bdc3c7;font-size:0.78rem;">点击快速跳转到差异位置</span>
        </div>
    </div>

    <!-- 升序比对 -->
    <div class="tab-panel" id="panel-sort">
        <div class="input-area">
            <div class="sort-info-box">🔤 升序比对：两边内容分别自动排序后再比较差异</div>
            <div class="clean-info" id="clean-info-sort"></div>
            <div class="input-row">
                <div>
                    <div class="input-label">📄 列表 A<span class="label-tip">每行一个项目，自动升序排列后比对</span></div>
                    <textarea id="ta-sort" placeholder="请粘贴列表A..."></textarea>
                    <div class="sort-preview" id="preview-sort-a">排序预览：粘贴内容后显示</div>
                </div>
                <div>
                    <div class="input-label">📄 列表 B<span class="label-tip">每行一个项目，自动升序排列后比对</span></div>
                    <textarea id="tb-sort" placeholder="请粘贴列表B..."></textarea>
                    <div class="sort-preview" id="preview-sort-b">排序预览：粘贴内容后显示</div>
                </div>

function cleanText(raw){
    const removed=new Set(); let out='';
    for(let i=0;i<raw.length;i++){
        const code=raw.charCodeAt(i),ch=raw[i];
        if(code>=0xE000&&code<=0xF8FF){removed.add(`U+${code.toString(16).toUpperCase().padStart(4,'0')}(PDF)`);continue;}
        const rm=[0x200B,0x200C,0x200D,0xFEFF,0x2060,0x00AD,0x034F,0x180E,0x202A,0x202B,0x202C,0x202D,0x202E,0x2066,0x2067,0x2068,0x2069,0xFFFD];
        if(rm.includes(code)){removed.add(`U+${code.toString(16).toUpperCase().padStart(4,'0')}`);continue;}
        if(code===0x00A0){removed.add('NBSP->space');out+=' ';continue;}
        if(code===0x000D)continue;
        out+=ch;
    }
    return{text:out,removed:[...removed]};
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
const INV_MAP={'\u00A0':'NBSP','\u200B':'ZWS','\u200C':'ZWNJ','\u200D':'ZWJ','\uFEFF':'BOM','\u2060':'WJ','\u3000':'全','\u0009':'TAB','\u000D':'CR'};
function isInv(ch){return !!INV_MAP[ch]||(ch.charCodeAt(0)<32&&ch!=='\n');}
function invLabel(ch){return INV_MAP[ch]||'U+'+ch.charCodeAt(0).toString(16).toUpperCase().padStart(4,'0');}

function myersDiff(a,b){
    const N=a.length,M=b.length,MAX=N+M;
    if(!MAX)return[];
    const V=new Int32Array(2*MAX+2),trace=[];
    outer:for(let d=0;d<=MAX;d++){
        trace.push(V.slice());
        for(let k=-d;k<=d;k+=2){
            const ki=k+MAX;
            let x=(k===-d||(k!==d&&V[ki-1]<V[ki+1]))?V[ki+1]:V[ki-1]+1,y=x-k;
            while(x<N&&y<M&&a[x]===b[y]){x++;y++;}
            V[ki]=x;if(x>=N&&y>=M)break outer;
        }
    }
    const ops=[];let x=N,y=M;
    for(let d=trace.length-1;d>=0;d--){
        const Vd=trace[d],k=x-y,ki=k+MAX;
        const prevK=(k===-d||(k!==d&&Vd[ki-1]<Vd[ki+1]))?k+1:k-1;
        const prevX=Vd[prevK+MAX],prevY=prevX-prevK;
        while(x>prevX&&y>prevY){ops.unshift({t:'eq',x:x-1,y:y-1});x--;y--;}
        if(d>0){if(x===prevX){ops.unshift({t:'ins',x:prevX,y:prevY});y--;}else{ops.unshift({t:'del',x:prevX,y:prevY});x--;}}
    }
    return ops;
}

function buildBlocks(ops, lA, lB){
    const blocks=[]; let i=0;
    while(i<ops.length){
        const op=ops[i];
        if(op.t==='eq'){
            // ★ 即使key相同，原始内容不同（如有ZWS）也标为mod
            if(lA[op.x] === lB[op.y]){
                blocks.push({t:'eq', la:lA[op.x], lb:lB[op.y]});
            } else {
                blocks.push({t:'mod', la:lA[op.x], lb:lB[op.y]});
            }
            i++;
        }
        else if(op.t==='del'&&i+1<ops.length&&ops[i+1].t==='ins'){
            blocks.push({t:'mod', la:lA[op.x], lb:lB[ops[i+1].y]});
            i+=2;
        }
        else if(op.t==='del'){
            blocks.push({t:'del', la:lA[op.x], lb:null});
            i++;
        }
        else{
            blocks.push({t:'ins', la:null, lb:lB[op.y]});
            i++;
        }
    }
    return blocks;
}

function buildBlocksAligned(lA,lB,nA,nB){
    const maxLen=Math.max(lA.length,lB.length);
    const blocks=[];
    for(let i=0;i<maxLen;i++){
        const hasA=i<lA.length;
        const hasB=i<lB.length;
        if(!hasA){
            blocks.push({t:'ins',la:null,lb:lB[i]});
        }else if(!hasB){
            blocks.push({t:'del',la:lA[i],lb:null});
        }else if(nA[i]===nB[i]){
            blocks.push({t:'eq',la:lA[i],lb:lB[i]});
        }else{
            blocks.push({t:'mod',la:lA[i],lb:lB[i]});
        }
    }
    return blocks;
}

function buildBlocksNoMod(ops,lA,lB){
    return ops.map(op=>{
        if(op.t==='eq')return{t:'eq',la:lA[op.x],lb:lB[op.y]};
        if(op.t==='del')return{t:'del',la:lA[op.x],lb:null};
        return{t:'ins',la:null,lb:lB[op.y]};
    });
}

function renderLine(text,showInv){

}

function sortCharDiff(a,b){
    const ac=[...a],bc=[...b],N=ac.length,M=bc.length;
    if(N>600||M>600)return{left:`<span class="sort-only-a">${esc(a)}</span>`,right:`<span class="sort-only-b">${esc(b)}</span>`};
    const dp=Array.from({length:N+1},()=>new Uint16Array(M+1));
    for(let i=1;i<=N;i++)for(let j=1;j<=M;j++)dp[i][j]=ac[i-1]===bc[j-1]?dp[i-1][j-1]+1:Math.max(dp[i-1][j],dp[i][j-1]);
    const lOps=[],rOps=[];let i=N,j=M;
    while(i>0||j>0){
        if(i>0&&j>0&&ac[i-1]===bc[j-1]){lOps.unshift({t:'eq',c:ac[i-1]});rOps.unshift({t:'eq',c:bc[j-1]});i--;j--;}
        else if(j>0&&(i===0||dp[i][j-1]>=dp[i-1][j])){rOps.unshift({t:'diff',c:bc[j-1]});j--;}
        else{lOps.unshift({t:'diff',c:ac[i-1]});i--;}
    }
    function render(ops,hlClass){
        let html='',buf='',inHL=false;
        const flush=()=>{if(!buf)return;html+=inHL?`<span class="${hlClass}">${buf}</span>`:buf;buf='';};
        for(const op of ops){const isDiff=op.t==='diff';if(isDiff!==inHL){flush();inHL=isDiff;}buf+=esc(op.c);}
        flush();return html;
    }
    return{left:render(lOps,'sort-hl-a'),right:render(rOps,'sort-hl-b')};
}

function rowClass(t){return t==='eq'?'row-eq':t==='ins'?'row-add':t==='del'?'row-del':'row-mod';}

function buildTr(b,no,showInv){
    const tr=document.createElement('tr');
    tr.className=rowClass(b.t);
    if(b.t==='eq'){
    const cL=showInv?renderLine(b.la,true):esc(b.la);
    const cR=showInv?renderLine(b.lb,true):esc(b.lb);
    tr.innerHTML=`<td class="td-num">${no}</td><td class="td-left">${cL}</td><td class="td-right">${cR}</td>`;
    }else if(b.t==='ins'){
        const rc=showInv?renderLine(b.lb,true):esc(b.lb);
        tr.innerHTML=`<td class="td-num">${no}</td><td class="td-left">&nbsp;</td><td class="td-right">+&nbsp;${rc}</td>`;
    }else if(b.t==='del'){
        const lc=showInv?renderLine(b.la,true):esc(b.la);
        tr.innerHTML=`<td class="td-num">${no}</td><td class="td-left">-&nbsp;${lc}</td><td class="td-right">&nbsp;</td>`;
    }else{
    // ★ 先用renderLine渲染不可见字符，再在此基础上做字符差异高亮
    const laClean = b.la.replace(/[\u200B\u200C\u200D\uFEFF\u2060\u00AD\u034F\u180E\u202A\u202B\u202C\u202D\u202E\u2066\u2067\u2068\u2069\uFFFD]/g,'');
    const lbClean = b.lb.replace(/[\u200B\u200C\u200D\uFEFF\u2060\u00AD\u034F\u180E\u202A\u202B\u202C\u202D\u202E\u2066\u2067\u2068\u2069\uFFFD]/g,'');
    
    if(laClean === lbClean){
        // ★ 只有ZWS等不可见字符不同 → 直接用renderLine显示，不做字符diff
        const cL = showInv ? renderLine(b.la, true) : esc(b.la);
        const cR = showInv ? renderLine(b.lb, true) : esc(b.lb);
        tr.innerHTML=`<td class="td-num">${no}</td><td class="td-left">${cL}</td><td class="td-right">${cR}</td>`;
    } else {
        // ★ 普通内容差异 → 用sortCharDiff做字符级高亮
        const res=sortCharDiff(b.la, b.lb);
        tr.innerHTML=`<td class="td-num">${no}</td><td class="td-left">${res.left}</td><td class="td-right">${res.right}</td>`;
    }
}
    return tr;
}

function initNav(tab){
    diffRows=[];navIndex=-1;
    // 先从DOM找（直接渲染模式）
    document.querySelectorAll('#diff-out .row-add,#diff-out .row-del,#diff-out .row-mod').forEach(r=>diffRows.push(r));
    
    // 如果DOM里没找到，从blocks数据里统计数量（虚拟滚动模式）
    const vs=vsState[tab];
    let totalDiff=diffRows.length;
    if(totalDiff===0 && vs && vs.blocks.length>0){
        totalDiff=vs.blocks.filter(b=>b.t==='ins'||b.t==='del'||b.t==='mod').length;
    }
    
    const nb=document.getElementById('nav-bar-'+tab);
    if(totalDiff>0){
        document.getElementById('nav-bar-'+tab).classList.add('show');
        document.getElementById('nav-tot-'+tab).textContent=totalDiff;
        document.getElementById('nav-cur-'+tab).textContent=0;
    } else {
        document.getElementById('nav-bar-'+tab).classList.remove('show');
    }
}

function initNavSort(){
    diffRows=[];navIndex=-1;
    document.querySelectorAll('#diff-out .row-sort-diff').forEach(r=>diffRows.push(r));
    const nb=document.getElementById('nav-bar-sort');
    if(diffRows.length>0){nb.classList.add('show');document.getElementById('nav-tot-sort').textContent=diffRows.length;document.getElementById('nav-cur-sort').textContent=0;}
    else nb.classList.remove('show');
}

function navDiff(dir){
    const vs=vsState[currentTab];
    if(vs && vs.blocks.length>0 && diffRows.length===0){
        // 虚拟滚动模式不变
        const diffBlocks=[];
        vs.blocks.forEach((b,i)=>{if(b.t==='ins'||b.t==='del'||b.t==='mod')diffBlocks.push(i);});
        if(!diffBlocks.length)return;
        if(navIndex<0)navIndex=-1;
        navIndex=(navIndex+dir+diffBlocks.length)%diffBlocks.length;
        const blockIdx=diffBlocks[navIndex];
        const container=vs.container;
        if(container){
            const ROW_H=30;
            const scrollTarget=blockIdx*ROW_H - container.clientHeight/2;
            container.scrollTo({top:Math.max(0,scrollTarget),behavior:'smooth'});
        }
        const cur=document.getElementById('nav-cur-'+currentTab);
        if(cur)cur.textContent=navIndex+1;
        document.getElementById('nav-tot-'+currentTab).textContent=diffBlocks.length;
        return;
    }

    if(!diffRows.length)return;

    // 清除上一个高亮
    if(navIndex>=0&&navIndex<diffRows.length){
        const prevRow=diffRows[navIndex];
        prevRow.classList.remove('diff-focus');
        if(prevRow._focusCell){
            prevRow._focusCell.style.outline='';
            prevRow._focusCell.style.outlineOffset='';
            prevRow._focusCell.style.boxShadow='';
            prevRow._focusCell=null;
        }
    }

    navIndex=(navIndex+dir+diffRows.length)%diffRows.length;
    const target=diffRows[navIndex];

    // ★ 锁定到差异单元格
    let focusCell=null;
    if(target.classList.contains('row-del')){
        focusCell=target.querySelector('td.td-left');
    } else if(target.classList.contains('row-add')){
        focusCell=target.querySelector('td.td-right');
    } else if(target.classList.contains('row-mod')){
        focusCell=target.querySelector('td.td-left');
    }

    if(focusCell){
        focusCell.style.outline='3px solid #f39c12';
        focusCell.style.outlineOffset='-2px';
        focusCell.style.boxShadow='0 0 10px rgba(243,156,18,0.8)';
        focusCell.scrollIntoView({behavior:'smooth',block:'center'});
        target._focusCell=focusCell;
    } else {
        target.classList.add('diff-focus');
        target.scrollIntoView({behavior:'smooth',block:'center'});
    }

    const cur=document.getElementById('nav-cur-'+currentTab);
    if(cur)cur.textContent=navIndex+1;
}

function toggleHideEq(tab){eqHidden[tab]=true;_applyEq(tab);}
function toggleShowEq(tab){eqHidden[tab]=false;_applyEq(tab);}
function _applyEq(tab){
    const h=eqHidden[tab];
    if(tab==='sort'){const vs=vsState['sort'];if(vs.blocks.length>0)renderSortResult(vs.blocks);}
    else{
        document.querySelectorAll('#diff-out .row-eq').forEach(r=>r.classList.toggle('hidden-eq',h));

function renderResult(tab,blocks,showInv){
    const vs=vsState[tab];vs.blocks=blocks;vs.showInv=showInv;
    const visible=eqHidden[tab]?blocks.filter(b=>b.t!=='eq'):blocks;
    if(visible.length<=VS_THRESHOLD)_renderDirect(visible,showInv,tab);
    else _renderVirtual(tab,visible,showInv);
}

function _renderDirect(blocks,showInv,tab){
    if(blocks.every(b=>b.t==='eq')){document.getElementById('diff-out').innerHTML='<div class="no-diff">✅ 无差异 — 两个文本完全相同</div>';return;}
    const wrap=document.getElementById('diff-out');
    wrap.innerHTML=`<table class="diff-table"><thead><tr><th class="th-num">行号</th><th class="th-left">◀ 文本 A</th><th class="th-right">▶ 文本 B</th></tr></thead><tbody id="dt-body"></tbody></table>`;
    const tbody=document.getElementById('dt-body');
    let idx=0,no=0;
    function batch(){
        const end=Math.min(idx+500,blocks.length);
        const frag=document.createDocumentFragment();
        for(;idx<end;idx++){no++;frag.appendChild(buildTr(blocks[idx],no,showInv));}
        tbody.appendChild(frag);
        if(idx<blocks.length)requestAnimationFrame(batch);
        else requestAnimationFrame(()=>initNav(tab));
    }
    batch();
}

function _renderVirtual(tab,visible,showInv){
    const ROW_H=30,totalH=visible.length*ROW_H;
    const wrap=document.getElementById('diff-out');
    wrap.innerHTML=`<div class="vs-scroll-wrap" id="vs-scroll-${tab}"><table class="vscroll-table" style="table-layout:fixed;"><colgroup><col style="width:56px"><col style="width:50%"><col style="width:50%"></colgroup><thead><tr><th class="th-num">行号</th><th class="th-left">◀ 文本 A</th><th class="th-right">▶ 文本 B</th></tr></thead><tbody id="vs-tbody-${tab}"><tr id="vs-top-${tab}"><td colspan="3" style="height:0;padding:0;border:none;"></td></tr><tr id="vs-bot-${tab}"><td colspan="3" style="height:${totalH}px;padding:0;border:none;"></td></tr></tbody></table></div>`;
    const container=document.getElementById('vs-scroll-'+tab);
    vsState[tab].container=container;
    container._v=visible;container._rh=ROW_H;container._rendered={start:-1,end:-1};container._si=showInv;container._tab=tab;
    let pending=false;
    container.addEventListener('scroll',()=>{if(pending)return;pending=true;requestAnimationFrame(()=>{_vsRender(container);pending=false;});});
    _vsRender(container);requestAnimationFrame(()=>initNav(tab));
}

function _vsRerender(tab){
    const vs=vsState[tab];
    const visible=eqHidden[tab]?vs.blocks.filter(b=>b.t!=='eq'):vs.blocks;
    if(visible.length<=VS_THRESHOLD){_renderDirect(visible,vs.showInv,tab);return;}
    _renderVirtual(tab,visible,vs.showInv);
}

function _vsRender(c){
    const v=c._v,ROW_H=c._rh,si=Math.max(0,Math.floor(c.scrollTop/ROW_H)-VS_BUFFER);
    const ei=Math.min(v.length-1,Math.ceil((c.scrollTop+c.clientHeight)/ROW_H)+VS_BUFFER);
    if(c._rendered.start===si&&c._rendered.end===ei)return;
    c._rendered={start:si,end:ei};
    const tab=c._tab,tbody=document.getElementById('vs-tbody-'+tab);
    tbody.querySelectorAll('tr.vs-row').forEach(r=>r.remove());
    document.getElementById('vs-top-'+tab).firstElementChild.style.height=(si*ROW_H)+'px';
    document.getElementById('vs-bot-'+tab).firstElementChild.style.height=Math.max(0,(v.length-1-ei)*ROW_H)+'px';
    const frag=document.createDocumentFragment(),bot=document.getElementById('vs-bot-'+tab);
    for(let i=si;i<=ei;i++){const tr=buildTr(v[i],i+1,c._si);tr.classList.add('vs-row');frag.appendChild(tr);}
    tbody.insertBefore(frag,bot);
}

// 升序比对
function sortLines(text,ignCase,trimOn,emptyOn){
    let lines=text.replace(/\r\n/g,'\n').replace(/\r/g,'\n').split('\n');
    if(trimOn)lines=lines.map(l=>l.trim());
    if(emptyOn)lines=lines.filter(l=>l.length>0);
    return lines.sort((a,b)=>{const ca=ignCase?a.toLowerCase():a,cb=ignCase?b.toLowerCase():b;return ca.localeCompare(cb,'ja');});
}

function renderSortResult(blocks){
    if(blocks.every(b=>b.t==='eq')){document.getElementById('diff-out').innerHTML='<div class="no-diff">✅ 无差异 — 两个列表完全相同</div>';return;}
    const rows=[];let i=0;
    while(i<blocks.length){
        const b=blocks[i];
        if(b.t==='eq'){rows.push({t:'eq',la:b.la,lb:b.lb});i++;}
        else{
            const dels=[],inss=[];
            while(i<blocks.length&&blocks[i].t==='del'){dels.push(blocks[i].la);i++;}
            while(i<blocks.length&&blocks[i].t==='ins'){inss.push(blocks[i].lb);i++;}
            const maxLen=Math.max(dels.length,inss.length);
            for(let j=0;j<maxLen;j++)rows.push({t:'diff',la:j<dels.length?dels[j]:null,lb:j<inss.length?inss[j]:null});
        }
    }
    const visible=eqHidden['sort']?rows.filter(r=>r.t!=='eq'):rows;
    const wrap=document.getElementById('diff-out');
    wrap.innerHTML=`<table class="diff-table"><thead><tr><th class="th-num">行号</th><th class="th-left">◀ 列表 A</th><th class="th-right">▶ 列表 B</th></tr></thead><tbody id="sort-tbody"></tbody></table>`;
    const tbody=document.getElementById('sort-tbody');
    let idx=0,no=0;
    function batch(){
        const end=Math.min(idx+500,visible.length);
        const frag=document.createDocumentFragment();
        for(;idx<end;idx++){
            const r=visible[idx];no++;
            const tr=document.createElement('tr');
            if(r.t==='eq'){
                tr.className='row-eq';
                tr.innerHTML=`<td class="td-num">${no}</td><td class="td-left">${esc(r.la)}</td><td class="td-right">${esc(r.la)}</td>`;
            }else{
                tr.className='row-sort-diff';
                let lHtml='',rHtml='';
                if(r.la!==null&&r.lb!==null){const res=sortCharDiff(r.la,r.lb);lHtml=res.left;rHtml=res.right;}
                else if(r.la!==null)lHtml=`<span class="sort-only-a">${esc(r.la)}</span>`;
                else rHtml=`<span class="sort-only-b">${esc(r.lb)}</span>`;
                const numStyle=r.la!==null&&r.lb!==null?'background:#cc6600;color:white;font-weight:bold;':r.la!==null?'background:#cc0000;color:white;font-weight:bold;':'background:#00b300;color:white;font-weight:bold;';
                tr.innerHTML=`<td class="td-num" style="${numStyle}">${no}</td><td class="td-left sort-cell">${lHtml}</td><td class="td-right sort-cell">${rHtml}</td>`;
            }
            frag.appendChild(tr);
        }
        tbody.appendChild(frag);
        if(idx<visible.length)requestAnimationFrame(batch);
        else requestAnimationFrame(initNavSort);
    }
    batch();
}

// 包含关系比对
function runFullDiff(){
    const rawA=document.getElementById('ta-full').value;
    const rawB=document.getElementById('tb-full').value;
    const cA=cleanText(rawA),cB=cleanText(rawB);
    const ignCase=document.getElementById('o-case-full').checked;
    const showInv=document.getElementById('o-inv-full').checked;
    const lineMode=document.getElementById('o-line-full').checked;
    const tabExtractA=document.getElementById('o-tab-extract-a')?document.getElementById('o-tab-extract-a').checked:false;
    const tabExtractB=document.getElementById('o-tab-extract-b')?document.getElementById('o-tab-extract-b').checked:false;

    function extractAfterTab(text){
        return text.split('\n').map(line=>{
            const lastTab=line.lastIndexOf('\t');
            return lastTab!==-1?line.substring(lastTab+1).trim():line;
        }).filter(l=>l.length>0).join('\n');
    }
    function extractBeforeTab(text){
        return text.split('\n').map(line=>{
            const firstTab=line.indexOf('\t');
            return firstTab!==-1?line.substring(0,firstTab).trim():line;
        }).filter(l=>l.length>0).join('\n');
    }

    const textA=tabExtractA?extractAfterTab(cA.text):cA.text;
    const textB=tabExtractB?extractAfterTab(cB.text):cB.text;

    if(lineMode){runLineContainCheck(cA.text,cB.text,ignCase);return;}
    runTabSplitCheck(cA.text,cB.text,ignCase);return;
}

function runTabSplitCheck(textA, textB, ignCase) {
    const normalize = s => s.normalize('NFC');

    const rawLinesA = normalize(textA).replace(/\r\n/g,'\n').replace(/\r/g,'\n').split('\n').filter(l=>l.trim());
    const rawLinesB = normalize(textB).replace(/\r\n/g,'\n').replace(/\r/g,'\n').split('\n').filter(l=>l.trim());

    function splitWords(line){
        return line.split(/[\t\s,，;；]+/).map(s=>s.trim()).filter(s=>s);
    }

    // 两侧都拆词
    const wordsA = [];
    rawLinesA.forEach((line, lineIdx) => {
        splitWords(line).forEach(w =>
            wordsA.push({ text:w, lineIdx, status:'del' })
        );
    });

    const wordsB = [];
    rawLinesB.forEach((line, lineIdx) => {
        splitWords(line).forEach(w =>
            wordsB.push({ text:w, lineIdx, status:'ins' })
        );
    });

    // 判断平均词长，决定方向
    // 平均词长长的那侧是"长文本侧"，短的是"关键词侧"
    const avgLenA = wordsA.reduce((s,w)=>s+w.text.length,0) / (wordsA.length||1);
    const avgLenB = wordsB.reduce((s,w)=>s+w.text.length,0) / (wordsB.length||1);

    // shortWords：短词列表（关键词）
    // longLines：长行列表（包含关键词的长文本）
    // 短词去长行里找子串
    const aIsShort = avgLenA <= avgLenB;

    const shortWords = aIsShort ? wordsA : wordsB;  // 关键词侧
    const longWords  = aIsShort ? wordsB : wordsA;  // 长文本侧

    // 长文本侧：重建为行结构，带字符级锁定
    const rawLinesShort = aIsShort ? rawLinesA : rawLinesB;
    const rawLinesLong  = aIsShort ? rawLinesB : rawLinesA;

    const longLines = rawLinesLong.map((text, lineIdx) => ({
        text,
        lineIdx,
        comp: ignCase ? text.toLowerCase() : text,
        lockedRanges: []
    }));

    function isOverlap(ranges, s, e){
        return ranges.some(r => s < r.end && e > r.start);
    }

    // 短词优先按长度排序，依次在长行里找子串
    const sortedShortIdx = shortWords.map((_,i)=>i)
        .sort((a,b) => shortWords[b].text.length - shortWords[a].text.length);

    sortedShortIdx.forEach(si => {
        const sw = shortWords[si];
        const cs = ignCase ? sw.text.toLowerCase() : sw.text;
        if(!cs) return;

        for(let li=0; li<longLines.length; li++){
            const slot = longLines[li];

            // 方向1：短词 是 长行 的子串
            let from=0, found=-1;
            while(from <= slot.comp.length - cs.length){
                const pos = slot.comp.indexOf(cs, from);
                if(pos===-1) break;
                if(!isOverlap(slot.lockedRanges, pos, pos+cs.length)){
                    found=pos; break;
                }
                from=pos+1;
            }
            if(found!==-1){
                slot.lockedRanges.push({start:found, end:found+cs.length, swIdx:si});
                sw.status='eq';
                return;
            }

            // 方向2：长行 是 短词 的子串（极少见，兜底）
            if(!isOverlap(slot.lockedRanges,0,slot.comp.length)){
                if(cs.includes(slot.comp)){
                    slot.lockedRanges.push({start:0, end:slot.comp.length, swIdx:si});
                    sw.status='eq';
                    return;
                }
            }
        }
    });

    // 统计
    const eqCount    = shortWords.filter(w=>w.status==='eq').length;
    const delCount   = shortWords.filter(w=>w.status==='del').length;
    const longUnmatched = longLines.filter(l=>l.lockedRanges.length===0).length;

    const st = document.getElementById('stats-full');
    st.innerHTML = `<span>包含关系对比：</span>
        <span class="tag" style="background:#b8ffb8;color:#004400;border:1px solid #00aa00;">✅ 一致 <b>${eqCount}</b> 个</span>
        <span class="tag" style="background:#ffd0d0;color:#660000;border:1px solid #cc0000;">❌ 仅A有 <b>${aIsShort ? delCount : longUnmatched}</b> 个</span>
        <span class="tag" style="background:#b2f0f0;color:#004444;border:1px solid #00aaaa;">⚠ 仅B有 <b>${aIsShort ? longUnmatched : delCount}</b> 个</span>
        <span style="font-size:0.78rem;color:#888;">A共<b>${wordsA.length}</b>词／B共<b>${wordsB.length}</b>词</span>`;
    st.classList.add('show');

    // ===== 建立对应关系 =====
    // longLine[li] 匹配到了哪些短词的原始行（shortLineIdx）
    // 同时，shortLine[si] 对应了哪个 longLine
    const longToShortLines = longLines.map(() => new Set()); // li → Set of shortLineIdx
    const shortLineMatched = new Map(); // shortLineIdx → li

    longLines.forEach((slot, li) => {
        slot.lockedRanges.forEach(r => {
            const sw = shortWords[r.swIdx];
            longToShortLines[li].add(sw.lineIdx);
            shortLineMatched.set(sw.lineIdx, li);
        });
    });

    // 短词侧未匹配的行
    const shortLinesAll = [...new Set(shortWords.map(w=>w.lineIdx))].sort((a,b)=>a-b);
    const unmatchedShortLines = shortLinesAll.filter(li => !shortLineMatched.has(li));

    // ===== 构建对齐行对 =====
    // 每个pair = { longIdx: li | null, shortLineIdxSet: Set | null }
    const pairs = [];
    const usedLongIdx = new Set();
    const usedShortLineIdx = new Set();

    longLines.forEach((slot, li) => {
        const matchedShortSet = longToShortLines[li];
        pairs.push({ longIdx: li, shortLineIdxSet: matchedShortSet });
        usedLongIdx.add(li);
        matchedShortSet.forEach(si => usedShortLineIdx.add(si));
    });

    // 短词侧多出的行（无对应长文本行）→ 加空行
    shortLinesAll.forEach(si => {
        if(!usedShortLineIdx.has(si)){
            pairs.push({ longIdx: null, shortLineIdxSet: new Set([si]) });
        }
    });

    // ===== 渲染单个短词行 =====
    function renderOneShortLine(lineIdx){
        const lw = shortWords.filter(w=>w.lineIdx===lineIdx);
        if(!lw.length) return '&nbsp;';
        let html = '';
        lw.forEach((w,i)=>{
            if(i>0) html+=' ';
            if(w.status==='eq'){
                html+='<span style="color:#333;">'+esc(w.text)+'</span>';
            } else {
                html+='<span style="background:#ffd0d0;color:#cc0000;'
                    +'border-radius:3px;padding:1px 4px;font-weight:bold;">'
                    +esc(w.text)+'</span>';
            }
        });
        return html;
    }

    // ===== 渲染单个长文本行 =====
    function renderOneLongLine(li){
        if(li === null) return '&nbsp;';
        const slot = longLines[li];
        const chars=[...slot.text];
        const ranges=[...slot.lockedRanges].sort((a,b)=>a.start-b.start);
        const hasMatch=ranges.length>0;

        let lineHtml='', pos=0;
        if(!hasMatch){
            lineHtml='<span style="background:#b2f0f0;color:#004444;font-weight:bold;">'
                    +esc(slot.text)+'</span>';
        } else {
            ranges.forEach(r=>{
                if(r.start>pos){
                    lineHtml+='<span style="background:#b2f0f0;color:#004444;">'
                            +esc(chars.slice(pos,r.start).join(''))+'</span>';
                }
                lineHtml+='<span style="color:#333;">'
                        +esc(chars.slice(r.start,r.end).join(''))+'</span>';
                pos=r.end;
            });
            if(pos<chars.length){
                lineHtml+='<span style="background:#b2f0f0;color:#004444;">'
                        +esc(chars.slice(pos).join(''))+'</span>';
            }
        }
        return lineHtml;
    }

    // ===== 逐行对齐渲染 =====
    let tbodyHtml = '';
    pairs.forEach(pair => {
        // 短词侧：可能对应多个短词行（合并显示）
        let shortCellHtml = '';
        if(pair.shortLineIdxSet && pair.shortLineIdxSet.size > 0){
            [...pair.shortLineIdxSet].sort((a,b)=>a-b).forEach((si, i) => {
                if(i > 0) shortCellHtml += '<hr style="border:none;border-top:1px dashed #eee;margin:2px 0;">';
                shortCellHtml += renderOneShortLine(si);
            });
        } else {
            shortCellHtml = '<span style="color:#ccc;font-size:0.75rem;">（无对应行）</span>';
        }

        // 长文本侧
        const longCellHtml = renderOneLongLine(pair.longIdx);
        const slot = pair.longIdx !== null ? longLines[pair.longIdx] : null;
        const hasMatch = slot && slot.lockedRanges.length > 0;
        const longBg = slot === null ? '#f9f9f9' : hasMatch ? 'white' : '#e8f8ff';
        const longBorderL = slot === null ? '' : hasMatch ? '' : 'border-left:3px solid #00aaaa;';

        // 根据aIsShort决定左右
        const leftHtml  = aIsShort ? shortCellHtml : longCellHtml;
        const rightHtml = aIsShort ? longCellHtml  : shortCellHtml;
        const leftBg    = aIsShort ? 'white'       : longBg;
        const rightBg   = aIsShort ? longBg        : 'white';
        const leftBorderL  = aIsShort ? '' : longBorderL;
        const rightBorderL = aIsShort ? longBorderL : '';

        tbodyHtml += `
        <tr style="border-bottom:1px solid #eee;">
            <td style="padding:6px 14px;border-right:2px solid #ddd;
                       vertical-align:top;background:${leftBg};${leftBorderL}
                       word-break:break-all;font-family:'Courier New',monospace;
                       font-size:0.85rem;line-height:2;">
                ${leftHtml}
            </td>
            <td style="padding:6px 14px;
                       vertical-align:top;background:${rightBg};${rightBorderL}
                       word-break:break-all;font-family:'Courier New',monospace;
                       font-size:0.85rem;line-height:2;">
                ${rightHtml}
            </td>
        </tr>`;
    });

    const leftLabel  = aIsShort
        ? '◀ 文本 A（红色=B中未找到）'
        : '◀ 文本 A（蓝色=B中没有的内容）';
    const rightLabel = aIsShort
        ? '▶ 文本 B（蓝色=A中没有的内容）'
        : '▶ 文本 B（红色=A中未找到）';

    document.getElementById('diff-out').innerHTML=`
    <div style="background:white;border:1px solid #bbb;border-radius:4px;overflow:hidden;">
        <table style="width:100%;border-collapse:collapse;">
            <thead>
                <tr>
                    <th style="background:#c8e6ff;color:#1a3a6a;padding:8px 14px;
                               text-align:left;border-bottom:2px solid #bbb;width:50%;
                               position:sticky;top:0;z-index:5;">
                        ${leftLabel}
                    </th>
                    <th style="background:#e8f8e8;color:#1a4a1a;padding:8px 14px;
                               text-align:left;border-bottom:2px solid #bbb;width:50%;
                               position:sticky;top:0;z-index:5;">
                        ${rightLabel}
                    </th>
                </tr>
            </thead>
            <tbody>${tbodyHtml}</tbody>
        </table>
    </div>`;

    document.getElementById('diff-wrap').classList.add('show');
    document.getElementById('btn-exp-full').style.display='inline-block';

    // 导航
    diffRows=[]; navIndex=-1;
    requestAnimationFrame(()=>{
        document.querySelectorAll(
            '#diff-out span[style*="ffd0d0"], #diff-out td[style*="e8f8ff"]'
        ).forEach(el=>diffRows.push(el));
        const nb=document.getElementById('nav-bar-full');
        if(diffRows.length>0){
            nb.classList.add('show');
            document.getElementById('nav-tot-full').textContent=diffRows.length;
            document.getElementById('nav-cur-full').textContent=0;
        } else {
            nb.classList.remove('show');
        }
    });

}  // ← 这个大括号是 runTabSplitCheck 的结束，必须存在

// 逐行包含检查
function runLineContainCheck(textA, textB, ignCase){

    const tabExtractA = document.getElementById('o-tab-extract-a') ?
                        document.getElementById('o-tab-extract-a').checked : false;

    const normalize = s => s.normalize('NFC');
    const linesB = normalize(textB).replace(/\r\n/g,'\n').replace(/\r/g,'\n').split('\n').filter(l=>l.trim());

    // ===== TAB分列模式 =====
    if(tabExtractA){
        const rawLinesA = normalize(textA).replace(/\r\n/g,'\n').replace(/\r/g,'\n').split('\n').filter(l=>l.trim());

        let foundCount=0, notFoundCount=0;

        let tableHtml = `
        <table style="width:100%;border-collapse:collapse;
                       font-family:'Courier New',monospace;font-size:0.85rem;">
        <thead><tr>
            <th style="background:#c8e6ff;color:#1a3a6a;padding:8px 14px;
                       text-align:left;border-bottom:2px solid #bbb;width:30%;">
                ◀ 列表 A
            </th>
            <th style="background:#e8f8e8;color:#1a4a1a;padding:8px 14px;
                       text-align:left;border-bottom:2px solid #bbb;width:70%;">
                ▶ 文本 B（匹配到的行）
            </th>
        </tr></thead><tbody>`;

        rawLinesA.forEach(line => {
            // 拆分TAB前后
            const tabIdx = line.indexOf('\t');
            const beforeTab = tabIdx !== -1 ? line.substring(0, tabIdx).trim() : line.trim();
            const afterTab  = tabIdx !== -1 ? line.substring(tabIdx+1).replace(/^\t+/,'').trim() : '';

            const compBefore = ignCase ? beforeTab.toLowerCase() : beforeTab;
            const compAfter  = ignCase ? afterTab.toLowerCase()  : afterTab;

            // B中查找同时包含TAB前和TAB后内容的行（B整行不拆分）
            const matchedLines = linesB.filter(bLine => {
                const bComp = ignCase ? normalize(bLine).toLowerCase() : normalize(bLine);
                const hasBefore = !compBefore || bComp.includes(compBefore);
                const hasAfter  = !compAfter  || bComp.includes(compAfter);
                return hasBefore && hasAfter;
            });

            const found = matchedLines.length > 0;
            if(found) foundCount++; else notFoundCount++;

            // A列显示
            const aHtml = found
                ? `<div style="padding:6px 14px;color:#333;word-break:break-all;">
                       <span style="color:#1a3a6a;">${esc(beforeTab)}</span>
                       <span style="color:#aaa;margin:0 4px;">│</span>
                       <span style="color:#1a3a6a;">${esc(afterTab)}</span>
                   </div>`
                : `<div style="padding:6px 14px;word-break:break-all;">
                       <span style="background:#ffd0d0;color:#660000;border-radius:3px;
                                    padding:1px 4px;">${esc(beforeTab)}</span>
                       <span style="color:#aaa;margin:0 4px;">│</span>
                       <span style="background:#ffd0d0;color:#660000;border-radius:3px;
                                    padding:1px 4px;">${esc(afterTab)}</span>
                       <div style="font-size:0.75rem;color:#aaa;margin-top:2px;">（B中未找到）</div>
                   </div>`;

            // B列显示：整行不拆分，仅高亮匹配部分
            let bHtml = '';
            if(found){
                matchedLines.forEach(bLine => {
                    let lineHtml = esc(bLine);

                    // 高亮TAB前内容（粉红）
                    if(beforeTab){
                        const re = new RegExp(
                            beforeTab.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),
                            ignCase ? 'gi' : 'g'
                        );
                        lineHtml = lineHtml.replace(re, m =>
                            `<span style="background:#ffd0d0;color:#660000;
                                          font-weight:bold;">${m}</span>`);
                    }
                    // 高亮TAB后内容（青色）
                    if(afterTab){
                        const re2 = new RegExp(
                            afterTab.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),
                            ignCase ? 'gi' : 'g'
                        );
                        lineHtml = lineHtml.replace(re2, m =>
                            `<span style="background:#b2f0f0;color:#004444;
                                          font-weight:bold;">${m}</span>`);
                    }

                    bHtml += `<div style="padding:6px 14px;border-bottom:1px solid #f0f0f0;
                                          word-break:break-all;line-height:1.6;">
                                  ${lineHtml}
                              </div>`;
                });
            } else {
                bHtml = `<div style="padding:6px 14px;color:#ccc;font-size:0.82rem;">
                             （未找到同时包含两者的行）
                         </div>`;
            }

            tableHtml += `
            <tr style="border-bottom:2px solid #ddd;vertical-align:top;">
                <td style="border-right:2px solid #ddd;vertical-align:middle;
                           background:${found?'white':'#fff8f8'};">
                    ${aHtml}
                </td>
                <td style="background:${found?'white':'#fff8f8'};">
                    ${bHtml}
                </td>
            </tr>`;
        });

        tableHtml += `</tbody></table>`;

        const st = document.getElementById('stats-full');
        st.innerHTML = `<span>TAB分列包含检查：</span>
            <span class="tag" style="background:#b8ffb8;color:#004400;
                   border:1px solid #00aa00;">✅ 找到 <b>${foundCount}</b> 行</span>
            <span class="tag" style="background:#ffd0d0;color:#660000;
                   border:1px solid #cc8888;">❌ 未找到 <b>${notFoundCount}</b> 行</span>
            <span style="font-size:0.78rem;color:#888;">
                <span style="background:#ffd0d0;padding:1px 8px;border-radius:3px;">粉红</span>=TAB前内容
                <span style="background:#b2f0f0;padding:1px 8px;border-radius:3px;">青色</span>=TAB后内容
            </span>`;
        st.classList.add('show');

        document.getElementById('diff-out').innerHTML =
            `<div style="background:white;border:1px solid #bbb;
                         border-radius:4px;overflow:hidden;">${tableHtml}</div>`;
        document.getElementById('diff-wrap').classList.add('show');
        document.getElementById('btn-exp-full').style.display='inline-block';
        document.getElementById('nav-bar-full').classList.remove('show');
        return;
    }

    // ===== 原有逐行包含检查逻辑（不变）=====
    const linesA = normalize(textA).split('\n').map(l=>l.trim()).filter(l=>l.length>0);

    const lineBNorm = linesB.map(l=>normalize(l));

    let foundCount=0, notFoundCount=0;
    const matches = linesA.map(aLine=>{
        const comp = ignCase ? aLine.toLowerCase() : aLine;

        const matchedLineIdxs = [];
        lineBNorm.forEach((bLine,i)=>{
            const bComp = ignCase ? bLine.toLowerCase() : bLine;
            if(bComp.includes(comp)) matchedLineIdxs.push(i);
        });

        if(matchedLineIdxs.length===0){
            notFoundCount++;
            return{aLine,found:[],ok:false};
        }

        foundCount++;
        const isParagraphStart = (line) => /\|/.test(line);
        const foundParas = [];
        const usedStarts = new Set();

        matchedLineIdxs.forEach(matchIdx=>{
            let startIdx = matchIdx;
            while(startIdx>0 && !isParagraphStart(linesB[startIdx])){
                startIdx--;
            }
            if(usedStarts.has(startIdx)) return;
            usedStarts.add(startIdx);

            let endIdx = startIdx+1;
            while(endIdx<linesB.length && !isParagraphStart(linesB[endIdx])){
                endIdx++;
            }

            const para = linesB.slice(startIdx,endIdx).filter(l=>l.trim()!=='');
            if(para.length>0) foundParas.push(para);
        });

        return{aLine,found:foundParas,ok:true};
    });

    let tableHtml = `<table style="width:100%;border-collapse:collapse;
                     font-family:'Courier New',monospace;font-size:0.88rem;">
    <thead><tr>
        <th style="background:#c8e6ff;color:#1a3a6a;padding:8px 14px;
                   text-align:left;border-bottom:2px solid #bbb;width:25%;">◀ 列表 A</th>
        <th style="background:#e8f8e8;color:#1a4a1a;padding:8px 14px;
                   text-align:left;border-bottom:2px solid #bbb;width:75%;">▶ 文本 B（匹配到的词条）</th>
    </tr></thead><tbody>`;

    matches.forEach(m=>{
        const aHtml = m.ok
            ? `<div style="padding:8px 14px;color:#333;font-weight:bold;">${esc(m.aLine)}</div>`
            : `<div style="padding:8px 14px;">
                   <span style="background:#ffd0d0;color:#660000;border-radius:3px;
                                padding:2px 6px;font-weight:bold;">${esc(m.aLine)}</span>
                   <div style="font-size:0.78rem;color:#aaa;margin-top:4px;">（B中未找到）</div>
               </div>`;

        let bHtml = '';
        if(m.found.length>0){
            m.found.forEach(para=>{
                const comp2 = ignCase ? normalize(m.aLine).toLowerCase() : normalize(m.aLine);
                let paraHtml = '';
                para.forEach(line=>{
                    const lineComp = ignCase ? normalize(line).toLowerCase() : normalize(line);
                    if(lineComp.includes(comp2)){
                        const parts = line.split(new RegExp(
                            '('+m.aLine.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')',
                            ignCase?'gi':'g'));
                        let lineHtml = '';
                        parts.forEach(part=>{
                            const partComp = ignCase ? normalize(part).toLowerCase() : normalize(part);
                            if(partComp === comp2){
                                lineHtml += `<span style="color:#333;">${esc(part)}</span>`;
                            } else if(part){
                                lineHtml += `<span style="background:#b2f0f0;color:#004444;">${esc(part)}</span>`;
                            }
                        });
                        paraHtml += `<div style="padding:2px 0;">${lineHtml}</div>`;
                    } else {
                        paraHtml += `<div style="background:#b2f0f0;color:#004444;
                                                  padding:2px 0;">${esc(line)}</div>`;
                    }
                });
                bHtml += `<div style="background:white;padding:6px 14px;margin-bottom:4px;
                                       border-radius:4px;border-left:3px solid #00aaaa;">
                               ${paraHtml}
                           </div>`;
            });
        }

        tableHtml += `<tr style="border-bottom:2px solid #ddd;vertical-align:top;">
            <td style="padding:4px;border-right:2px solid #ddd;vertical-align:middle;">${aHtml}</td>
            <td style="padding:4px;">${bHtml}</td>
        </tr>`;
    });

    tableHtml += `</tbody></table>`;

    const st = document.getElementById('stats-full');
    st.innerHTML = `<span>逐行包含检查：</span>
        <span class="tag" style="background:#b8ffb8;color:#004400;
               border:1px solid #00aa00;">A中找到 <b>${foundCount}</b> 行</span>
        <span class="tag" style="background:#ffd0d0;color:#660000;
               border:1px solid #cc8888;">A中未找到 <b>${notFoundCount}</b> 行</span>`;
    st.classList.add('show');

    document.getElementById('diff-out').innerHTML =
        `<div style="background:white;border:1px solid #bbb;
                     border-radius:4px;overflow:hidden;">${tableHtml}</div>`;
    document.getElementById('diff-wrap').classList.add('show');
    document.getElementById('btn-exp-full').style.display='inline-block';
    document.getElementById('nav-bar-full').classList.remove('show');
}
// 符号分类
function classifyChar(ch){
    const c=ch.codePointAt(0);
    if(ch==='\n')return'nl';if(ch==='\t')return'tab';
    const inv=[0x200B,0x200C,0x200D,0xFEFF,0x2060,0x00AD,0x034F,0x180E,0x202A,0x202B,0x202C,0x202D,0x202E,0x2066,0x2067,0x2068,0x2069,0xFFFD,0x00A0];
    if(inv.includes(c))return'invisible';
    if(c>=0xE000&&c<=0xF8FF)return'pua';
    if(c<0x20)return'invisible';
    if(c===0x20)return'sp-half';if(c===0x3000)return'sp-full';
    if(RARE_CHARS.has(ch))return'sym-fullwidth';
    if(ch==='％'||ch==='！')return'sym-fullwidth';
    if(c>=0x21&&c<=0x7E)return'pass';
    if(c>=0x3041&&c<=0x3096)return'pass';
    if(c>=0x30A1&&c<=0x30FF)return'pass';
    if(c>=0x4E00&&c<=0x9FFF)return'pass';
    if(c>=0xAC00&&c<=0xD7A3)return'pass';
    if(c>=0xFF65&&c<=0xFF9F)return'sym-halfkana';
    if(c>=0xFF10&&c<=0xFF19)return'sym-fullnum';
    if(c>=0xFF21&&c<=0xFF3A)return'sym-fullalpha';
    if(c>=0xFF41&&c<=0xFF5A)return'sym-fullalpha';
    if(c>=0xFF01&&c<=0xFF60)return'sym-fullwidth';
    if(CIRCLED_NUMS.has(ch)||ROMAN_NUMS.has(ch)||UNIT_SYMBOLS.has(ch)||CURRENCY.has(ch))return'sym-fullwidth';
    if(c>=0x2200&&c<=0x22FF||c>=0x2190&&c<=0x21FF||c>=0x25A0&&c<=0x25FF||c>=0x2600&&c<=0x26FF)return'sym-fullwidth';
    if(c>=0x2500&&c<=0x257F||c>=0x3001&&c<=0x303F||c>=0x2000&&c<=0x206F||c>=0x2100&&c<=0x214F)return'sym-fullwidth';
    if(KANA_EXT.has(ch))return'sym-fullwidth';
    if(c>=0x2E80&&c<=0x2FDF||c>=0xF900&&c<=0xFAFF||c>=0xFE30&&c<=0xFE4F)return'sym-fullwidth';
    if(c>=0x3400&&c<=0x4DBF||c>=0x20000)return'sym-fullwidth';
    if(c>0x7E)return'sym-other';
    return'pass';
}

const INV_LABELS={0x00A0:'NBSP',0x200B:'ZWS',0x200C:'ZWNJ',0x200D:'ZWJ',0xFEFF:'BOM',0x2060:'WJ',0x00AD:'SHY',0x034F:'CGJ',0x180E:'MVS',0x202A:'LRE',0x202B:'RLE',0x202C:'PDF-ctrl',0x202D:'LRO',0x202E:'RLO',0x2066:'LRI',0x2067:'RLI',0x2068:'FSI',0x2069:'PDI',0xFFFD:'REPL'};
function invLabelC(c){return INV_LABELS[c]||`U+${c.toString(16).toUpperCase().padStart(4,'0')}`;}

function renderCheck(text){
    const showNL=document.getElementById('o-nl').checked;
    const showSP=document.getElementById('o-sp').checked;
    const showTab=document.getElementById('o-tab').checked;
    const showInv=document.getElementById('o-cinv').checked;
    const showRuler=document.getElementById('o-ruler').checked;
    const hlLine=document.getElementById('o-hl-ln').checked;
    const lines=text.replace(/\r\n/g,'\n').replace(/\r/g,'\n').split('\n');
    symbolIndex=[];
    const stats={'sp-half':0,'sp-full':0,'tab':0,'invisible':0,'pua':0,'sym-fullwidth':0,'sym-halfkana':0,'sym-fullnum':0,'sym-fullalpha':0,'sym-other':0};
    const numW=String(lines.length).length;
    let allRows='';
    lines.forEach((line,li)=>{
        const lineNo=li+1;let lh='',hasSym=false,col=0;
        for(const ch of[...line]){
            const code=ch.codePointAt(0),type=classifyChar(ch);col++;
            if(type==='pass'){lh+=esc(ch);continue;}
            if(type==='nl')continue;
            if(stats[type]!==undefined)stats[type]++;
            symbolIndex.push({line:lineNo,col,type,char:ch,code});
            switch(type){
                case'sp-half':if(showSP){lh+=`<span class="s-sp-half" title="L${lineNo}C${col}">半</span>`;hasSym=true;}else lh+=' ';break;
                case'sp-full':if(showSP){lh+=`<span class="s-sp-full" title="L${lineNo}C${col}">全</span>`;hasSym=true;}else lh+=esc(ch);break;
                case'tab':if(showTab){lh+=`<span class="s-tab" title="L${lineNo}C${col}">→</span>`;hasSym=true;}else lh+='    ';break;
                case'invisible':if(showInv){lh+=`<span class="s-invisible" title="L${lineNo}C${col}">${invLabelC(code)}</span>`;hasSym=true;}break;
                case'pua':if(showInv){lh+=`<span class="s-pua" title="L${lineNo}C${col}">U+${code.toString(16).toUpperCase().padStart(4,'0')}</span>`;hasSym=true;}break;
                case'sym-fullwidth':case'sym-fullnum':case'sym-fullalpha':lh+=`<span class="s-sym-fullwidth" title="L${lineNo}C${col}">${esc(ch)}</span>`;hasSym=true;break;
                case'sym-halfkana':lh+=`<span class="s-sym-halfkana" title="L${lineNo}C${col}">${esc(ch)}</span>`;hasSym=true;break;
                case'sym-other':lh+=`<span class="s-sym-other" title="U+${code.toString(16).toUpperCase().padStart(4,'0')} L${lineNo}C${col}">${esc(ch)}</span>`;hasSym=true;break;
                default:lh+=esc(ch);
            }
        }
        const isLast=li===lines.length-1;
        if(!isLast&&showNL)lh+=`<span class="s-nl">↵</span>`;
        if(isLast)lh+=`<span class="s-eof">[EOF]</span>`;
        const rc=(hlLine&&hasSym)?'ck-row ck-row-special':'ck-row';
        const nc=hasSym?'ck-num ck-num-special':'ck-num';
        allRows+=`<div class="${rc}" id="ck-line-${lineNo}"><span class="${nc}">${String(lineNo).padStart(numW,' ')}</span><span class="ck-content">${lh}</span></div>`;
    });
    document.getElementById('editor-content').innerHTML=allRows;
    document.getElementById('line-gutter').innerHTML='';
    document.getElementById('check-result-outer').style.display='block';
    document.getElementById('check-legend').classList.add('show');
    if(showRuler){document.getElementById('ruler-wrap').style.display='';requestAnimationFrame(drawRuler);}
    else document.getElementById('ruler-wrap').style.display='none';
    const total=Object.values(stats).reduce((a,b)=>a+b,0);
    const fw=stats['sym-fullwidth']+stats['sym-fullnum']+stats['sym-fullalpha'];
    const hw=stats['sym-halfkana']+stats['sym-other'];
    document.getElementById('check-stats').innerHTML=`
        <span style="color:#27ae60;font-weight:bold;">检查结果：</span>
        <span class="cstat" style="background:#e8f8e8;border:1px solid #27ae60;color:#1e8449;">总行 <b>${lines.length}</b></span>
        <span class="cstat" style="background:#fff3e0;border:1px solid #e67e22;color:#d35400;">符号共 <b>${total}</b> 处</span>
        <span class="cstat" style="background:#fff0e8;border:1px solid #ff6b35;color:#cc4400;">半角空格 <b>${stats['sp-half']}</b></span>
        <span class="cstat" style="background:#ffe8f0;border:1px solid #ff1493;color:#cc0066;">全角空格 <b>${stats['sp-full']}</b></span>
        <span class="cstat" style="background:#e8fff8;border:1px solid #00b894;color:#007a5e;">Tab <b>${stats['tab']}</b></span>
        <span class="cstat" style="background:#ffe8e8;border:1px solid #d63031;color:#aa0000;">不可见 <b>${stats['invisible']}</b></span>
        <span class="cstat" style="background:#f0e8ff;border:1px solid #6c3483;color:#4a235a;">🟣全角符号 <b>${fw}</b></span>
        <span class="cstat" style="background:#ffe8e8;border:1px solid #c0392b;color:#922b21;">🔴半角特殊 <b>${hw}</b></span>`;
    document.getElementById('check-stats').classList.add('show');
    buildSummary();
}

function buildSummary(){
    const groups={};
    for(const item of symbolIndex){const key=item.type+':'+item.char;if(!groups[key])groups[key]={type:item.type,char:item.char,code:item.code,lines:new Set()};groups[key].lines.add(item.line);}
    const names={'sp-half':'半角空格','sp-full':'全角空格','tab':'Tab','invisible':'不可见字符','pua':'PDF私用字符','sym-fullwidth':'全角符号','sym-fullnum':'全角数字','sym-fullalpha':'全角英字','sym-halfkana':'半角假名','sym-other':'其他符号'};
    const sl=document.getElementById('cs-list');
    if(!Object.keys(groups).length){document.getElementById('check-summary').classList.remove('show');return;}
    sl.innerHTML=Object.values(groups).map(g=>{
        const dc=g.char===' '?'·':g.char.codePointAt(0)<32||g.char==='\u3000'?'':esc(g.char);
        const ll=[...g.lines].slice(0,5).join(',')+(g.lines.size>5?'...':'');
        return`<div class="cs-item" onclick="jumpToLine(${[...g.lines][0]})"><span class="cs-count">${g.lines.size}处</span><span style="color:#888">${names[g.type]||g.type}</span><span style="font-family:monospace">${dc||`U+${g.code.toString(16).toUpperCase().padStart(4,'0')}`}</span><span style="color:#aaa;font-size:0.7em;">行:${ll}</span></div>`;
    }).join('');
    document.getElementById('check-summary').classList.add('show');
}

function jumpToLine(n){const el=document.getElementById(`ck-line-${n}`);if(el){el.scrollIntoView({behavior:'smooth',block:'center'});el.style.outline='2px solid #27ae60';setTimeout(()=>el.style.outline='',2000);}}

function drawRuler(){
    const canvas=document.getElementById('ruler-canvas'),content=document.getElementById('editor-content');
    if(!canvas||!content)return;
    const W=Math.max(content.scrollWidth+200,2000);canvas.width=W;canvas.height=22;
    const ctx=canvas.getContext('2d');ctx.fillStyle='#f0f0f0';ctx.fillRect(0,0,W,22);
    for(let col=0;col*8.1<W;col++){
        const x=col*8.1;
        if(col%10===0){ctx.fillStyle='#2980b9';ctx.fillRect(x,14,1,8);ctx.font='9px Courier New';ctx.fillText(String(col),x+1,11);}
        else if(col%5===0){ctx.fillStyle='#999';ctx.fillRect(x,16,1,6);}
        else{ctx.fillStyle='#ccc';ctx.fillRect(x,18,1,4);}
    }
}

// 导出
function doExport(body,title){
    const html=`<!DOCTYPE html><html lang="zh"><head><meta charset="UTF-8"><title>${title}</title><style>${document.querySelector('style').innerHTML}</style></head><body><header style="background:#2c3e50;color:white;padding:14px 20px"><h1>📄 ${title} — ${new Date().toLocaleString()}</h1></header><div style="padding:16px 20px">${body}</div></body></html>`;
    const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([html],{type:'text/html;charset=utf-8'}));a.download=`${title}_${new Date().toISOString().slice(0,10)}.html`;a.click();
}
function exportDiff(){doExport(document.getElementById('stats-diff').outerHTML+document.getElementById('diff-out').outerHTML,'比对结果');}
function exportSort(){doExport(document.getElementById('stats-sort').outerHTML+document.getElementById('diff-out').outerHTML,'升序比对结果');}
function exportFull(){doExport(document.getElementById('stats-full').outerHTML+document.getElementById('diff-out').outerHTML,'全文高亮结果');}
function exportCheck(){doExport(document.getElementById('check-stats').outerHTML+document.getElementById('check-summary').outerHTML+document.getElementById('preview-wrap').outerHTML,'符号检查结果');}

// 快捷键
document.addEventListener('keydown',e=>{
    if((e.ctrlKey||e.metaKey)&&e.key==='Enter'){
        if(currentTab==='diff')runLineDiff();
        else if(currentTab==='sort')runSortDiff();
        else if(currentTab==='full')runFullDiff();
        else runCheck();
    }
});

function handleXlCleanFile(file) {

function scanXlFile(file) {
    const progress = document.getElementById('xlclean-progress');

// 不可见字符定义
const INV_CHARS = [
    { code: 0x200B, name: 'ZWS',  label: 'ZWS零宽空格',   badge: 'zws',   optId: 'opt-zws'  },
    { code: 0x200C, name: 'ZWNJ', label: 'ZWNJ零宽非连接', badge: 'other', optId: 'opt-zws'  },
    { code: 0x200D, name: 'ZWJ',  label: 'ZWJ零宽连接',    badge: 'other', optId: 'opt-zws'  },
    { code: 0xFEFF, name: 'BOM',  label: 'BOM字节标记',    badge: 'bom',   optId: 'opt-bom'  },
    { code: 0x2060, name: 'WJ',   label: 'WJ词连接符',     badge: 'bom',   optId: 'opt-bom'  },
    { code: 0x00AD, name: 'SHY',  label: 'SHY软连字符',    badge: 'other', optId: 'opt-bom'  },
    { code: 0x00A0, name: 'NBSP', label: 'NBSP不间断空格',  badge: 'nbsp',  optId: 'opt-nbsp' },
    { code: 0x034F, name: 'CGJ',  label: 'CGJ组合图形',    badge: 'other', optId: 'opt-zws'  },
    { code: 0x180E, name: 'MVS',  label: 'MVS蒙古分隔符',  badge: 'other', optId: 'opt-zws'  },
    { code: 0xFFFD, name: 'REPL', label: '替换字符',       badge: 'other', optId: 'opt-pua'  },
    { code: 0x3000, name: 'IDSP', label: '全角空格',        badge: 'other', optId: 'opt-fullsp'},
];

function getInvCharsInText(text) {
    const found = [];
    for(const ch of [...text]) {
        const code = ch.codePointAt(0);
        // PUA范围
        if(code >= 0xE000 && code <= 0xF8FF) {
            found.push({ code, name: 'PUA', label: 'PDF私用字符', badge: 'other', optId: 'opt-pua' });
            continue;
        }
        const inv = INV_CHARS.find(i => i.code === code);
        if(inv) found.push(inv);
    }
    return found;
}

function doScanXlFile(file) {
    const progress = document.getElementById('xlclean-progress');
    const result = document.getElementById('xlclean-result');
    
    const reader = new FileReader();
    reader.onload = function(e) {
        try {
            progress.textContent = '⏳ 正在扫描单元格...';
            const data = new Uint8Array(e.target.result);
            const wb = XLSX.read(data, { type: 'array', cellStyles: true });
            
            const issues = [];
            
            wb.SheetNames.forEach(sheetName => {
                const ws = wb.Sheets[sheetName];
                if(!ws || !ws['!ref']) return;
                
                const range = XLSX.utils.decode_range(ws['!ref']);
                for(let R = range.s.r; R <= range.e.r; R++) {
                    for(let C = range.s.c; C <= range.e.c; C++) {
                        const addr = XLSX.utils.encode_cell({r:R, c:C});
                        const cell = ws[addr];
                        if(!cell || cell.v === undefined || cell.v === null) continue;
                        const text = String(cell.v);
                        const found = getInvCharsInText(text);
                        if(found.length > 0) {
                            issues.push({
                                sheet: sheetName,
                                addr,
                                row: R + 1,
                                col: XLSX.utils.encode_col(C),
                                value: text,
                                chars: found
                            });
                        }
                    }
                }
            });
            
            progress.classList.remove('show');
            renderScanResult(issues, wb);
            
        } catch(err) {
            progress.textContent = '❌ 读取失败：' + err.message;
        }
    };
    reader.readAsArrayBuffer(file);
}

function renderScanResult(issues, wb) {
    const result = document.getElementById('xlclean-result');
    
    if(issues.length === 0) {
        result.innerHTML = `
        <div class="no-diff" style="margin-top:16px;">
            ✅ 扫描完成 — 未发现不可见字符，文件非常干净！
        </div>`;
        return;
    }
    
    // 按Sheet分组统计
    const bySheet = {};
    issues.forEach(iss => {
        if(!bySheet[iss.sheet]) bySheet[iss.sheet] = 0;
        bySheet[iss.sheet]++;
    });
    
    // 汇总统计
    const typeCounts = {};
    issues.forEach(iss => {
        iss.chars.forEach(ch => {
            typeCounts[ch.name] = (typeCounts[ch.name] || 0) + 1;
        });
    });
    
    let html = `
    <div class="xl-scan-result">
        <div class="xl-scan-header">
            <span>⚠️ 发现 ${issues.length} 个单元格含有不可见字符</span>
            <span style="font-size:0.8rem;opacity:0.8;">
                ${Object.entries(typeCounts).map(([k,v]) => `${k}:${v}个`).join(' | ')}
            </span>
        </div>
        
        <!-- Sheet分布 -->
        <div style="padding:10px 16px;background:#f8f8f8;border-bottom:1px solid #eee;font-size:0.82rem;display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
            <span style="color:#666;">Sheet分布：</span>
            ${Object.entries(bySheet).map(([s,n]) => 
                `<span class="xl-sheet-tag">${s} <b style="color:#e74c3c">${n}</b></span>`
            ).join('')}
        </div>
        
        <!-- 明细表格 -->
        <div style="max-height:400px;overflow-y:auto;">
        <table class="xl-scan-table">
            <thead>
                <tr>
                    <th>Sheet</th>
                    <th>单元格</th>
                    <th>字符类型</th>
                    <th>内容预览</th>
                </tr>
            </thead>
            <tbody>
                ${issues.slice(0, 200).map(iss => `
                <tr>
                    <td><span class="xl-sheet-tag">${esc(iss.sheet)}</span></td>
                    <td style="font-family:monospace;color:#2980b9;">${iss.col}${iss.row}</td>
                    <td>
                        ${[...new Set(iss.chars.map(c=>c.name))].map(n => 
                            `<span class="xl-badge xl-badge-${iss.chars.find(c=>c.name===n).badge}">${n}</span>`
                        ).join(' ')}
                    </td>
                    <td class="xl-cell-preview" title="${esc(iss.value)}">${escPreview(iss.value)}</td>
                </tr>`).join('')}
                ${issues.length > 200 ? `<tr><td colspan="4" style="text-align:center;color:#999;padding:12px;">... 还有 ${issues.length-200} 条（清洗时会全部处理）</td></tr>` : ''}
            </tbody>
        </table>
        </div>
    </div>`;
    
    result.innerHTML = html;
}

function escPreview(text) {
    let html = '';
    for(const ch of [...text]) {
        const code = ch.codePointAt(0);
        const inv = INV_CHARS.find(i => i.code === code) || 
                    (code >= 0xE000 && code <= 0xF8FF ? {name:'PUA'} : null);
        if(inv) {
            html += `<span style="background:#d63031;color:white;border-radius:3px;padding:0 3px;font-size:0.72em;margin:0 1px;">${inv.name}</span>`;
        } else {
            html += esc(ch);
        }
    }
    return html;
}

async function runXlClean() {
    if(!xlcleanFile) { alert('请先上传文件'); return; }
    
    const progress = document.getElementById('xlclean-progress');
    progress.textContent = '⏳ 正在清洗并生成文件...';
    progress.classList.add('show');
    
    const opts = {
        zws:    document.getElementById('opt-zws').checked,
        bom:    document.getElementById('opt-bom').checked,
        nbsp:   document.getElementById('opt-nbsp').checked,
        pua:    document.getElementById('opt-pua').checked,
        fullsp: document.getElementById('opt-fullsp').checked,
    };

    LibLoader.loadJSZip().then(() => {
        const reader = new FileReader();
        reader.onload = async function(e) {
            try {
                const zip = await JSZip.loadAsync(e.target.result);
                let totalCleaned = 0;
                
                // sharedStrings.xml 处理
                if(zip.files['xl/sharedStrings.xml']) {
                    let xml = await zip.files['xl/sharedStrings.xml'].async('string');
                    xml = cleanSiLevel(xml, opts, (n) => totalCleaned += n);
                    zip.file('xl/sharedStrings.xml', xml);
                }

                // 各sheet的inline string处理
                for(const filename of Object.keys(zip.files)) {
                    if(filename.match(/^xl\/worksheets\/sheet\d+\.xml$/)) {
                        let xml = await zip.files[filename].async('string');
                        xml = cleanSiLevel(xml, opts, (n) => totalCleaned += n);
                        zip.file(filename, xml);
                    }
                }

                const outBlob = await zip.generateAsync({
                    type: 'blob',
                    compression: 'DEFLATE',
                    compressionOptions: { level: 6 }
                });
                
                const outName = xlcleanFile.name.replace(/\.(xlsx|xls)$/i, '_cleaned.xlsx');
                const a = document.createElement('a');
                a.href = URL.createObjectURL(outBlob);
                a.download = outName;
                a.click();
                
                progress.innerHTML = `✅ 清洗完成！共清洗 <b>${totalCleaned}</b> 处，文件已自动下载：<b>${outName}</b><br>
                    <span style="font-size:0.8rem;color:#27ae60;">✅ 所有格式（颜色/边框/合并单元格）完全保留</span>`;

            } catch(err) {
                progress.textContent = '❌ 清洗失败：' + err.message;
                console.error(err);
            }
        };
        reader.readAsArrayBuffer(xlcleanFile);
    });
}

// 以<si>为单位清洗
function cleanSiLevel(xml, opts, countCb) {
    return xml.replace(/<si>([\s\S]*?)<\/si>/g, (siMatch, siContent) => {
        const result = cleanSiTrail(siContent, opts);
        if(result.changed) countCb(1);
        return `<si>${result.content}</si>`;
    });
}

function cleanSiTrail(siContent, opts) {
    const tRegex = /<t([^>]*)>([\s\S]*?)<\/t>/g;
    const tList = [];
    let m;
    while((m = tRegex.exec(siContent)) !== null) {
        tList.push({
            index:   m.index,
            end:     m.index + m[0].length,
            attr:    m[1],
            content: m[2],
        });
    }
    if(!tList.length) return { content: siContent, changed: false };

    function decodeXml(s) {
        return s.replace(/&amp;/g,'&').replace(/&lt;/g,'<')
                .replace(/&gt;/g,'>').replace(/&quot;/g,'"').replace(/&apos;/g,"'");
    }
    function encodeXml(s) {
        return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function isDeletable(ch) {
        const code = ch.codePointAt(0);
        if(ch === '\n' || ch === '\r') return true;
        if(opts.zws    && [0x200B,0x200C,0x200D,0x034F,0x180E,0x2060,0xFFFD].includes(code)) return true;
        if(opts.bom    && [0xFEFF,0x00AD,0x202A,0x202B,0x202C,0x202D,0x202E].includes(code)) return true;
        if(opts.nbsp   && code === 0x00A0) return true;
        if(opts.pua    && code >= 0xE000 && code <= 0xF8FF) return true;
        if(opts.fullsp && code === 0x3000) return true;
        return false;
    }

    let changed = false;
    const newContents = tList.map(t => decodeXml(t.content));

    for(let i = newContents.length - 1; i >= 0; i--) {
        const chars = [...newContents[i]];
        const allDeletable = chars.length > 0 && chars.every(ch => isDeletable(ch));

        if(allDeletable) {
            // 整个<t>都是可删字符 → 清空，继续往前扫
            newContents[i] = '';
            changed = true;
            continue;
        }

        // 有正常内容 → 只删末尾的可删字符
        let end = chars.length;
        while(end > 0 && isDeletable(chars[end - 1])) {
            end--;
        }
        if(end < chars.length) {
            newContents[i] = chars.slice(0, end).join('');
            changed = true;
        }
        break;
    }

    if(!changed) return { content: siContent, changed: false };

    // 从后往前重建，避免index偏移
    let newSiContent = siContent;
    for(let i = tList.length - 1; i >= 0; i--) {
        const t = tList[i];
        const newTag = `<t${t.attr}>${encodeXml(newContents[i])}</t>`;
        newSiContent = newSiContent.substring(0, t.index)
                     + newTag
                     + newSiContent.substring(t.end);
    }

    return { content: newSiContent, changed: true };
}

    document.getElementById('xlclean-progress').classList.remove('show');
    document.getElementById('xlclean-progress').textContent = '';
}

function handleXlCompFile(side, file){
    if(!file.name.match(/\.(xlsx|xls|xlsm)$/i)){ alert('请上传Excel文件'); return; }
    if(side==='a') xlcompFileA=file; else xlcompFileB=file;

    const drop = document.getElementById('xlcomp-drop-'+side);
    drop.innerHTML = `
        <div class="drop-icon">✅</div>
        <div class="drop-text">${file.name}</div>
        <div class="drop-sub">${(file.size/1024/1024).toFixed(2)} MB　点击重新选择</div>
        <input type="file" id="xlcomp-input-${side}" accept=".xlsx,.xls" style="display:none">
    `;
    document.getElementById('xlcomp-input-'+side).addEventListener('change', e=>{
        if(e.target.files[0]) handleXlCompFile(side, e.target.files[0]);
    });
    drop.onclick = ()=> document.getElementById('xlcomp-input-'+side).click();

    // 两个文件都上传后显示控制栏
    if(xlcompFileA && xlcompFileB){
        document.getElementById('xlcomp-controls').style.display='flex';
        document.getElementById('xlcomp-controls').style.flexWrap='wrap';
    }
}

// ===== 读取文件并显示Sheet选择 =====
function runXlComp(){
    if(!xlcompFileA||!xlcompFileB){ alert('请先上传两个文件'); return; }
    const progress = document.getElementById('xlcomp-progress');
    progress.textContent='⏳ 正在读取文件...';
    progress.classList.add('show');
    LibLoader.loadXLSX().then(() => _readBothFiles());
}

function _readBothFiles(){
    const progress = document.getElementById('xlcomp-progress');
    let doneCount=0;

    function readFile(file, cb){
        const reader = new FileReader();
        reader.onload = e=>{
            // ★ 加入try/catch捕获加密文件错误
            try {
                const data = new Uint8Array(e.target.result);
                const wb = XLSX.read(data,{
                    type:'array',
                    cellNF:true,
                    cellDates:true,
                    cellFormula:true
                });
                cb(wb);
            } catch(err) {
                progress.classList.remove('show');
                progress.textContent = '';
                // ★ 判断是否为加密文件错误
                const msg = (err.message || '').toLowerCase();
                const isEncrypted = msg.includes('password')
                    || msg.includes('encrypted')
                    || msg.includes('cfb')
                    || msg.includes('bad')
                    || msg.includes('parse')
                    || msg.includes('not supported');
                if(isEncrypted){
                    _showEncryptedDialog(file.name);
                } else {
                    alert('❌ 文件读取失败：' + err.message);
                }
            }
        };
        reader.onerror = () => {
            progress.classList.remove('show');
            alert('❌ 文件读取失败，请重新选择文件');
        };
        reader.readAsArrayBuffer(file);
    }

    readFile(xlcompFileA, wb=>{ xlcompWbA=wb; doneCount++; if(doneCount===2) _showSheetSelect(); });
    readFile(xlcompFileB, wb=>{ xlcompWbB=wb; doneCount++; if(doneCount===2) _showSheetSelect(); });
}
