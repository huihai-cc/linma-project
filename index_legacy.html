function convertAreaNameToEn(name) {
    const trimmed = name.trim();
    if(!trimmed) return '';
    // まず辞書で直接検索
    if(JP_AREA_JA_TO_EN[trimmed]) return JP_AREA_JA_TO_EN[trimmed];
    // 前方一致（長い順に検索してより正確に）
    const keys = Object.keys(JP_AREA_JA_TO_EN).sort((a,b) => b.length - a.length);
    for(const k of keys){
        if(trimmed.startsWith(k)) return JP_AREA_JA_TO_EN[k];
    }
    // 変換できなかった場合はそのまま返す（英語で書かれている可能性）
    return trimmed;
}

// ===== セグメントシート読み込み（PVA用）=====
function readAllSegmentSheets(wb) {
    const segMap = {};
    for (const sheetName of wb.SheetNames) {
        if (!sheetName.includes('セグメントシート') && !sheetName.includes('セグメント')) continue;
        const ws = wb.Sheets[sheetName];
        if (!ws || !ws['!ref']) continue;
        const rows = XLSX.utils.sheet_to_json(ws, { header:1, defval:'', raw:false });
        let isNewFMT = false;
        const settingSheetName = wb.SheetNames.find(n =>
            n.includes('PVA設定') || n.includes('設定シート')
        );
        if (settingSheetName) {
            const settingWs = wb.Sheets[settingSheetName];
            const a1Cell = settingWs && settingWs['A1'];
            const verStr = a1Cell ? String(a1Cell.v || '').trim() : '';
            const verMatch = verStr.match(/Ver\.?(\d+)-(\d+)/i);
            if (verMatch) {
                const major = parseInt(verMatch[1]);
                const minor = parseInt(verMatch[2]);
                isNewFMT = (major > 1) || (major === 1 && minor >= 6);
            }
        }
        if (!isNewFMT) {
            const row2 = rows[2] || [];
            const row2C = String(row2[2] || '').trim();
            const row2H = String(row2[7] || '').trim();
            const row2M = String(row2[12] || '').trim();
            isNewFMT = [row2C, row2H, row2M].some(v =>
                v.toLowerCase().includes('include') ||
                v.toLowerCase().includes('exclude') ||
                v.includes('含む') || v.includes('除外')
            );
        }
        const data = isNewFMT
            ? _readSegmentSheetNewFMT(rows)
            : _readSegmentSheetOldFMT(rows);
        segMap[sheetName] = data;
    }
    return segMap;
}

function _findSegmentForLI(audienceVal, segMap) {
    if (!audienceVal || !audienceVal.includes('セグメントシート')) {
        return { groups: [], groupOps: [] };
    }
    const m = audienceVal.match(/セグメントシート[（(「]([^）)」]+)[）)」]/);
    if (!m) return { groups: [], groupOps: [] };
    const keyword = m[1].trim();
    for (const [sheetName, data] of Object.entries(segMap)) {
        if (sheetName.includes(keyword)) return data;
    }
    // 模糊匹配兜底
    const keyParts = keyword.split(/[×・]/);
    for (const [sheetName, data] of Object.entries(segMap)) {
        if (keyParts.every(p => p.trim() && sheetName.includes(p.trim()))) return data;
    }
    return { groups: [], groupOps: [] };
}

// ===== 新FMT(Ver.1-6) =====
// 行0: グループヘッダー
// 行1: グループ間演算子
// 行2: 含む/除外（C列=index2, H列=index7, M列=index12）
// 行3: グループ内演算子
// 行4: セグメント名ラベル
// 行5～: セグメントデータ
function _readSegmentSheetNewFMT(rows){
    const result = { groups: [], groupOps: [] };

    // グループ間演算子：行1のE列(4)とJ列(9)
    const row1 = rows[1] || [];
    [4, 9].forEach(col => {
        const op = String(row1[col] || '').trim();
        if(op.includes('および') || op.toLowerCase().includes('and')){
            result.groupOps.push('and');
        } else if(op.includes('または') || op.toLowerCase().includes('or')){
            result.groupOps.push('or');
        }
    });

    // 含む/除外：行2のC列(2), H列(7), M列(12)
    const row2 = rows[2] || [];
    const TYPE_COLS = [2, 7, 12];
    const SEG_COLS  = [1, 6, 11];
    const DATA_START_ROW = 5;

    TYPE_COLS.forEach((typeCol, idx) => {
        const typeVal = String(row2[typeCol] || '').trim();
        if(!typeVal) return;

        const type = (typeVal.toLowerCase().includes('exclude') || typeVal.includes('除外'))
            ? 'Exclude' : 'Include';

        const segCol = SEG_COLS[idx];
        const segments = [];
        for(let i = DATA_START_ROW; i < rows.length; i++){
            const seg = String(rows[i][segCol] || '').trim();
            if(!seg) continue;
            if(['セグメント名','グループ内演算子','含む/除外',
                'グループ間演算子'].includes(seg)) continue;
            segments.push(seg);
        }

        if(segments.length > 0){
            result.groups.push({ type, segments });
        }
    });

    console.log('★新FMT結果:', JSON.stringify(result));
    return result;
}

// ===== 旧FMT(Ver.1-5) =====
// 行0: グループヘッダー
// 行1: グループ内演算子
// 行2: セグメント名ラベル
// 行3～: Include/Exclude + セグメントデータ
//   B列(1)=Include/Exclude, C列(2)=セグメント名（グループ1）
//   F列(5)=Include/Exclude, G列(6)=セグメント名（グループ2）
//   J列(9)=Include/Exclude, K列(10)=セグメント名（グループ3）
function _readSegmentSheetOldFMT(rows){
    const result = { groups: [], groupOps: [] };

    // ===== 列構造を動的に検出 =====
    // 旧FMTのヘッダー行（行2か行3）からInclude/Excludeの列を探す
    // データ行（行3以降）でInclude/Excludeが入っている列 = TYPE_COL
    // その右隣の列 = SEG_COL

    // まずグループ間演算子を行0～2から探す
    for(let ri = 0; ri <= 2; ri++){
        const r = rows[ri] || [];
        r.forEach(v => {
            const s = String(v || '').trim();
            if(result.groupOps.length >= 2) return;
            if(s.includes('および') || s.toLowerCase() === 'and'){
                result.groupOps.push('and');
            } else if(s.includes('または') || s.toLowerCase() === 'or'){
                result.groupOps.push('or');
            }
        });
    }

    // ===== データ行から列インデックスを動的検出 =====
    // 行3（index=3）を見て、Include/Excludeが入っている列を探す
    const SKIP_LABELS = [
        'セグメント名','グループ内演算子','含む/除外',
        'グループ間演算子','グループ1','グループ2','グループ3',
        'および(and)','または(or)'
    ];

    // データ開始行を探す（Include/Excludeが最初に現れる行）
    let dataStartRow = -1;
    const typeCols = [];   // Include/Excludeが入る列インデックス
    const segCols  = [];   // セグメント名が入る列インデックス

    for(let ri = 2; ri < Math.min(6, rows.length); ri++){
        const r = rows[ri] || [];
        const foundTypeCols = [];
        r.forEach((v, ci) => {
            const s = String(v || '').trim();
            if(s.toLowerCase() === 'include' || s.toLowerCase() === 'exclude'
               || s === '含む' || s === '除外'){
                foundTypeCols.push(ci);
            }
        });
        if(foundTypeCols.length > 0){
            dataStartRow = ri;
            foundTypeCols.forEach(tc => {
                typeCols.push(tc);
                // セグメント名の列 = type列の右隣（+1）
                segCols.push(tc + 1);
            });
            break;
        }
    }

    console.log('★旧FMT dataStartRow:', dataStartRow, 'typeCols:', typeCols, 'segCols:', segCols);

    if(dataStartRow === -1 || typeCols.length === 0){
        console.log('★旧FMT: 列構造検出失敗');
        return result;
    }

    // ===== グループごとにセグメント収集 =====
    const groupData = typeCols.map(() => ({ segments: [], type: 'Include' }));

    for(let i = dataStartRow; i < rows.length; i++){
        typeCols.forEach((typeCol, idx) => {
            const typeVal = String(rows[i][typeCol] || '').trim();
            const segVal  = String(rows[i][segCols[idx]] || '').trim();

            if(!segVal) return;
            if(SKIP_LABELS.some(s => segVal.includes(s))) return;

            if(typeVal.toLowerCase() === 'include' || typeVal.includes('含む')){
                groupData[idx].type = 'Include';
            } else if(typeVal.toLowerCase() === 'exclude' || typeVal.includes('除外')){
                groupData[idx].type = 'Exclude';
            }

            groupData[idx].segments.push(segVal);
        });
    }

    groupData.forEach(g => {
        if(g.segments.length > 0){
            result.groups.push({ type: g.type, segments: g.segments });
        }
    });

    console.log('★旧FMT結果:', JSON.stringify(result));
    return result;
}

                     'セグメント','Instructions','Reference'];
    const candidateSheets = [];

    for(const sname of wb.SheetNames){
        const ws = wb.Sheets[sname];
        if(!ws || !ws['!ref']) continue;

// ===== VIDEO LINE ITEMS 下载数据読み取り（PVA/OTT共用）=====
function readDownloadDataVideoMulti(wbsD){
    const liMap = {};
    const files = [];
    const ioDownloadMap = {};

    wbsD.forEach(({ wb, fileName }) => {
        let targetSheet = null, targetHeaderRow = 0, bestScore = 0;

        for(const sname of wb.SheetNames){
            const ws = wb.Sheets[sname];
            if(!ws || !ws['!ref']) continue;
            const rows = XLSX.utils.sheet_to_json(ws,{header:1,defval:'',raw:false}).slice(0,30);
            for(let i=0; i<rows.length; i++){
                const rowStr = rows[i].join(' ');
                let score = 0;
                if(rowStr.includes('Line name'))              score += 5;
                if(rowStr.includes('Video Ad Content Type'))  score += 8;
                if(rowStr.includes('Supply source'))           score += 4;
                if(rowStr.includes('Base supply bid'))         score += 3;
                if(rowStr.includes('Pacing profile'))          score += 3;
                if(rowStr.includes('Audience names'))          score += 3;
                // ★ VIDEO LINE ITEMS を最優先
                if(sname.toUpperCase().includes('VIDEO LINE ITEMS'))   score += 20;
                if(sname.toUpperCase().includes('DISPLAY LINE ITEMS')) score -= 30;
                if(score > bestScore){
                    bestScore = score;
                    targetSheet = sname;
                    targetHeaderRow = i;
                }
            }
        }

        if(!targetSheet || bestScore < 5){
            files.push({ fileName, sheet:'（未発見）', liCount:0, lis:[] });
            return;
        }

        const ws = wb.Sheets[targetSheet];
        const allRows = XLSX.utils.sheet_to_json(ws,{header:1,defval:'',raw:false});
        const headers = allRows[targetHeaderRow].map(h => String(h).trim());
        const liColIdx = headers.findIndex(h => h.toLowerCase().includes('line name'));
        const orderColIdx = headers.findIndex(h =>
            h.toLowerCase().includes('order name') || h === 'Order name - (READ ONLY)');

        if(liColIdx === -1){
            files.push({ fileName, sheet:targetSheet, liCount:0, lis:[] });
            return;
        }

        const junkPattern = /Follow instructions|Choose from|Don't delete|READ ONLY|informational/i;
        const fileLis = [];
        let fileIoName = '';

        for(let i=targetHeaderRow+1; i<allRows.length; i++){
            const row = allRows[i];
            const liName = row[liColIdx] ? String(row[liColIdx]).trim() : '';
            if(!liName || junkPattern.test(liName)) continue;

            const obj = { __LI_NAME__: liName };
            headers.forEach((h,idx) => {
                if(h) obj[h] = row[idx] !== undefined ? String(row[idx]).trim() : '';
            });

            if(orderColIdx !== -1 && !fileIoName){
                const orderVal = String(row[orderColIdx] || '').trim();
                if(orderVal && !junkPattern.test(orderVal)) fileIoName = orderVal;
            }

            obj.__IO_NAME_D__ = fileIoName;
            obj.__FILE_D__    = fileName;

            liMap[liName] = obj;
            fileLis.push({ name:liName, status:obj['Active/Inactive']||'' });

            if(fileIoName){
                if(!ioDownloadMap[fileIoName]) ioDownloadMap[fileIoName] = [];
                ioDownloadMap[fileIoName].push(liName);
            }
        }

        files.push({
            fileName, sheet:targetSheet,
            liCount:fileLis.length, lis:fileLis, ioName:fileIoName
        });
    });

    return { liMap, files, ioDownloadMap };
}

const DL_COLUMNS_VIDEO = [

// ===== PVA/OTT マッチング比対 =====
function matchAndCompareVideo(settingData, downloadMap, system){
    const results = [];

    for(const sRow of settingData){
        const liName  = sRow.__LI_NAME__;
        const ioName  = sRow.__IO_NAME__ || '';
        let dRow = null, matchedName = liName;

        // ① 完全一致
        if(downloadMap[liName]) dRow = downloadMap[liName];

        // ② IO名スコープでファジー検索
        if(!dRow && ioName){
            const scopedNames = Object.keys(downloadMap).filter(n => {
                const d = downloadMap[n];
                return d.__IO_NAME_D__ &&
                    (d.__IO_NAME_D__.includes(ioName) || ioName.includes(d.__IO_NAME_D__));
            });
            const fuzzy = scopedNames.find(n => {
                const nl = n.toLowerCase(), ll = liName.toLowerCase();
                return nl === ll ||
                    (nl.includes(ll) && ll.length/nl.length > 0.7) ||
                    (ll.includes(nl) && nl.length/ll.length > 0.7);
            });
            if(fuzzy){ dRow = downloadMap[fuzzy]; matchedName = fuzzy; }
        }

        // ③ 全体ファジー（フォールバック）
        if(!dRow){
            const fuzzy = Object.keys(downloadMap).find(n => {
                const nl = n.toLowerCase(), ll = liName.toLowerCase();
                return nl === ll ||
                    (nl.includes(ll) && ll.length/nl.length > 0.7) ||
                    (ll.includes(nl) && nl.length/ll.length > 0.7);
            });
            if(fuzzy){ dRow = downloadMap[fuzzy]; matchedName = fuzzy; }
        }

        const found = !!dRow;

        function dGet(key){
            if(!dRow) return '';
            if(dRow[key] !== undefined) return String(dRow[key] || '');
            const aliases = DL_COL_ALIASES[key] || [];
            for(const a of aliases){ if(dRow[a] !== undefined) return String(dRow[a] || ''); }
            return '';
        }

        function sGetForCol(key){
            const map = {
                'Line name*':              sRow.__LI_NAME__,
                'Line type*':              'Video',
                'Video Ad Content Type*':  'STREAMING_TV',
                'Line start date':         [sRow.start_day, sRow.start_time].filter(Boolean).join(' '),
                'Line end date':           [sRow.end_day,   sRow.end_time].filter(Boolean).join(' '),
                'Active/Inactive':         'Pause',
                'Product categories*':     sRow.product_small,
                'Device type':             sRow.device,
                'Mobile environment':      sRow.mobile_env,
                'Supply source':           system === 'amazon_pva'
                    ? `DealID: ${sRow.deal_id || ''}` : sRow.ssp,
                'Deal selection':          sRow.deal_id,
                'Targeting - Content':     sRow.content,
                'Location targeting by':   sRow.location_sig || sRow.location,
                'Location targeting 1 of 2': sRow.location || sRow.region,
                'Audiences - include':     sRow.audience,
                'Reach similar audiences': sRow.audience ? '（AudienceありのためNO）' : '',
                'Audience names': (sRow.audience || '').includes('セグメントシート')
                    ? `セグメントシート参照（グループ数:${(sRow.__SEGMENT_SHEET__?.groups||[]).length}）`
                    : sRow.audience,
                'Automated optimization':  sRow.auto_opt,
                'Line item budget':        sRow.budget,
                'Budget cap':              sRow.budget_cap,
                'Pacing profile':          sRow.pacing,
                'Base supply bid*':        sRow.base_cpm,
                'Maximum average CPM':     sRow.max_cpm,
            };
            return map[key] !== undefined ? String(map[key] || '') : '';
        }

        const colResults = DL_COLUMNS_VIDEO.map(col => {
    const dVal = dGet(col.key);
    const sVal = sGetForCol(col.key);
    let result = null;
    if(found && col.checkFn){
        try { result = col.checkFn(sRow, dVal, dRow); }  // ← 加第3个参数 dRow
        catch(e){ result = null; }
    }
    return { key:col.key, ja:col.ja, sVal, dVal, result };
});

        results.push({
    liName,
    __IO_NAME__:    sRow.__IO_NAME__ || '',
    __SHEET__:      sRow.__SHEET__   || '',
    __FILE_S__:     sRow.__FILE_S__  || '',
    found,
    matchedName:    dRow ? matchedName : null,
    matchedIOName:  dRow ? (dRow.__IO_NAME_D__ || '') : '',
    matchedFileD:   dRow ? (dRow.__FILE_D__    || '') : '',
    isPause:        dRow ? (dRow['Active/Inactive']||'').toLowerCase()==='pause' : null,
    activeStatus:   dRow ? dRow['Active/Inactive'] : '',
    colResults,
    mismatchCount:  colResults.filter(c => c.result === false).length,
    // ★ sRowから差異情報を引き継ぐ
    __audience_diff__:      sRow.__audience_diff__      || '',
    __location_diff__:      sRow.__location_diff__      || '',
    __location_excl_diff__: sRow.__location_excl_diff__ || '',
    __brand_content_note__: sRow.__brand_content_note__ || '',
    __brand_tier_note__:    sRow.__brand_tier_note__     || '',
});
    }
    return results;
}

// ===== checkAmazon（複数ファイル対応版） =====
function checkAmazon(wbsS, wbsD, system){
    let allSettingData = [];

    // ★ PVA/OTT は専用読み取り関数を使用
    const readFn = (system === 'amazon_pva' || system === 'amazon_ott')
        ? (wb) => readSettingTableVideo(wb, system)
        : readSettingTableDSP;

    wbsS.forEach(({ wb, fileName }) => {
        const rows = readFn(wb);
        rows.forEach(r => r.__FILE_S__ = fileName);
        allSettingData = allSettingData.concat(rows);
    });

    // ★ PVA/OTT は VIDEO LINE ITEMS を読む
    const downloadData = (system === 'amazon_pva' || system === 'amazon_ott')
        ? readDownloadDataVideoMulti(wbsD)
        : readDownloadDataDSPMulti(wbsD);

    return {
        system,
        settingCount:  allSettingData.length,
        downloadCount: Object.keys(downloadData.liMap).length,
        downloadFiles: downloadData.files,
        settingData:   allSettingData,
        downloadData:  downloadData.liMap,
        ioDownloadMap: downloadData.ioDownloadMap,
        items: (system === 'amazon_pva' || system === 'amazon_ott')
            ? matchAndCompareVideo(allSettingData, downloadData.liMap, system)
            : matchAndCompareDSP(allSettingData, downloadData.liMap, system),
    };
}

// ===== 複数ダウンロードデータ読み込み（IO名紐付け） =====
function readDownloadDataDSPMulti(wbsD){
    const liMap = {};
    const files = [];
    const ioDownloadMap = {}; // IO名 → LI名配列

    wbsD.forEach(({ wb, fileName }) => {
        let targetSheet = null, targetHeaderRow = 0, bestScore = 0;
        for(const sname of wb.SheetNames){
            const ws = wb.Sheets[sname];
            if(!ws || !ws['!ref']) continue;
            const rows = XLSX.utils.sheet_to_json(ws,{header:1,defval:'',raw:false}).slice(0,30);
            for(let i=0; i<rows.length; i++){
                const rowStr = rows[i].join(' ');
                let score = 0;
                if(rowStr.includes('Line name'))          score+=5;
                if(rowStr.includes('Line type'))          score+=4;
                if(rowStr.includes('Supply source'))       score+=4;
                if(rowStr.includes('Base supply bid'))     score+=3;
                if(rowStr.includes('Pacing profile'))      score+=3;
                if(rowStr.includes('Audience names'))      score+=3;
                if(rowStr.includes('Awareness'))           score-=10;
                if(rowStr.includes('Consideration'))       score-=10;
                if(sname.includes('DISPLAY LINE ITEMS'))   score+=10;
                if(score>bestScore){ bestScore=score; targetSheet=sname; targetHeaderRow=i; }
            }
        }

        if(!targetSheet || bestScore<5){
            files.push({ fileName, sheet:'（未発見）', liCount:0, lis:[] });
            return;
        }

        const ws = wb.Sheets[targetSheet];
        const allRows = XLSX.utils.sheet_to_json(ws,{header:1,defval:'',raw:false});
        const headers = allRows[targetHeaderRow].map(h=>String(h).trim());
        const liColIdx = headers.findIndex(h=>h.toLowerCase().includes('line name'));
        const orderColIdx = headers.findIndex(h=>
            h.toLowerCase().includes('order name') || h === 'Order name - (READ ONLY)');

        if(liColIdx === -1){
            files.push({ fileName, sheet:targetSheet, liCount:0, lis:[] });
            return;
        }

        // ダウンロードデータのIO名を抽出（Order name列から）
        const junkPattern = /Follow instructions|Choose from|Don't delete|READ ONLY|informational/i;
        const fileLis = [];
        let fileIoName = '';

        for(let i=targetHeaderRow+1; i<allRows.length; i++){
            const row = allRows[i];
            const liName = row[liColIdx] ? String(row[liColIdx]).trim() : '';
            if(!liName || junkPattern.test(liName)) continue;

            const obj = { __LI_NAME__: liName };
            headers.forEach((h,idx)=>{ if(h) obj[h] = row[idx]!==undefined ? String(row[idx]).trim() : ''; });

            // Order名からIO名を取得
            if(orderColIdx !== -1 && !fileIoName){
                const orderVal = String(row[orderColIdx]||'').trim();
                if(orderVal && !junkPattern.test(orderVal)) fileIoName = orderVal;
            }

            obj.__IO_NAME_D__ = fileIoName; // ダウンロード側のIO名
            obj.__FILE_D__    = fileName;

            liMap[liName] = obj;
            fileLis.push({ name:liName, status:obj['Active/Inactive']||'' });

            // ioDownloadMapに追加
            if(fileIoName){
                if(!ioDownloadMap[fileIoName]) ioDownloadMap[fileIoName] = [];
                ioDownloadMap[fileIoName].push(liName);
            }
        }

        files.push({ fileName, sheet:targetSheet, liCount:fileLis.length, lis:fileLis, ioName:fileIoName });
    });

    return { liMap, files, ioDownloadMap };
}

// ===== DSP用セグメントsheet解析 =====
function readDSPSegmentSheet(wb) {
    // シート名に「セグメント」を含むものを探す
    const sheetName = wb.SheetNames.find(n =>
        n === 'セグメント' || n.includes('セグメント')
    );
    if (!sheetName) return null;

    const ws = wb.Sheets[sheetName];
    if (!ws || !ws['!ref']) return null;

    const allRows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '', raw: false });

    // LIブロックリスト: [{ liNames:[], groups:[], notItems:[] }, ...]
    const blocks = [];
    let i = 0;

    while (i < allRows.length) {
    const row = allRows[i];
    const bVal = String(row[1] || '').trim();
    const cVal = String(row[2] || '').trim();

    // ★ 対象LI行の判定を明確化
    // 条件: B列が「対象LI」を含む行
    const isLIHeader = bVal === '対象LI' || bVal.includes('対象LI');

    if (!isLIHeader) { i++; continue; }

    // LI名をC列から取得（改行で分割）
    const liNames = cVal.split(/\n|\r\n|\r/)
        .map(s => s.trim())
        .filter(s => s.length > 0);

    if (liNames.length === 0) { i++; continue; }

    i++; // 対象LI行の次へ

    // 表頭行を探す（「セグメント」と「つなぎ方」を含む行）
    let foundHeader = false;
    for (let j = 0; j < 5 && i < allRows.length; j++, i++) {
        const hStr = allRows[i].join(' ');
        if (hStr.includes('セグメント') && hStr.includes('つなぎ方')) {
            foundHeader = true;
            i++; // 表頭行をスキップ
            break;
        }
    }

    if (!foundHeader) continue;

    // データ行を収集
    const groups = {};
    const notItems = [];

    while (i < allRows.length) {
        const dRow = allRows[i];
        const segName = String(dRow[1] || '').trim(); // B列
        const tsunagi = String(dRow[2] || '').trim(); // C列
        const groupVal = String(dRow[4] || '').trim(); // E列

        // 次の対象LIブロック開始を検出
        if (String(dRow[1] || '').trim() === '対象LI' ||
            String(dRow[1] || '').trim().includes('対象LI')) {
            break; // iをインクリメントせずbreak
        }

        // 空行チェック（B/C/E列すべて空）
if (segName === '' && tsunagi === '' && groupVal === '') {
    // ★ 次の非空行を先読みして判断
    let peekIdx = i + 1;
    while (peekIdx < allRows.length) {
        const peekRow = allRows[peekIdx];
        const peekB = String(peekRow[1] || '').trim();
        const peekC = String(peekRow[2] || '').trim();
        const peekE = String(peekRow[4] || '').trim();
        
        // 次のブロック開始（対象LI行）なら終了
        if (peekB === '対象LI' || peekB.includes('対象LI')) {
            i = peekIdx;
            break;
        }
        // 空行でない → まだ同じブロック内（Group間の空行）
        if (peekB !== '' || peekC !== '' || peekE !== '') {
            i = peekIdx; // 空行をスキップして継続
            break;
        }
        peekIdx++;
    }
    // peekIdxがallRows.lengthに達した → ファイル終端
    if (peekIdx >= allRows.length) {
        i = peekIdx;
        break;
    }
    // 次のブロック開始なら外側のwhileへ
    const checkRow = allRows[i];
    const checkB = String(checkRow[1] || '').trim();
    if (checkB === '対象LI' || checkB.includes('対象LI')) break;
    continue; // 同じブロック内→データ収集継続
}

        // 表頭キーワードはスキップ
        const TABLE_HEADERS = ['セグメント','つなぎ方','ステータス',
                               'Group','依頼日','メモ','Daily reach'];
        if (segName !== '' && !TABLE_HEADERS.includes(segName)) {
            if (tsunagi.toLowerCase() === 'not') {
                notItems.push(segName);
            } else {
                const gKey = groupVal || 'Group1';
                if (!groups[gKey]) groups[gKey] = [];
                groups[gKey].push(segName);
            }
        }
        i++;
    }

    // groups → 配列変換（Group1, Group2... の順）
    const groupKeys = Object.keys(groups).sort((a, b) => {
        const na = parseInt(a.replace(/\D/g, '')) || 0;
        const nb = parseInt(b.replace(/\D/g, '')) || 0;
        return na - nb;
    });

    const groupList = groupKeys.map(k => ({
        key: k,
        items: groups[k]
    }));

    blocks.push({ liNames, groups: groupList, notItems });
} return blocks.length > 0 ? blocks : null;
}

// セグメントsheetからLI名でブロックを検索
function findDSPSegmentBlock(blocks, liName) {
    if (!blocks || !blocks.length) return null;
    const liLower = liName.toLowerCase().trim();
    for (const block of blocks) {
        if (block.liNames.some(n => n.toLowerCase().trim() === liLower)) {
            return block;
        }
    }
    // 完全一致がない場合は部分一致
    for (const block of blocks) {
        if (block.liNames.some(n => {
            const nl = n.toLowerCase().trim();
            return nl.includes(liLower) || liLower.includes(nl);
        })) {
            return block;
        }
    }
    return null;
}

// DSPセグメントsheet vs 後台 Audience対比
function compareDSPSegment(block, dlRow) {
    if (!block) return { matched: null, diffs: ['セグメントsheetに対応するLIブロックが見つかりません'] };

    const arVal = dlRow ? (dlRow['Audiences - include'] || '') : '';
    const atVal = dlRow ? (dlRow['Audience names'] || '') : '';

    // ===== AT列: ID → 名前マッピング =====
    const idToName = {};
    if (atVal) {
        for (const item of atVal.split(/[;；\n]/)) {
            const it = item.trim();
            if (!it) continue;
            const m = it.match(/^(.+?)\s*\((\d{5,})\)\s*$/);
            if (m) {
                idToName[m[2].trim()] = _normalizeAudienceName(m[1]);
            }
        }
    }

    // ===== AR列: AND組・NOT構造を解析 =====
    let arMain = arVal;
    const dNotNames = [];

    // NOT部分を抽出
    const notMatch = arVal.match(/\[NOT\s+([^\]]+)\]/i);
    if (notMatch) {
        const notIds = notMatch[1].split(/[;；\s]+/).filter(s => s.trim());
        for (const nid of notIds) {
            const n = nid.trim();
            if (n && idToName[n]) dNotNames.push(idToName[n]);
        }
        arMain = arVal.substring(0, notMatch.index).trim();
    }

    // include部分のAND組を抽出
    const parenGroups = [...arMain.matchAll(/\(([^)]+)\)/g)];
    const dGroups = []; // [[名前, ...], ...]

    for (const pg of parenGroups) {
        const ids = pg[1].split(/[;；\s]+/).filter(s => s.trim());
        const names = [];
        for (const id of ids) {
            const id2 = id.trim();
            if (!id2) continue;
            if (idToName[id2]) {
                names.push(idToName[id2]);
            } else if (/^\d{5,}$/.test(id2)) {
                names.push(`(UnknownID:${id2})`);
            }
        }
        if (names.length > 0) dGroups.push(names);
    }

    const sGroups = block.groups;   // [{ key, items }, ...]
    const sNotItems = block.notItems;

    const diffs = [];
    let allMatch = true;

    // ===== Groupの数を比較 =====
    // NOT以外のsGroupsとdGroupsの数
    const sIncludeCount = sGroups.length;
    const dIncludeCount = dGroups.length;

    if (sIncludeCount !== dIncludeCount) {
    // グループ数が違っても名前チェックで判断するため、falseにしない
    diffs.push(
        `【参考】ANDグループ数が異なります（設定表: ${sIncludeCount} / 後台: ${dIncludeCount}）`
    );
}

    // ===== 各GroupのセグメントをAT列と照合 =====
    // 後台の全名前（NOT以外）
    const dAllIncludeNames = dGroups.flat();

    sGroups.forEach((sGroup, idx) => {
        const missingInD = sGroup.items.filter(sName => {
            const sLower = sName.toLowerCase().trim();
            return !dAllIncludeNames.some(dName => {
                const dLower = dName.toLowerCase().trim();
                return dLower === sLower ||
                    dLower.includes(sLower) ||
                    sLower.includes(dLower);
            });
        });
        if (missingInD.length > 0) {
            allMatch = false;
            diffs.push(
                `【${sGroup.key}】後台に見つからないセグメント:\n  → ${missingInD.join('\n  → ')}`
            );
        }
    });

    // 後台にあって設定表にないもの（UnknownIDを除く）
    const sAllIncludeNames = sGroups.flatMap(g => g.items);
    const onlyInD = dAllIncludeNames.filter(dName => {
        if (dName.startsWith('(UnknownID:')) return false;
        const dLower = dName.toLowerCase().trim();
        return !sAllIncludeNames.some(sName => {
            const sLower = sName.toLowerCase().trim();
            return dLower === sLower ||
                dLower.includes(sLower) ||
                sLower.includes(dLower);
        });
    });
    if (onlyInD.length > 0) {
        allMatch = false;
        diffs.push(
            `【後台にあるが設定表に記載なし】\n  → ${onlyInD.join('\n  → ')}`
        );
    }

    // ===== NOT条件の照合 =====
    const sNotSet = sNotItems.map(n => n.toLowerCase().trim());
    const dNotSet = dNotNames.map(n => n.toLowerCase().trim());

    const onlySNot = sNotItems.filter(sn =>
        !dNotSet.some(dn => dn === sn.toLowerCase().trim() || dn.includes(sn.toLowerCase().trim()))
    );
    const onlyDNot = dNotNames.filter(dn =>
        !sNotSet.some(sn => sn === dn.toLowerCase().trim() || sn.includes(dn.toLowerCase().trim()))
    );

    if (onlySNot.length > 0) {
        allMatch = false;
        diffs.push(`【NOT条件: 設定表にあるが後台未設定】\n  → ${onlySNot.join('\n  → ')}`);
    }
    if (onlyDNot.length > 0) {
        allMatch = false;
        diffs.push(`【NOT条件: 後台にあるが設定表に記載なし】\n  → ${onlyDNot.join('\n  → ')}`);
    }

    return { matched: allMatch, diffs };
}

function _extractIOName(ws){
    const allRows = XLSX.utils.sheet_to_json(ws,{header:1,defval:'',raw:false});
    let orderName='', settingOrderName='';
    for(let i=0; i<Math.min(60,allRows.length); i++){
        const row=allRows[i];
        for(let c=0; c<row.length; c++){
            const cell=String(row[c]||'').trim();
            if(cell.includes('設定Order名')){
                const v=String(row[c+1]||'').trim();
                if(v){ settingOrderName=v; break; }
            }
            if(cell.includes('Order名')&&!cell.includes('設定')&&!orderName){
                const v=String(row[c+1]||'').trim();
                if(v) orderName=v;
            }
        }
        if(settingOrderName) break;
    }
    return settingOrderName || orderName || '';
}

    { key:'Daypart period', ja:'デイパート期間',
  checkFn:(s,v)=>{
    const daypart = (s.daypart||'').trim();
    if(!daypart) return null; // 設定表空 → チェック対象外

    // ===== 設定表 → 5桁コード変換 =====
    const DAY_MAP = {
        'sunday':0,'monday':1,'tuesday':2,'wednesday':3,
        'thursday':4,'friday':5,'saturday':6
    };

    function timeToCode(t, isEnd){
        const s = t.trim().toUpperCase();
        // 12 AM
        if(s === '12 AM'){
            return isEnd ? '24' : '00';
        }
        // 12 PM
        if(s === '12 PM') return '12';
        const m = s.match(/^(\d{1,2})\s*(AM|PM)$/i);
        if(!m) return null;
        let h = parseInt(m[1]);
        const period = m[2].toUpperCase();
        if(period === 'PM' && h !== 12) h += 12;
        if(period === 'AM' && h === 12) h = 0;
        return String(h).padStart(2,'0');
    }

    function settingToCodes(text){
        const codes = new Set();
        // 各行をパース: "Monday: 12 AM - 2 AM, 5 AM - 12 AM"
        const lines = text.split('\n').map(l=>l.trim()).filter(l=>l);
        for(const line of lines){
            // 曜日を取得
            const dayMatch = line.match(/^(\w+)\s*:/i);
            if(!dayMatch) continue;
            const dayName = dayMatch[1].toLowerCase();
            const dayCode = DAY_MAP[dayName];
            if(dayCode === undefined) continue;

            // 時間帯部分を取得
            const timePart = line.substring(line.indexOf(':')+1).trim();
            // カンマで分割
            const segments = timePart.split(',').map(s=>s.trim()).filter(s=>s);
            for(const seg of segments){
                // "12 AM - 2 AM" 形式をパース
                const timeMatch = seg.match(/^(.+?)\s*-\s*(.+)$/);
                if(!timeMatch) continue;
                const startCode = timeToCode(timeMatch[1], false);
                const endCode   = timeToCode(timeMatch[2], true);
                if(startCode === null || endCode === null) continue;
                codes.add(`${startCode}${endCode}${dayCode}`);
            }
        }
        return codes;
    }

    // ===== 下载データをパース =====
    function downloadToCodes(text){
        const codes = new Set();
        text.split(';').map(s=>s.trim()).filter(s=>s).forEach(c=>{
            if(c.length === 5) codes.add(c);
        });
        return codes;
    }

    const sCodes = settingToCodes(daypart);
    const dCodes = downloadToCodes(v||'');

    if(sCodes.size === 0) return null;
    if(dCodes.size === 0) return false; // ❌ 設定表あるのに下载空

    // 比較
    const onlyS = [...sCodes].filter(c => !dCodes.has(c));
    const onlyD = [...dCodes].filter(c => !sCodes.has(c));

    if(onlyS.length === 0 && onlyD.length === 0){
        return true;  // ✅ 完全一致
    }

    // 差異詳細を保存
    if(onlyS.length > 0){
        s.__daypart_diff__ = `設定表にあるが後台未設定：${onlyS.join('; ')}`;
    }
    if(onlyD.length > 0){
        s.__daypart_diff__ = (s.__daypart_diff__||'') +
            `\n後台にあるが設定表に記載なし：${onlyD.join('; ')}`;
    }

    return false; // ❌ 不一致
  }

// ===== マッチング（IO名優先ロジック追加） =====
function matchAndCompareDSP(settingData, downloadMap, system){
    const results=[];
    for(const sRow of settingData){
        const liName=sRow.__LI_NAME__;
        const ioName=sRow.__IO_NAME__||'';
        let dRow=null, matchedName=liName;

        // ① 同名完全一致
        if(downloadMap[liName]) dRow=downloadMap[liName];

        // ② IO名でスコープを絞って検索
        if(!dRow && ioName){
            const scopedNames = Object.keys(downloadMap).filter(n=>{
                const d = downloadMap[n];
                return (d.__IO_NAME_D__ && d.__IO_NAME_D__.includes(ioName)) ||
                       (ioName && d.__IO_NAME_D__ && ioName.includes(d.__IO_NAME_D__));
            });
            const fuzzy = scopedNames.find(n=>{
                const nl=n.toLowerCase(), ll=liName.toLowerCase();
                if(nl===ll) return true;
                if(nl.includes(ll)&&ll.length/nl.length>0.7) return true;
                if(ll.includes(nl)&&nl.length/ll.length>0.7) return true;
                return false;
            });
            if(fuzzy){ dRow=downloadMap[fuzzy]; matchedName=fuzzy; }
        }

        // ③ 全体からファジー検索（フォールバック）
        if(!dRow){
            const dlNames=Object.keys(downloadMap);
            const fuzzy=dlNames.find(n=>{
                const nl=n.toLowerCase(), ll=liName.toLowerCase();
                if(nl===ll) return true;
                if(nl.includes(ll)&&ll.length/nl.length>0.7) return true;
                if(ll.includes(nl)&&nl.length/ll.length>0.7) return true;
                return false;
            });
            if(fuzzy){ dRow=downloadMap[fuzzy]; matchedName=fuzzy; }
        }

        const found=!!dRow;
        function dGet(key){
            if(!dRow) return '';
            if(dRow[key]!==undefined) return String(dRow[key]||'');
            const aliases=DL_COL_ALIASES[key]||[];
            for(const a of aliases){ if(dRow[a]!==undefined) return String(dRow[a]||''); }
            return '';
        }
        const colResults = DL_COLUMNS.map(col => {
    const dVal = dGet(col.key);
    const sVal = _getSettingValForCol(col.key, sRow);
    let result = null;
    if(found && col.checkFn){
        try{ result = col.checkFn(sRow, dVal, dRow); }  // ← 加第3个参数 dRow
        catch(e){ result = null; }
    }
    return { key:col.key, ja:col.ja, sVal, dVal, result };
});
        results.push({
    liName,
    __IO_NAME__:sRow.__IO_NAME__||'',
    __SHEET__:sRow.__SHEET__||'',
    __FILE_S__:sRow.__FILE_S__||'',
    found,
    matchedName:dRow?matchedName:null,
    matchedIOName:dRow?(dRow.__IO_NAME_D__||''):'',
    matchedFileD:dRow?(dRow.__FILE_D__||''):'',
    isPause:dRow?(dRow['Active/Inactive']||'').toLowerCase()==='pause':null,
    activeStatus:dRow?dRow['Active/Inactive']:'',
    colResults,
    mismatchCount:colResults.filter(c=>c.result===false).length,
    // ★ sRowから差異情報を引き継ぐ
    __audience_diff__:      sRow.__audience_diff__      || '',
    __location_diff__:      sRow.__location_diff__      || '',
    __location_excl_diff__: sRow.__location_excl_diff__ || '',
    __daypart_diff__:       sRow.__daypart_diff__        || '',
    __brand_content_note__: sRow.__brand_content_note__ || '',
    __brand_tier_note__:    sRow.__brand_tier_note__     || '',
});
    }
    return results;
}

// ===== IO名フィルター =====
function scApplyIOFilter(){
    const checkedIOs=new Set(
        [...document.querySelectorAll('.sc-io-filter-cb:checked')].map(cb=>cb.dataset.io)
    );
    if(!scResults||!scResults.items) return;
    let visibleNo=0;
    scResults.items.forEach((item,idx)=>{
        const ioName=item.__IO_NAME__||'';
        const show=checkedIOs.size===0||checkedIOs.has(ioName);
        document.querySelectorAll(`.sc-li-row[data-li-idx="${idx}"]`).forEach(r=>{
            r.style.display=show?'':'none';
        });
        const bar=document.getElementById(`sc-hidden-bar-${idx}`);
        if(bar) bar.style.display=show?'':'none';
        if(show){
            visibleNo++;
            const rows=document.querySelectorAll(`.sc-li-row[data-li-idx="${idx}"]`);
            const noCell=rows[0]?rows[0].querySelector('td[rowspan="2"]'):null;
            if(noCell) noCell.textContent=visibleNo;
        }
    });
}
function scIOSelectAll(val){
    document.querySelectorAll('.sc-io-filter-cb').forEach(cb=>{ cb.checked=val; });
    scApplyIOFilter();
}

            if(!item.found) badges.push(`<span style="background:#95a5a6;color:white;border-radius:3px;padding:1px 6px;font-size:0.68rem;">後台未発見</span>`);

            html+=`
            <tr class="sc-li-row" data-li-idx="${idx}" data-io="${esc(ioName)}" data-status="${rowStatus}"

                    <div onmousedown="scColResizeLI(event)"

                                    word-break:break-all;flex:1;">

                        <button onclick="scHideLiRow(${idx})"

                                   color:#bbb;flex-shrink:0;line-height:1.4;"
                            onmouseover="this.style.background='#8e44ad';this.style.color='white';this.style.borderColor='#8e44ad';"

            if(!item.found){

                    const dVal=cr?String(cr.dVal||'').trim():'';
                    const result=cr?cr.result:null;
                    const effectiveResult=(result===null&&!dVal&&!sVal)?true:result;
                    const bg=effectiveResult===false?'#fde8e8':(result===null&&dVal)?'#fef9e7':'white';
                    const border=effectiveResult===false?'1px solid #f5b7b1':(result===null&&dVal)?'1px solid #f9ca24':'1px solid #e8e8e8';
                    const color=effectiveResult===false?'#922b21':(result===null&&dVal)?'#856404':'#333';
                    const hideStyle=col.autoHide?'display:none;':'';
                    html+=`<td data-col-key="${col.key}"

                               white-space:nowrap;text-overflow:ellipsis;text-align:left !important;${hideStyle}"
                        title="${esc(sVal)}"
                        onclick="var e=this.classList.toggle('sc-exp');this.style.whiteSpace=e?'pre-wrap':'nowrap';this.style.height=e?'auto':'28px';this.style.overflow=e?'visible':'hidden';this.style.setProperty('text-align','left','important');">

                // ダウンロード値行
                html+=`<tr class="sc-li-row" data-li-idx="${idx}" data-io="${esc(ioName)}" data-status="${rowStatus}"
                    style="border-bottom:3px solid #ddd;">`;
                visibleCols.forEach(col=>{
                    const cr=item.colResults?item.colResults.find(c=>c.key===col.key):null;

                    const result=cr?cr.result:null;

                    const bg=effectiveResult===false?'#fde8e8':(result===null&&dVal)?'#fef9e7':'white';
                    const border=effectiveResult===false?'1px solid #f5b7b1':(result===null&&dVal)?'1px solid #f9ca24':'1px solid #e8e8e8';
                    const confirmLabel=(result===null&&dVal)?'<span style="font-size:0.68rem;color:#856404;margin-left:4px;">要確認</span>':'';
                    const hideStyle=col.autoHide?'display:none;':'';
                    html+=`<td data-col-key="${col.key}"
                        style="padding:4px 8px;${border};border-left:2px solid #ccc;background:${bg};
                               vertical-align:middle;height:28px;overflow:hidden;
                               white-space:nowrap;text-overflow:ellipsis;text-align:left !important;${hideStyle}"
                        title="${esc([dVal, item[col.key==='Brand suitability content exclusion categories'?'__brand_content_note__':
col.key==='Brand suitability inventory tier'?'__brand_tier_note__':
col.key==='Audience names'?'__audience_diff__':'']||''].filter(Boolean).join('\n'))}"
                        onclick="var e=this.classList.toggle('sc-exp');this.style.whiteSpace=e?'pre-wrap':'nowrap';this.style.height=e?'auto':'28px';this.style.overflow=e?'visible':'hidden';this.style.setProperty('text-align','left','important');">
                        <span style="font-size:0.73rem;text-align:left;display:block;${effectiveResult===false?'color:#c0392b;font-weight:bold':effectiveResult===true?'color:#333':'color:#856404'};">
                            ${dVal||'<span style="color:#ccc;">—</span>'}
                        </span>
                        ${confirmLabel}
                        ${(()=>{
    const noteKey = col.key === 'Brand suitability content exclusion categories'
        ? '__brand_content_note__'
        : col.key === 'Brand suitability inventory tier'
        ? '__brand_tier_note__'
        : col.key === 'Audience names'
        ? '__audience_diff__'
        : null;
    const note = noteKey ? (item[noteKey]||'') : '';
    if(!note) return '';
    const noteColor = note.startsWith('❌') ? '#e74c3c'
                    : note.startsWith('⚠️') ? '#856404'
                    : '#666';
    return `<div style="font-size:0.65rem;color:${noteColor};
                white-space:pre-wrap;word-break:break-all;
                margin-top:2px;line-height:1.4;">${esc(note)}</div>`;
})()}
                    </td>`;
                });
                html+=`</tr>`;
            }
        });
    });

    // 寄存LI行
    if(kissonLIs.length>0){
        kissonLIs.forEach((ki,kidx)=>{
            const startStr=ki.startDate?ki.startDate.toISOString().slice(0,10):(ki.dRow['Line start date']||'');
            html+=`<tr class="sc-kisson-row" style="display:none;background:#f5eeff;">
                <td style="background:#6c3483;color:white;text-align:center;font-weight:bold;
                           font-size:0.75rem;border:1px solid #9b59b6;
                           position:sticky;left:0;z-index:10;">K${kidx+1}</td>
                <td style="border:1px solid #d7bde2;padding:6px 8px;
                           position:sticky;left:${SC_COL_NO_W}px;z-index:10;
                           background:#f5eeff;overflow:hidden;">
                    <div style="font-weight:bold;font-size:0.75rem;color:#6c3483;word-break:break-all;">
                        ${esc(ki.liName)}
                    </div>
                    <div style="margin-top:2px;">
                        <span style="background:#9b59b6;color:white;border-radius:3px;
                                     padding:1px 6px;font-size:0.68rem;">🗄️ 寄存LI</span>
                        <span style="color:#999;font-size:0.68rem;margin-left:4px;">開始: ${startStr}</span>
                        ${ki.dRow.__FILE_D__?`<span style="color:#9b59b6;font-size:0.65rem;margin-left:4px;">📥 ${ki.dRow.__FILE_D__}</span>`:''}
                    </div>
                </td>`;
            visibleCols.forEach(col=>{
                const aliases=DL_COL_ALIASES[col.key]||[];
                let dVal=ki.dRow[col.key]||'';
                if(!dVal){for(const a of aliases){if(ki.dRow[a]){dVal=ki.dRow[a];break;}}}
                dVal=String(dVal).trim();
                html+=`<td data-col-key="${col.key}"
                           style="padding:4px 8px;border:1px solid #e8e8e8;
                                  background:#f5eeff;vertical-align:middle;
                                  overflow:hidden;white-space:nowrap;text-overflow:ellipsis;"
                           title="${esc(dVal)}">
                    <span style="font-size:0.73rem;color:#6c3483;">
                        ${dVal||'<span style="color:#ccc;">—</span>'}
                    </span>
                </td>`;
            });
            html+=`</tr>`;
        });
    }

    html+=`</tbody></table></div></div>`;
    result.innerHTML=html;

    // 固定ヘッダー初期化（変更なし）
    setTimeout(()=>{
        const ps=document.getElementById('page-sticky');
        const fixedHead=document.getElementById('sc-fixed-head');
        const bodyScroll=document.getElementById('sc-body-scroll');
        const outerWrap=document.getElementById('sc-outer-wrap');
        const dummyHead=document.getElementById('sc-dummy-head');
        if(!bodyScroll||!outerWrap) return;

        function updateStickycols(){
    // ★ 水平スクロール同期：データ本体 → 固定表頭
    const scrollLeft = bodyScroll.scrollLeft;
    const theadScroller = document.getElementById('sc-thead-scroller');
    if(theadScroller){
        theadScroller.scrollLeft = scrollLeft;
    }
    // ★ No./LI名称列の固定はCSS sticky に任せる（transformは不要）
}

        bodyScroll.addEventListener('scroll',()=>{updateStickycols();updateFixedHead();},{passive:true});

        function syncHeadWidth(){
    const theadContainer = document.getElementById('sc-thead-container');
    const theadScroller  = document.getElementById('sc-thead-scroller');
    if(theadContainer && bodyScroll){
        theadContainer.style.width = bodyScroll.offsetWidth + 'px';
    }
    // 表頭の実際の高さを取得してsc-outer-wrapのpadding-topに反映
    if(theadContainer){
        const h = theadContainer.offsetHeight;
        // sc-outer-wrapの上部に表頭分の余白を確保（既にstickyで重ならないようにする）
    }
}

        function updateFixedHead(){
    // 表頭の幅をbodyScrollに合わせて同期
    const theadContainer = document.getElementById('sc-thead-container');
    if(theadContainer && bodyScroll){
        theadContainer.style.width = bodyScroll.offsetWidth + 'px';
    }
}

        window.addEventListener('scroll',updateFixedHead,{passive:true});
        window.addEventListener('resize',()=>{syncHeadWidth();updateFixedHead();},{passive:true});
        updateFixedHead();
    },200);
}

// ===== 以下、既存関数（変更なし） =====
function scFilterResult(filter){
    scCurrentFilter=filter;
    ['all','mismatch','match'].forEach(f=>{
        const btn=document.getElementById('sc-btn-'+f);
        if(!btn) return;
        btn.style.background=f===filter?'#2980b9':'transparent';
        btn.style.color=f===filter?'white':'#666';
        btn.style.border=f===filter?'none':'1px solid #ddd';
    });
    const processedIdx=new Set();
    document.querySelectorAll('.sc-li-row').forEach(row=>{
        const status=row.dataset.status;
        const idx=row.dataset.liIdx;
        if(processedIdx.has(idx)) return;
        processedIdx.add(idx);
        const show=filter==='all'?true:filter==='mismatch'&&(status==='mismatch'||status==='notfound')?true:filter==='match'&&status==='match'?true:false;
        document.querySelectorAll(`.sc-li-row[data-li-idx="${idx}"]`).forEach(r=>{ r.style.display=show?'':'none'; });
        const bar=document.getElementById(`sc-hidden-bar-${idx}`);
        if(bar) bar.style.display=show?'':'none';
    });
    document.querySelectorAll('.sc-kisson-row').forEach(r=>{
        if(filter==='mismatch'||filter==='match') r.style.display='none';
        else r.style.display=_scKissonVisible?'':'none';
    });
    // IO グループヘッダーも連動
    document.querySelectorAll('.sc-io-group-header').forEach(header=>{
        header.style.display='';
    });
}

function scToggleKisson(){
    _scKissonVisible=!_scKissonVisible;
    document.querySelectorAll('.sc-kisson-row').forEach(r=>{r.style.display=_scKissonVisible?'':'none';});
    const btn=document.getElementById('sc-kisson-btn');
    if(btn){
        const cnt=document.querySelectorAll('.sc-kisson-row').length;
        btn.textContent=_scKissonVisible?`🗄️ 寄存LI を非表示`:`🗄️ 寄存LI を表示（${cnt}件）`;
        btn.style.background=_scKissonVisible?'#6c3483':'#8e44ad';
    }
}

function resetSettingCheck(){
    scFilesS=[]; scFilesD=[]; scWbsS=[]; scWbsD=[];
    scResults=null; scCurrentFilter='all'; _scKissonVisible=false;
    ['setting','download'].forEach(side=>{
        const icon=side==='setting'?'📋':'📥';
        const label=side==='setting'?'設定表':'ダウンロードデータ';
        const drop=document.getElementById('sc-drop-'+side);
        drop.innerHTML=`<div class="drop-icon">${icon}</div>
            <div class="drop-text">拖入${label}</div>
            <div class="drop-sub">支持 .xlsx / .xls（複数可）</div>
            <input type="file" id="sc-input-${side}" accept=".xlsx,.xls" multiple style="display:none">`;
        initScMultiDrop(side);
        const info=document.getElementById('sc-'+(side==='setting'?'setting':'download')+'-info');
        if(info) info.innerHTML='';
    });
    document.getElementById('sc-controls').style.display='none';
    document.getElementById('sc-result-area').innerHTML='';
    document.getElementById('sc-progress').classList.remove('show');
    document.getElementById('sc-filter-btns').style.display='none';
}

// ===== グローバル公開 =====
const _scHiddenLIs=new Set();
window.scHideLiRow=function(idx){
    const rows=document.querySelectorAll(`.sc-li-row[data-li-idx="${idx}"]`);
    const barId=`sc-hidden-bar-${idx}`;
    if(_scHiddenLIs.has(idx)){
        _scHiddenLIs.delete(idx);
        rows.forEach(r=>r.style.display='');
        const bar=document.getElementById(barId);
        if(bar) bar.remove();
    } else {
        _scHiddenLIs.add(idx);
        rows.forEach(r=>r.style.display='none');
        const firstRow=document.querySelector(`.sc-li-row[data-li-idx="${idx}"]`);
        if(firstRow&&firstRow.parentElement){
            const item=scResults.items[idx];
            const bar=document.createElement('tr');
            bar.id=barId;
            bar.style.cssText='background:#f5f5f5;border-bottom:1px solid #ddd;';
            bar.innerHTML=`
                <td style="background:#e0e0e0;color:#999;text-align:center;padding:2px 4px;
                           border:1px solid #ccc;font-size:0.72rem;
                           position:sticky;left:0;z-index:10;">🗄️</td>
                <td style="padding:3px 10px;border:1px solid #ddd;
                           position:sticky;left:${SC_COL_NO_W}px;z-index:10;background:#f5f5f5;">
                    <span style="color:#bbb;font-size:0.74rem;font-style:italic;">${esc(item.liName)}</span>
                    <button onclick="scHideLiRow(${idx})"
                        style="background:none;border:none;color:#3498db;cursor:pointer;
                               font-size:0.74rem;margin-left:8px;text-decoration:underline;padding:0;">再表示</button>
                </td>
                <td colspan="999" style="border:1px solid #ddd;background:#f5f5f5;
                                         color:#ccc;font-size:0.72rem;padding:3px 8px;">
                    — 非表示中（寄存LIとしてマーク）
                </td>`;
            firstRow.parentElement.insertBefore(bar,firstRow);
        }
    }
    const count=_scHiddenLIs.size;
    const countEl=document.getElementById('sc-hidden-count');
    if(countEl){
        countEl.textContent=count>0?`🗄️ 非表示：${count}件`:'';
        countEl.style.display=count>0?'inline-block':'none';
    }
};

window.scApplyIOFilter=scApplyIOFilter;
window.scIOSelectAll=scIOSelectAll;
window.scRestoreAllHidden=function(){
    _scHiddenLIs.forEach(idx=>{
        document.querySelectorAll(`.sc-li-row[data-li-idx="${idx}"]`).forEach(r=>{r.style.display='';});
        const bar=document.getElementById(`sc-hidden-bar-${idx}`);
        if(bar) bar.remove();
    });
    _scHiddenLIs.clear();
    const countEl=document.getElementById('sc-hidden-count');
    if(countEl){countEl.textContent='';countEl.style.display='none';}
};

let _scResizing=null;
window.scColResizeStart=function(e,colIdx){
    e.preventDefault();
    const startX=e.clientX;
    const bodyCol=document.getElementById(`sc-col-b-${colIdx}`);
    if(!bodyCol) return;
    const headCol=document.getElementById(`sc-col-h-${colIdx}`);
    const startW=parseInt(bodyCol.style.width)||120;
    _scResizing={colIdx,startX,startW,bodyCol,headCol};
    document.addEventListener('mousemove',_scColResizeMove);
    document.addEventListener('mouseup',_scColResizeEnd);
    document.body.style.cursor='col-resize';
    document.body.style.userSelect='none';
};
window.scColResizeLI=function(e){
    e.preventDefault();
    const startX=e.clientX;
    const bodyCol=document.getElementById('sc-col-b-li');
    const headCol=document.getElementById('sc-col-h-li');
    if(!bodyCol) return;
    const startW=parseInt(bodyCol.style.width)||180;
    function onMove(e){const newW=Math.max(80,startW+e.clientX-startX);bodyCol.style.width=newW+'px';if(headCol)headCol.style.width=newW+'px';}
    function onUp(){document.removeEventListener('mousemove',onMove);document.removeEventListener('mouseup',onUp);document.body.style.cursor='';document.body.style.userSelect='';}
    document.addEventListener('mousemove',onMove);
    document.addEventListener('mouseup',onUp);
    document.body.style.cursor='col-resize';
    document.body.style.userSelect='none';
};
function _scColResizeMove(e){
    if(!_scResizing) return;
    const{startX,startW,colIdx}=_scResizing;
    const newW=Math.max(60,startW+e.clientX-startX);
    const bodyCol=document.getElementById(`sc-col-b-${colIdx}`);
    if(bodyCol) bodyCol.style.width=newW+'px';
    const headCol=document.getElementById(`sc-col-h-${colIdx}`);
    if(headCol) headCol.style.width=newW+'px';
}
function _scColResizeEnd(){
    if(!_scResizing) return;
    _scResizing=null;
    document.removeEventListener('mousemove',_scColResizeMove);
    document.removeEventListener('mouseup',_scColResizeEnd);
    document.body.style.cursor='';
    document.body.style.userSelect='';
}

window.scToggleColPanel=function(){
    const body=document.getElementById('sc-col-panel-body');
    const arrow=document.getElementById('sc-col-panel-arrow');
    if(!body||!arrow) return;
    const isOpen=body.style.display!=='none';
    body.style.display=isOpen?'none':'flex';
    arrow.textContent=isOpen?'▼':'▲';
};
window.scToggleCol=function(checkbox){
    const key=checkbox.dataset.colKey;
    const show=checkbox.checked;
    document.querySelectorAll(`#sc-result-area [data-col-key="${CSS.escape(key)}"]`).forEach(el=>{el.style.display=show?'':'none';});
};

window.runSettingCheck=runSettingCheck;
window.resetSettingCheck=resetSettingCheck;
window.scFilterResult=scFilterResult;
window.scToggleKisson=scToggleKisson;
window._scGetResults=function(){return scResults;};
window._scGetDownloadMap=function(){
    if(scResults&&scResults.downloadData){

        if(first){console.log('列名：');Object.keys(first).forEach((k,i)=>console.log(i+': "'+k+'"'));}
    }
};
