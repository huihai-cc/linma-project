<header>
    <h1>🧹 Excel清洗</h1>
    <span class="badge">🔒 完全本地运行</span>

<div class="back-nav">

<div class="input-area">

        <div class="drop-icon">🧹</div>

    <button class="btn-check" onclick="runXlClean()">🧹 开始清洗并导出</button>

        <label class="xl-clean-opt"><input type="checkbox" id="opt-zws" checked> ZWS零宽空格</label>

        <label class="xl-clean-opt"><input type="checkbox" id="opt-nbsp" checked> NBSP→普通空格</label>
        <label class="xl-clean-opt"><input type="checkbox" id="opt-pua" checked> PDF私用字符</label>
        <label class="xl-clean-opt"><input type="checkbox" id="opt-fullsp"> 全角空格（可选）</label>
    </div>
</div>

<div class="xl-progress" id="xlclean-progress">⏳ 正在扫描...</div>
<div style="padding:0 20px 20px" id="xlclean-result"></div>

<script>
'use strict';

// ===== CDN加载器 =====
const LibLoader = {
    _cache: {},
    load(name, urls) {
        if (this._cache[name]) return this._cache[name];
        const tryLoad = (urlList) => {
            if (!urlList.length) return Promise.reject(new Error(`${name} 加载失败`));
            return new Promise((resolve, reject) => {
                const s = document.createElement('script');
                s.src = urlList[0];
                s.onload = resolve;
                s.onerror = () => tryLoad(urlList.slice(1)).then(resolve).catch(reject);
                document.head.appendChild(s);
            });
        };
        this._cache[name] = tryLoad(Array.isArray(urls) ? urls : [urls]);
        return this._cache[name];
    },
    loadXLSX() {
        return this.load('xlsx', [
            './xlsx.full.min.js',
            'https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js',
            'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js',
        ]);
    },
    loadJSZip() {
        return this.load('jszip', [
            './jszip.min.js',
            'https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js',
        ]);
    },
};

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

let xlcleanFile = null;

document.addEventListener('DOMContentLoaded', function(){
    initXlCleanDrop();
});

function initXlCleanDrop() {
    const drop = document.getElementById('xlclean-drop');
    const input = document.getElementById('xlclean-input');
    drop.addEventListener('click', () => input.click());
    input.addEventListener('change', e => { if(e.target.files[0]) handleXlCleanFile(e.target.files[0]); });
    drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('dragover'); });
    drop.addEventListener('dragleave', () => drop.classList.remove('dragover'));
    drop.addEventListener('drop', e => {
        e.preventDefault(); drop.classList.remove('dragover');
        if(e.dataTransfer.files[0]) handleXlCleanFile(e.dataTransfer.files[0]);
    });
}

function handleXlCleanFile(file) {
    if(!file.name.match(/\.(xlsx|xls)$/i)) { alert('请上传 Excel 文件（.xlsx 或 .xls）'); return; }
    xlcleanFile = file;
    const drop = document.getElementById('xlclean-drop');
    drop.innerHTML = `
        <div class="drop-icon">✅</div>
        <div class="drop-text">${file.name}</div>
        <div class="drop-sub">文件大小：${(file.size/1024/1024).toFixed(2)} MB　点击重新选择</div>
        <input type="file" id="xlclean-input" accept=".xlsx,.xls" style="display:none">
    `;
    document.getElementById('xlclean-input').addEventListener('change', e => {
        if(e.target.files[0]) handleXlCleanFile(e.target.files[0]);
    });
    drop.onclick = () => document.getElementById('xlclean-input').click();
    document.getElementById('xlclean-controls').style.display = 'flex';
    document.getElementById('xlclean-controls').style.flexWrap = 'wrap';
    scanXlFile(file);
}

const INV_CHARS = [
    { code: 0x200B, name: 'ZWS',  label: 'ZWS零宽空格',   badge: 'zws',   optId: 'opt-zws'  },
    { code: 0x200C, name: 'ZWNJ', label: 'ZWNJ零宽非连接', badge: 'other', optId: 'opt-zws'  },
    { code: 0x200D, name: 'ZWJ',  label: 'ZWJ零宽连接',    badge: 'other', optId: 'opt-zws'  },
    { code: 0xFEFF, name: 'BOM',  label: 'BOM字节标记',    badge: 'bom',   optId: 'opt-bom'  },
    { code: 0x2060, name: 'WJ',   label: 'WJ词连接符',     badge: 'bom',   optId: 'opt-bom'  },
    { code: 0x00AD, name: 'SHY',  label: 'SHY软连字符',    badge: 'other', optId: 'opt-bom'  },
    { code: 0x00A0, name: 'NBSP', label: 'NBSP不间断空格',  badge: 'nbsp',  optId: 'opt-nbsp' },
    { code: 0x034F, name: 'CGJ',  label: 'CGJ组合图形',    badge: 'other', optId: 'opt-zws'  },
    { code: 0x180E, name: 'MVS',  label: 'MVS蒙古分隔符',  badge: 'other', optId: 'opt-zws'  },
    { code: 0xFFFD, name: 'REPL', label: '替换字符',       badge: 'other', optId: 'opt-pua'  },
    { code: 0x3000, name: 'IDSP', label: '全角空格',        badge: 'other', optId: 'opt-fullsp'},
];

function getInvCharRule(code) {
    if(code >= 0xE000 && code <= 0xF8FF) {
        return { code, name: 'PUA', label: 'PDF私用字符', badge: 'other', optId: 'opt-pua' };
    }
    return INV_CHARS.find(i => i.code === code) || null;
}

function isOptionEnabled(optId, opts) {
    if(!opts) return true;
    const optKey = {
        'opt-zws': 'zws',
        'opt-bom': 'bom',
        'opt-nbsp': 'nbsp',
        'opt-pua': 'pua',
        'opt-fullsp': 'fullsp',
    }[optId];
    return optKey ? opts[optKey] !== false : true;
}

function shouldCleanInvChar(ch, opts) {
    const rule = getInvCharRule(ch.codePointAt(0));
    return !!rule && isOptionEnabled(rule.optId, opts);
}

function getInvCharsInText(text) {
    const found = [];
    for(const ch of [...text]) {
        const code = ch.codePointAt(0);
        const inv = getInvCharRule(code);
        if(inv) found.push(inv);
    }
    return found;
}

function scanXlFile(file) {
    const progress = document.getElementById('xlclean-progress');
    const result = document.getElementById('xlclean-result');
    progress.textContent = '⏳ 正在读取文件...';
    progress.classList.add('show');
    result.innerHTML = '';
    if(typeof XLSX === 'undefined') {
        LibLoader.loadXLSX().then(() => doScanXlFile(file));
    } else {
        doScanXlFile(file);
    }
}

function doScanXlFile(file) {
    const progress = document.getElementById('xlclean-progress');
    const reader = new FileReader();
    reader.onload = function(e) {
        try {
            progress.textContent = '⏳ 正在扫描单元格...';
            const data = new Uint8Array(e.target.result);
            const wb = XLSX.read(data, { type: 'array', cellStyles: true });
            const issues = [];
            wb.SheetNames.forEach(sheetName => {
                const ws = wb.Sheets[sheetName];
                if(!ws || !ws['!ref']) return;
                const range = XLSX.utils.decode_range(ws['!ref']);
                for(let R = range.s.r; R <= range.e.r; R++) {
                    for(let C = range.s.c; C <= range.e.c; C++) {
                        const addr = XLSX.utils.encode_cell({r:R, c:C});
                        const cell = ws[addr];
                        if(!cell || cell.v === undefined || cell.v === null) continue;
                        const text = String(cell.v);
                        const found = getInvCharsInText(text);
                        if(found.length > 0) {
                            issues.push({ sheet: sheetName, addr, row: R+1, col: XLSX.utils.encode_col(C), value: text, chars: found });
                        }
                    }
                }
            });
            progress.classList.remove('show');
            renderScanResult(issues, wb);
        } catch(err) {
            progress.textContent = '❌ 读取失败：' + err.message;
        }
    };
    reader.readAsArrayBuffer(file);
}

function escPreview(text) {
    let html = '';
    for(const ch of [...text]) {
        const code = ch.codePointAt(0);
        const inv = getInvCharRule(code);
        if(inv) {
            html += `<span style="background:#d63031;color:white;border-radius:3px;padding:0 3px;font-size:0.72em;margin:0 1px;">${inv.name}</span>`;
        } else {
            html += esc(ch);
        }
    }
    return html;
}

function renderScanResult(issues, wb) {
    const result = document.getElementById('xlclean-result');
    if(issues.length === 0) {
        result.innerHTML = `<div class="no-diff" style="margin-top:16px;">✅ 扫描完成 — 未发现不可见字符，文件非常干净！</div>`;
        return;
    }
    const bySheet = {};
    issues.forEach(iss => { if(!bySheet[iss.sheet]) bySheet[iss.sheet] = 0; bySheet[iss.sheet]++; });
    const typeCounts = {};
    issues.forEach(iss => { iss.chars.forEach(ch => { typeCounts[ch.name] = (typeCounts[ch.name] || 0) + 1; }); });
    let html = `
    <div class="xl-scan-result">
        <div class="xl-scan-header">
            <span>⚠️ 发现 ${issues.length} 个单元格含有不可见字符</span>
            <span style="font-size:0.8rem;opacity:0.8;">${Object.entries(typeCounts).map(([k,v]) => `${k}:${v}个`).join(' | ')}</span>
        </div>
        <div style="padding:10px 16px;background:#f8f8f8;border-bottom:1px solid #eee;font-size:0.82rem;display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
            <span style="color:#666;">Sheet分布：</span>
            ${Object.entries(bySheet).map(([s,n]) => `<span class="xl-sheet-tag">${s} <b style="color:#e74c3c">${n}</b></span>`).join('')}
        </div>
        <div style="max-height:400px;overflow-y:auto;">
        <table class="xl-scan-table">
            <thead><tr><th>Sheet</th><th>单元格</th><th>字符类型</th><th>内容预览</th></tr></thead>
            <tbody>
                ${issues.slice(0, 200).map(iss => `
                <tr>
                    <td><span class="xl-sheet-tag">${esc(iss.sheet)}</span></td>
                    <td style="font-family:monospace;color:#2980b9;">${iss.col}${iss.row}</td>
                    <td>${[...new Set(iss.chars.map(c=>c.name))].map(n => `<span class="xl-badge xl-badge-${iss.chars.find(c=>c.name===n).badge}">${n}</span>`).join(' ')}</td>
                    <td class="xl-cell-preview" title="${esc(iss.value)}">${escPreview(iss.value)}</td>
                </tr>`).join('')}
                ${issues.length > 200 ? `<tr><td colspan="4" style="text-align:center;color:#999;padding:12px;">... 还有 ${issues.length-200} 条（清洗时会全部处理）</td></tr>` : ''}
            </tbody>
        </table>
        </div>
    </div>`;
    result.innerHTML = html;
}

async function runXlClean() {
    if(!xlcleanFile) { alert('请先上传文件'); return; }
    const progress = document.getElementById('xlclean-progress');
    progress.textContent = '⏳ 正在清洗并生成文件...';
    progress.classList.add('show');
    const opts = {
        zws:    document.getElementById('opt-zws').checked,
        bom:    document.getElementById('opt-bom').checked,
        nbsp:   document.getElementById('opt-nbsp').checked,
        pua:    document.getElementById('opt-pua').checked,
        fullsp: document.getElementById('opt-fullsp').checked,
    };
    LibLoader.loadJSZip().then(() => {
        const reader = new FileReader();
        reader.onload = async function(e) {
            try {
                const zip = await JSZip.loadAsync(e.target.result);
                let totalCleaned = 0;
                if(zip.files['xl/sharedStrings.xml']) {
                    let xml = await zip.files['xl/sharedStrings.xml'].async('string');
                    xml = cleanSiLevel(xml, opts, (n) => totalCleaned += n);
                    zip.file('xl/sharedStrings.xml', xml);
                }
                for(const filename of Object.keys(zip.files)) {
                    if(filename.match(/^xl\/worksheets\/sheet\d+\.xml$/)) {
                        let xml = await zip.files[filename].async('string');
                        xml = cleanSiLevel(xml, opts, (n) => totalCleaned += n);
                        zip.file(filename, xml);
                    }
                }
                const outBlob = await zip.generateAsync({ type: 'blob', compression: 'DEFLATE', compressionOptions: { level: 6 } });
                const outName = xlcleanFile.name.replace(/\.(xlsx|xls)$/i, '_cleaned.xlsx');
                const a = document.createElement('a');
                a.href = URL.createObjectURL(outBlob);
                a.download = outName;
                a.click();
                progress.innerHTML = `✅ 清洗完成！共清洗 <b>${totalCleaned}</b> 处，文件已自动下载：<b>${outName}</b><br><span style="font-size:0.8rem;color:#27ae60;">✅ 所有格式（颜色/边框/合并单元格）完全保留</span>`;
                sendLog('Excel清洗', totalCleaned, 1, outName);
            } catch(err) {
                progress.textContent = '❌ 清洗失败：' + err.message;
            }
        };
        reader.readAsArrayBuffer(xlcleanFile);
    });
}

function cleanSiLevel(xml, opts, countCb) {
    return xml.replace(/<si>([\s\S]*?)<\/si>/g, (siMatch, siContent) => {
        const result = cleanSiTrail(siContent, opts);
        if(result.changed) countCb(1);
        return `<si>${result.content}</si>`;
    });
}

function cleanSiTrail(siContent, opts) {
    const tRegex = /<t([^>]*)>([\s\S]*?)<\/t>/g;
    const tList = [];
    let m;
    while((m = tRegex.exec(siContent)) !== null) {
        tList.push({ index: m.index, end: m.index + m[0].length, attr: m[1], content: m[2] });
    }
    if(!tList.length) return { content: siContent, changed: false };
    function decodeXml(s) { return s.replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&quot;/g,'"').replace(/&apos;/g,"'"); }
    function encodeXml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    let changed = false;
    const newContents = tList.map(t => {
        const original = decodeXml(t.content);
        const cleaned = [...original].filter(ch => !shouldCleanInvChar(ch, opts)).join('');
        if(cleaned !== original) changed = true;
        return cleaned;
    });

    function trimEdgeSpace(fromStart) {
        const indexes = fromStart ? [...newContents.keys()] : [...newContents.keys()].reverse();
        for(const i of indexes) {
            const chars = [...newContents[i]];
            if(chars.length === 0) continue;
            let keepStart = 0;
            let keepEnd = chars.length;
            if(fromStart) {
                while(keepStart < keepEnd && chars[keepStart] === ' ') keepStart++;
            } else {
                while(keepEnd > keepStart && chars[keepEnd - 1] === ' ') keepEnd--;
            }
            if(keepStart > 0 || keepEnd < chars.length) {
                newContents[i] = chars.slice(keepStart, keepEnd).join('');
                changed = true;
            }
            if(newContents[i].length > 0) break;
        }
    }

    // 普通半角空格只按整个单元格逻辑文本的首尾删除，正文中间的空格保留。
    trimEdgeSpace(true);
    trimEdgeSpace(false);

    // 删除文本最前面的空行，如 "\n睡眠挑戰" → "睡眠挑戰"
    // 不影响正文中间的换行："第一行\n\n第二行" 保持不变
    {
        const leadBlankRe = /^(?:[ \t 　​‌‍﻿⁠­͏᠎�]*\r?\n)+/;
        let leadIdx = 0;
        while (leadIdx < newContents.length) {
            if (newContents[leadIdx].length === 0) { leadIdx++; continue; }
            const cleaned = newContents[leadIdx].replace(leadBlankRe, '');
            if (cleaned !== newContents[leadIdx]) {
                newContents[leadIdx] = cleaned;
                changed = true;
                if (cleaned.length === 0) { leadIdx++; continue; }
            }
            break;
        }
    }

    if(!changed) return { content: siContent, changed: false };
    let newSiContent = siContent;
    for(let i = tList.length - 1; i >= 0; i--) {
        const t = tList[i];
        const newTag = `<t${t.attr}>${encodeXml(newContents[i])}</t>`;
        newSiContent = newSiContent.substring(0, t.index) + newTag + newSiContent.substring(t.end);
    }
    return { content: newSiContent, changed: true };
}

function resetXlClean() {
    xlcleanFile = null;
    const drop = document.getElementById('xlclean-drop');
    drop.innerHTML = `
        <div class="drop-icon">🧹</div>
        <div class="drop-text">拖入需要清洗的 Excel 文件</div>
        <div class="drop-sub">支持 .xlsx / .xls　文件完全本地处理不上传</div>
        <input type="file" id="xlclean-input" accept=".xlsx,.xls" style="display:none">
    `;
    initXlCleanDrop();
    document.getElementById('xlclean-controls').style.display = 'none';
