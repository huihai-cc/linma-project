<script>
'use strict';

// ===== CDN加载器 =====
const LibLoader = {
    _cache: {},
    load(name, urls) {
        if (this._cache[name]) return this._cache[name];
        const tryLoad = (urlList) => {
            if (!urlList.length) return Promise.reject(new Error(`${name} 加载失败`));
            return new Promise((resolve, reject) => {
                const s = document.createElement('script');
                s.src = urlList[0];
                s.onload = resolve;
                s.onerror = () => tryLoad(urlList.slice(1)).then(resolve).catch(reject);
                document.head.appendChild(s);
            });
        };
        this._cache[name] = tryLoad(Array.isArray(urls) ? urls : [urls]);
        return this._cache[name];
    },
    loadXLSX() {
        return this.load('xlsx', [
            './xlsx.full.min.js',
            'https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js',
            'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js',
        ]);
    },
    loadJSZip() {
        return this.load('jszip', [
            './jszip.min.js',
            'https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js',
        ]);
    },
};

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ===== 状态変数 =====
let xlcompFileA = null, xlcompFileB = null;
let xlcompWbA   = null, xlcompWbB   = null;
let xlcompResults = null;
let xlcompHideEq  = false;
let xlcompMode    = 'excel';

// ===== 颜色对比オプション =====
let xlcompCmpBg   = false; // 背景颜色对比
let xlcompCmpFont = false; // 字体颜色对比

function xlcompOnColorOptChange(){
    xlcompCmpBg   = document.getElementById('xlcomp-bgcolor').checked;
    xlcompCmpFont = document.getElementById('xlcomp-fontcolor').checked;
    const note = document.getElementById('xlcomp-color-note');
    if(note) note.style.display = (xlcompCmpBg || xlcompCmpFont) ? 'inline' : 'none';
    xlcompUpdateColorViewBtns();
}

function xlcompUpdateColorViewBtns(){
    const bgBtn = document.getElementById('xlcomp-view-bgcolor');
    const fontBtn = document.getElementById('xlcomp-view-fontcolor');
    if(bgBtn){ bgBtn.style.opacity = xlcompCmpBg ? '1' : '0.4'; bgBtn.style.pointerEvents = xlcompCmpBg ? 'auto' : 'none'; }
    if(fontBtn){ fontBtn.style.opacity = xlcompCmpFont ? '1' : '0.4'; fontBtn.style.pointerEvents = xlcompCmpFont ? 'auto' : 'none'; }
}

// ===== Excel標準Indexedカラーテーブル（56色） =====
const XLCOMP_INDEXED_COLORS = {
    0:'#000000',  1:'#FFFFFF',  2:'#FF0000',  3:'#00FF00',  4:'#0000FF',
    5:'#FFFF00',  6:'#FF00FF',  7:'#00FFFF',  8:'#000000',  9:'#FFFFFF',
    10:'#FF0000', 11:'#00FF00', 12:'#0000FF', 13:'#FFFF00', 14:'#FF00FF',
    15:'#00FFFF', 16:'#800000', 17:'#008000', 18:'#000080', 19:'#808000',
    20:'#800080', 21:'#008080', 22:'#C0C0C0', 23:'#808080', 24:'#9999FF',
    25:'#993366', 26:'#FFFFCC', 27:'#CCFFFF', 28:'#660066', 29:'#FF8080',
    30:'#0066CC', 31:'#CCCCFF', 32:'#000080', 33:'#FF00FF', 34:'#FFFF00',
    35:'#00FFFF', 36:'#800080', 37:'#800000', 38:'#008080', 39:'#0000FF',
    40:'#00CCFF', 41:'#CCFFFF', 42:'#CCFFCC', 43:'#FFFF99', 44:'#99CCFF',
    45:'#FF99CC', 46:'#CC99FF', 47:'#FFCC99', 48:'#3366FF', 49:'#33CCCC',
    50:'#99CC00', 51:'#FFCC00', 52:'#FF9900', 53:'#FF6600', 54:'#666699',
    55:'#969696', 56:'#003366', 57:'#339966', 58:'#003300', 59:'#333300',
    60:'#993300', 61:'#993366', 62:'#333399', 63:'#333333',
    64:'AUTO',    65:'AUTO',
    81:'#000000'
};

// ===== Officeデフォルトテーマカラー =====
function _xlcompGetDefaultTheme(){
    return {
        // clrScheme のデフォルト値（Office 2013+）
        dk1:{rgb:'#000000'},   // theme 1: dark 1 = black
        lt1:{rgb:'#FFFFFF'},   // theme 0: light 1 = white
        dk2:{rgb:'#44546A'},   // theme 3: dark 2
        lt2:{rgb:'#E7E6E6'},   // theme 2: light 2
        accent1:{rgb:'#4472C4'}, // theme 4
        accent2:{rgb:'#ED7D31'}, // theme 5
        accent3:{rgb:'#A5A5A5'}, // theme 6
        accent4:{rgb:'#FFC000'}, // theme 7
        accent5:{rgb:'#5B9BD5'}, // theme 8
        accent6:{rgb:'#70AD47'}, // theme 9
        hlink:{rgb:'#0563C1'},    // theme 10
        folHlink:{rgb:'#954F72'}  // theme 11
    };
}

// テーマ番号 → テーマ名
const XLCOMP_THEME_MAP = {0:'lt1',1:'dk1',2:'lt2',3:'dk2',4:'accent1',5:'accent2',6:'accent3',7:'accent4',8:'accent5',9:'accent6',10:'hlink',11:'folHlink'};

function _xlcompResolveThemeColor(themeIdx, tint, wb){
    // テーマカラーをRGBに解決する。wbの内部テーマデータを優先、なければデフォルト。
    let themeColors = null;
    try{
        // SheetJS 0.20.1 内部: wb.Styles?.Themes? または wb.Themes
        if(wb && wb.Styles && wb.Styles.Themes) themeColors = wb.Styles.Themes;
        else if(wb && wb.Themes) themeColors = wb.Themes;
    } catch(e){ /* ignore */ }

    const themeName = XLCOMP_THEME_MAP[themeIdx];
    const fallback = _xlcompGetDefaultTheme();

    let baseRgb = null;
    if(themeColors && themeColors[themeName] && themeColors[themeName].rgb){
        baseRgb = themeColors[themeName].rgb;
    } else if(fallback[themeName]){
        baseRgb = fallback[themeName].rgb;
    }

    if(!baseRgb) return null;

    // tint 計算（簡易版）
    if(tint === undefined || tint === 0) return baseRgb;

    const r = parseInt(baseRgb.substring(1,3), 16);
    const g = parseInt(baseRgb.substring(3,5), 16);
    const b = parseInt(baseRgb.substring(5,7), 16);

    let nr, ng, nb;
    if(tint < 0){
        // 暗くする: RGB *= (1 + tint)
        const factor = 1 + tint;
        nr = Math.round(r * factor);
        ng = Math.round(g * factor);
        nb = Math.round(b * factor);
    } else {
        // 明るくする: RGB += (255 - RGB) * tint
        nr = Math.round(r + (255 - r) * tint);
        ng = Math.round(g + (255 - g) * tint);
        nb = Math.round(b + (255 - b) * tint);
    }
    nr = Math.max(0, Math.min(255, nr));
    ng = Math.max(0, Math.min(255, ng));
    nb = Math.max(0, Math.min(255, nb));

    return '#' + [nr,ng,nb].map(v => v.toString(16).toUpperCase().padStart(2,'0')).join('');
}

// ===== 色正規化 =====
function xlcompNormalizeColor(colorObj, context, wb){
    // context: 'fill' | 'font'
    // 戻り値: "#RRGGBB" | "NONE" | "AUTO" | "UNKNOWN" | "THEME:N:TINT:T"（テーマ未解決時）

    // 無効/undefined → コンテキスト依存
    if(!colorObj || (typeof colorObj === 'object' && Object.keys(colorObj).length === 0)){
        return context === 'fill' ? 'NONE' : 'AUTO';
    }

    // RGB値あり（最優先）
    if(colorObj.rgb){
        let rgb = String(colorObj.rgb).toUpperCase();
        // ARGB (8桁) → RGB (6桁): FF808080 → 808080
        if(rgb.length === 8) rgb = rgb.substring(2);
        // 短縮形はそのまま（ありえないが念のため）
        return '#' + rgb;
    }

    // テーマカラー
    if(colorObj.theme !== undefined){
        const resolved = _xlcompResolveThemeColor(colorObj.theme, colorObj.tint, wb);
        if(resolved) return resolved;
        // 未解決の場合はテーマ+チントの識別子で比較
        const t = colorObj.tint !== undefined ? colorObj.tint : 0;
        return 'THEME:' + colorObj.theme + ':TINT:' + t;
    }

    // インデックスカラー
    if(colorObj.indexed !== undefined){
        const idx = colorObj.indexed;
        if(idx === 64 || idx === 65){
            // システムカラー: 64=auto(前景), 65=auto(背景)
            return context === 'font' ? 'AUTO' : 'NONE';
        }
        const mapped = XLCOMP_INDEXED_COLORS[idx];
        if(mapped === 'AUTO') return 'AUTO';
        if(mapped) return mapped;
        return 'INDEXED:' + idx;
    }

    return 'UNKNOWN';
}

// ===== セルスタイルマップ構築（XML解析によるスタイルインデックス取得） =====
async function _ensureCellStyleMap(wb, fileOrBuf, wbKey){
    // wb._cellStyleMap: Map<sheetName, Map<addr, {fillId, fontId}>>
    if(wb._cellStyleMap) return;
    try{
        await LibLoader.loadJSZip();
        const JSZip = window.JSZip || (typeof JSZip !== 'undefined' ? JSZip : null);
        if(!JSZip){ console.warn('JSZip未加载，无法解析字体颜色'); wb._cellStyleMap = new Map(); return; }

        const zip = await JSZip.loadAsync(fileOrBuf);
        const map = new Map();

        for(let i = 0; i < wb.SheetNames.length; i++){
            const sheetName = wb.SheetNames[i];
            const sheetNum = i + 1;
            // try xl/worksheets/sheet{N}.xml 和 rels-based paths
            let sheetXml = null;
            const directPath = 'xl/worksheets/sheet' + sheetNum + '.xml';
            if(zip.files[directPath]){
                sheetXml = await zip.files[directPath].async('string');
            } else {
                // 尝试通过 workbook.xml.rels 找路径
                for(const [path, f] of Object.entries(zip.files)){
                    if(f.dir) continue;
                    if(path.match(new RegExp('worksheets/sheet' + sheetNum + '\.xml$'))){
                        sheetXml = await f.async('string');
                        break;
                    }
                }
            }
            if(!sheetXml) continue;

            const cellMap = new Map();
            // 匹配 <c r="A1" s="3"> 或 <c r="B5" s="3">
            const regex = /<c r="([A-Z]+)(\d+)"[^>]*\bs="(\d+)"[^>]*>/g;
            let m;
            while((m = regex.exec(sheetXml)) !== null){
                const addr = m[1] + m[2];
                const styleIdx = parseInt(m[3], 10);
                if(wb.Styles && wb.Styles.CellXf && wb.Styles.CellXf[styleIdx]){
                    const xf = wb.Styles.CellXf[styleIdx];
                    cellMap.set(addr, {
                        fillId: xf.fillId !== undefined ? xf.fillId : 0,
                        fontId: xf.fontId !== undefined ? xf.fontId : 0
                    });
                }
            }
            map.set(sheetName, cellMap);
            console.log('📊 样式索引已构建: ' + sheetName + ' → ' + cellMap.size + ' cells');
        }
        wb._cellStyleMap = map;
    } catch(e){
        console.warn('样式索引构建失败:', e.message);
        wb._cellStyleMap = new Map();
    }
}

// ===== セルスタイル抽出（fill / font 色） =====
function xlcompExtractCellColors(cell, wb, sheetName, addr){
    // 戻り値: { fill: "#RRGGBB"|"NONE"|..., font: "#RRGGBB"|"AUTO"|... }
    // NOTE: SheetJS 0.18.5 では cell.s に fill 情報のみが格納され、
    //       フォント色は wb.Styles.Fonts からスタイルインデックス経由で取得する必要がある
    let fillColor = 'NONE';
    let fontColor = 'AUTO';

    if(!cell) return { fill: fillColor, font: fontColor };

    // --- 背景色（cell.s のトップレベルから直接取得） ---
    if(cell.s && typeof cell.s === 'object'){
        const pt = cell.s.patternType || '';
        if(pt && pt.toLowerCase() !== 'none'){
            const fg = cell.s.fgColor;
            if(fg && Object.keys(fg).length > 0){
                fillColor = xlcompNormalizeColor(fg, 'fill', wb);
            }
        }
    }

    // --- フォント色（wb._cellStyleMap 経由で Styles.Fonts から取得） ---
    if(wb && wb._cellStyleMap && sheetName && addr){
        const sheetMap = wb._cellStyleMap.get(sheetName);
        if(sheetMap){
            const styleInfo = sheetMap.get(addr);
            if(styleInfo && wb.Styles && wb.Styles.Fonts){
                const font = wb.Styles.Fonts[styleInfo.fontId];
                if(font && font.color && Object.keys(font.color).length > 0){
                    fontColor = xlcompNormalizeColor(font.color, 'font', wb);
                }
            }
        }
    }

    return { fill: fillColor, font: fontColor };
}

// ===== 色の等価判定 =====
function xlcompColorsEqual(c1, c2){
    // 正規化済みの色文字列を比較
    // NONE == NONE, AUTO == AUTO
    // #FFFFFF == #FFFFFF
    // THEME:x:TINT:y == THEME:x:TINT:y（未解決テーマ同士）
    // UNKNOWN != anything（安全側：わからないなら差異扱いしない）
    if(c1 === c2) return true;
    // UNKNOWN 同士は「わからないので同一扱い」（誤検出防止）
    if(c1 === 'UNKNOWN' || c2 === 'UNKNOWN') return true;
    return false;
}

document.addEventListener('DOMContentLoaded', function(){

// ===== ドロップ初期化 =====
function initXlCompDrop(side){
    const oldDrop = document.getElementById('xlcomp-drop-'+side);
    if(!oldDrop) return;
    const drop = oldDrop.cloneNode(true);
    oldDrop.parentNode.replaceChild(drop, oldDrop);
    const input = document.getElementById('xlcomp-input-'+side);
    if(!drop || !input) return;
    input.accept = xlcompMode === 'zip' ? '.zip' : '.xlsx,.xls,.xlsm,.xlsb';

    drop.addEventListener('click', ()=> input.click());
    input.addEventListener('change', e=>{
        if(e.target.files[0]) handleXlCompFile(side, e.target.files[0]);
    });
    drop.addEventListener('dragover',  e=>{ e.preventDefault(); drop.classList.add('dragover'); });
    drop.addEventListener('dragleave', ()=> drop.classList.remove('dragover'));
    drop.addEventListener('drop', e=>{
        e.preventDefault(); drop.classList.remove('dragover');
        if(e.dataTransfer.files[0]) handleXlCompFile(side, e.dataTransfer.files[0]);
    });
}

// ===== ファイル受取 =====
function handleXlCompFile(side, file){
    if(xlcompMode === 'zip'){
        if(!file.name.match(/\.zip$/i)){ alert('请上传 ZIP 文件'); return; }
        if(side==='a') xlcompFileA=file; else xlcompFileB=file;

        const drop = document.getElementById('xlcomp-drop-'+side);
        drop.innerHTML = `
            <div class="drop-icon">✅</div>
            <div class="drop-text">${file.name}</div>
            <div class="drop-sub">${(file.size/1024/1024).toFixed(2)} MB　点击重新选择</div>
            <input type="file" id="xlcomp-input-${side}" accept=".zip" style="display:none">
        `;
        initXlCompDrop(side);
    } else {
        if(!file.name.match(/\.(xlsx|xls|xlsm|xlsb)$/i)){ alert('请上传 Excel 文件'); return; }
        if(side==='a') xlcompFileA=file; else xlcompFileB=file;

        const drop = document.getElementById('xlcomp-drop-'+side);
        drop.innerHTML = `
            <div class="drop-icon">✅</div>
            <div class="drop-text">${file.name}</div>
            <div class="drop-sub">${(file.size/1024/1024).toFixed(2)} MB　点击重新选择</div>
            <input type="file" id="xlcomp-input-${side}" accept=".xlsx,.xls,.xlsm,.xlsb" style="display:none">
        `;
        initXlCompDrop(side);
    }

    if(xlcompFileA && xlcompFileB){
        document.getElementById('xlcomp-controls').style.display = 'flex';
        document.getElementById('xlcomp-controls').style.flexWrap = 'wrap';
    }
}

function _resetDropHint(drop, side, type){

    const sub  = type==='ZIP'?'支持 .zip　内含 .xlsx / .xls':'支持 .xlsx / .xls / .xlsm / .xlsb';

// ===== Excel読込 =====
function runXlComp(){
    if(!xlcompFileA||!xlcompFileB){ alert('请先上传两个文件'); return; }
    const progress = document.getElementById('xlcomp-progress');
    progress.textContent='⏳ 正在读取文件...';
    progress.classList.add('show');
    LibLoader.loadXLSX().then(()=> _readBothFiles());
}

function _readBothFiles(){
    const progress = document.getElementById('xlcomp-progress');
    let doneCount = 0;

    function readFile(file, cb){
        const reader = new FileReader();
        reader.onload = e=>{
            try{
                const data = new Uint8Array(e.target.result);
                const wb = XLSX.read(data,{ type:'array', cellStyles:true, cellNF:true, cellDates:true, cellFormula:true });
                wb._rawBuf = e.target.result; // 保存原始バッファ（スタイルXML解析用）
                cb(wb);
            } catch(err){
                progress.classList.remove('show');
                progress.textContent='';
                const msg = (err.message||'').toLowerCase();
                const isEncrypted = msg.includes('password')||msg.includes('encrypted')
                    ||msg.includes('cfb')||msg.includes('bad')
                    ||msg.includes('parse')||msg.includes('not supported');
                if(isEncrypted) _showEncryptedDialog(file.name);
                else alert('❌ 文件读取失败：'+err.message);
            }
        };
        reader.onerror=()=>{ progress.classList.remove('show'); alert('❌ 文件读取失败'); };
        reader.readAsArrayBuffer(file);
    }

    readFile(xlcompFileA, wb=>{ xlcompWbA=wb; doneCount++; if(doneCount===2) _showSheetSelect(); });
    readFile(xlcompFileB, wb=>{ xlcompWbB=wb; doneCount++; if(doneCount===2) _showSheetSelect(); });
}

const XLCOMP_MAX_ROWS = 50000;
const XLCOMP_MAX_COLS = 100;

function xlcompGetActualRange(ws){
    if(!ws) return null;
    const cellKeys=Object.keys(ws).filter(k=>/^[A-Z]+[0-9]+$/.test(k));
    if(!cellKeys.length){
        return ws['!ref'] ? XLSX.utils.decode_range(ws['!ref']) : null;
    }

    let minRow=Infinity, maxRow=-1, minCol=Infinity, maxCol=-1;
    cellKeys.forEach(addr=>{
        const cell=XLSX.utils.decode_cell(addr);
        minRow=Math.min(minRow, cell.r);
        maxRow=Math.max(maxRow, cell.r);
        minCol=Math.min(minCol, cell.c);
        maxCol=Math.max(maxCol, cell.c);
    });

    return { s:{ r:minRow, c:minCol }, e:{ r:maxRow, c:maxCol } };
}

    progress.classList.remove('show');

    const sheetsA = new Set(xlcompWbA.SheetNames);

    allSheets.forEach(name=>{
        const inA=sheetsA.has(name), inB=sheetsB.has(name);
        let rowCount=0;
        if(inA){
            const ws=xlcompWbA.Sheets[name];
            const r=xlcompGetActualRange(ws);
            if(r){ rowCount=r.e.r-r.s.r+1; }
        }
        totalRowsEstimate+=rowCount;

                          isHugeSheet?'background:#fff5f5;border:1px solid #f5b7b1;':
                          'background:white;border:1px solid #ddd;';
        item.style.cssText=`display:flex;align-items:center;gap:6px;${hiddenStyle}border-radius:6px;padding:6px 12px;cursor:pointer;font-size:0.82rem;transition:all 0.15s;`;

            ${statusTag}${sizeTag}${hiddenTag}
            <span style="color:#bbb;font-size:0.72rem;">${rowCount.toLocaleString()}行</span>
        `;
        item.addEventListener('mouseenter',()=>{ if(!isHidden) item.style.borderColor='#e74c3c'; });
        item.addEventListener('mouseleave',()=>{ item.style.borderColor=isHugeSheet?'#f5b7b1':'#ddd'; });
        listDiv.appendChild(item);
    });

    // 大データ警告
    const warnDiv=document.getElementById('xlcomp-sheet-select');
    warnDiv.querySelectorAll('.xlcomp-size-warn').forEach(e=>e.remove());
    if(totalRowsEstimate>500000){
        const warn=document.createElement('div');

}

// ===== シート対比コア =====
function compareSheet(name){
    const inA=xlcompWbA.SheetNames.includes(name);
    const inB=xlcompWbB.SheetNames.includes(name);
    if(!inA) return { status:'only_b', rows:[] };
    if(!inB) return { status:'only_a', rows:[] };

    const wsA=xlcompWbA.Sheets[name];
    const wsB=xlcompWbB.Sheets[name];
    const needColors = xlcompCmpBg || xlcompCmpFont;
    const resA=sheetTo2D(wsA, XLCOMP_MAX_ROWS, XLCOMP_MAX_COLS, xlcompWbA, needColors, name);
    const resB=sheetTo2D(wsB, XLCOMP_MAX_ROWS, XLCOMP_MAX_COLS, xlcompWbB, needColors, name);
    const arrA=resA.data, arrB=resB.data;
    const colorsA=resA.colors, colorsB=resB.colors;
    const rawRowsA=resA.rawRows, rawRowsB=resB.rawRows;

    const truncated=rawRowsA>XLCOMP_MAX_ROWS||rawRowsB>XLCOMP_MAX_ROWS;
    const truncateMsg=truncated
        ?`⚠️ 数据量过大（A:${rawRowsA.toLocaleString()}行 / B:${rawRowsB.toLocaleString()}行），仅对比前 ${XLCOMP_MAX_ROWS.toLocaleString()} 行`:'';

    const maxRows=Math.max(arrA.length, arrB.length);
    const maxCols=Math.max(
        arrA.reduce((m,r)=>Math.max(m,r.length),0),
        arrB.reduce((m,r)=>Math.max(m,r.length),0)
    );
    const colHeaders=[];
    for(let c=0;c<maxCols;c++) colHeaders.push(XLSX.utils.encode_col(c));

    const rows=[];
    let diffCount=0, addCount=0, delCount=0;
    let bgDiffCount=0, fontDiffCount=0;

    for(let r=0;r<maxRows;r++){
        const rowA=arrA[r]||[], rowB=arrB[r]||[];
        const colorRowA=colorsA?colorsA[r]||[]:[];
        const colorRowB=colorsB?colorsB[r]||[]:[];
        const cells=[];
        let rowHasDiff=false;

        for(let c=0;c<maxCols;c++){
            const vA=r<arrA.length?(rowA[c]!==undefined?rowA[c]:''):null;
            const vB=r<arrB.length?(rowB[c]!==undefined?rowB[c]:''):null;
            let status='eq';

            // 内容比較
            if(vA===null&&vB!==null) status='add';
            else if(vA!==null&&vB===null) status='del';
            else if(typeof vA === 'number' && typeof vB === 'number' && isFinite(vA) && isFinite(vB)){
                if(Math.round(vA * 100) !== Math.round(vB * 100)) status = 'mod';
            } else if(String(vA)!==String(vB)) status='mod';

            // 色比較（オプション有効時のみ）
            let bgDiff=false, fontDiff=false;
            let fillA='', fillB='', fontA='', fontB='';
            if(needColors && vA!==null && vB!==null){
                const clrA = colorsA?colorRowA[c]||{fill:'NONE',font:'AUTO'}:{fill:'NONE',font:'AUTO'};
                const clrB = colorsB?colorRowB[c]||{fill:'NONE',font:'AUTO'}:{fill:'NONE',font:'AUTO'};
                fillA=clrA.fill; fillB=clrB.fill;
                fontA=clrA.font; fontB=clrB.font;

                if(xlcompCmpBg && !xlcompColorsEqual(clrA.fill, clrB.fill)){
                    bgDiff=true;
                }
                if(xlcompCmpFont && !xlcompColorsEqual(clrA.font, clrB.font)){
                    fontDiff=true;
                }
            }

            // 差異タイプを合成
            const diffTypes=[];
            if(status!=='eq') diffTypes.push(status==='mod'?'内容差异':status==='add'?'新増':'削除');
            if(bgDiff){ diffTypes.push('背景色差异'); bgDiffCount++; }
            if(fontDiff){ diffTypes.push('字体色差异'); fontDiffCount++; }

            if(diffTypes.length>0) rowHasDiff=true;
            const combinedStatus = diffTypes.length===0 ? 'eq' : diffTypes.join('／');

            // 内容同一だが色だけ異なる → 行ステータスはmod扱い
            if(status==='eq' && (bgDiff||fontDiff)){
                status = 'mod';
            }

            cells.push({
                vA:vA===null?'':vA, vB:vB===null?'':vB,
                fillA, fillB, fontA, fontB,
                status, combinedStatus, bgDiff, fontDiff
            });
        }

        let rowStatus='eq';
        if(r>=arrA.length){ rowStatus='add'; addCount++; }
        else if(r>=arrB.length){ rowStatus='del'; delCount++; }
        else if(rowHasDiff){ rowStatus='mod'; diffCount++; }

        rows.push({ rowNo:r+1, cells, status:rowStatus });
    }

    return { status:'both', rows, colHeaders, diffCount, addCount, delCount,
             bgDiffCount, fontDiffCount,
             totalA:rawRowsA, totalB:rawRowsB, truncated, truncateMsg,
             cmpBg:xlcompCmpBg, cmpFont:xlcompCmpFont };
}

function sheetTo2D(ws, maxRows, maxCols, wb, needColors, sheetName){
    // needColors: bool — 色情報を抽出するか
    // sheetName: シート名（色抽出時のスタイルマップ参照用）
    const range=xlcompGetActualRange(ws);
    if(!range) return { data:[], rawRows:0, rawCols:0, colors:[] };
    const rawRows=range.e.r-range.s.r+1;
    const rawCols=range.e.c-range.s.c+1;
    const limitR=maxRows?Math.min(range.e.r, range.s.r+maxRows-1):range.e.r;
    const limitC=maxCols?Math.min(range.e.c, range.s.c+maxCols-1):range.e.c;

    // 結合セルのスタイル参照先マップを作成
    const mergeStyleMap = new Map(); // key: addr, value: master-addr
    if(needColors && ws['!merges']){
        ws['!merges'].forEach(m => {
            const masterAddr = XLSX.utils.encode_cell(m.s);
            for(let rr = m.s.r; rr <= m.e.r; rr++){
                for(let cc = m.s.c; cc <= m.e.c; cc++){
                    const slaveAddr = XLSX.utils.encode_cell({r:rr, c:cc});
                    if(slaveAddr !== masterAddr){
                        mergeStyleMap.set(slaveAddr, masterAddr);
                    }
                }
            }
        });
    }

    const result=[];
    const colorResult = needColors ? [] : null;
    for(let r=range.s.r;r<=limitR;r++){
        const row=[];
        const colorRow = needColors ? [] : null;
        for(let c=range.s.c;c<=limitC;c++){
            const addr=XLSX.utils.encode_cell({r,c});
            let cell=ws[addr];

            // 結合セル内の非マスターセル → マスターセルのスタイルを参照
            let styleCell = cell;
            if(needColors && mergeStyleMap.has(addr)){
                const masterAddr = mergeStyleMap.get(addr);
                const masterCell = ws[masterAddr];
                if(masterCell && masterCell.s){
                    styleCell = masterCell;
                }
            }

            row.push(cell?(cell.v!==undefined?cell.v:''):'');
            if(needColors){
                const colors = xlcompExtractCellColors(styleCell, wb, sheetName, addr);
                colorRow.push(colors);
            }
        }
        result.push(row);
        if(needColors) colorResult.push(colorRow);
    }
    return { data:result, rawRows, rawCols, colors:colorResult };
}

// ===== 文字差分 =====
function charDiff(a, b){
    const ac=[...a], bc=[...b];
    const N=ac.length, M=bc.length;
    if(N>300||M>300){
        return{
            left:`<span style="background:#ffcccc;color:#660000;border-radius:2px;">${esc(a)}</span>`,
            right:`<span style="background:#ccffcc;color:#004400;border-radius:2px;">${esc(b)}</span>`
        };
    }
    const dp=Array.from({length:N+1},()=>new Uint16Array(M+1));
    for(let i=1;i<=N;i++)
        for(let j=1;j<=M;j++)
            dp[i][j]=ac[i-1]===bc[j-1]?dp[i-1][j-1]+1:Math.max(dp[i-1][j],dp[i][j-1]);

    const opsA=[], opsB=[];
    let i=N, j=M;
    while(i>0||j>0){
        if(i>0&&j>0&&ac[i-1]===bc[j-1]){ opsA.unshift({t:'eq',c:ac[i-1]}); opsB.unshift({t:'eq',c:bc[j-1]}); i--;j--; }
        else if(j>0&&(i===0||dp[i][j-1]>=dp[i-1][j])){ opsB.unshift({t:'diff',c:bc[j-1]}); j--; }
        else { opsA.unshift({t:'diff',c:ac[i-1]}); i--; }
    }
    function render(ops, hlBg, hlColor){
        let html='', buf='', inHL=false;
        const flush=()=>{
            if(!buf)return;
            html+=inHL?`<span style="background:${hlBg};color:${hlColor};border-radius:2px;padding:0 1px;font-weight:bold;">${buf}</span>`:buf;
            buf='';
        };
        for(const op of ops){ const isDiff=op.t==='diff'; if(isDiff!==inHL){flush();inHL=isDiff;} buf+=esc(op.c); }
        flush();
        return html||'&nbsp;';
    }
    return{
        left:  render(opsA,'#ffaaaa','#660000'),
        right: render(opsB,'#aaffaa','#004400')
    };
}

// ===== 色見本HTML生成ヘルパー =====
function _colorSwatchHTML(hexColor, label){
    // hexColor: "#RRGGBB" | "NONE" | "AUTO" | "UNKNOWN" | "THEME:..."
    const isRealColor = hexColor && hexColor.startsWith('#');
    const isNone = hexColor === 'NONE';
    const isAuto = hexColor === 'AUTO';
    const isUnknown = hexColor === 'UNKNOWN' || (!isRealColor && !isNone && !isAuto);

    if(isNone){
        return `<span style="display:inline-flex;align-items:center;gap:2px;font-size:0.68rem;color:#888;"
                title="${label}: 无填充"><span style="display:inline-block;width:10px;height:10px;
                border:1px dashed #ccc;background:transparent;border-radius:2px;vertical-align:middle;"></span> NONE</span>`;
    }
    if(isAuto){
        return `<span style="display:inline-flex;align-items:center;gap:2px;font-size:0.68rem;color:#888;"
                title="${label}: 自动颜色"><span style="display:inline-block;width:10px;height:10px;
                border:1px solid #ccc;background:repeating-conic-gradient(#999 0% 25%,#fff 0% 50%) 50%/6px 6px;
                border-radius:2px;vertical-align:middle;"></span> AUTO</span>`;
    }
    if(isUnknown){
        return `<span style="display:inline-flex;align-items:center;gap:2px;font-size:0.68rem;color:#888;"
                title="${label}: 无法解析">UNKNOWN</span>`;
    }
    // 実際の色
    const borderColor = hexColor === '#FFFFFF' ? '#ccc' : hexColor;
    return `<span style="display:inline-flex;align-items:center;gap:2px;font-size:0.68rem;"
            title="${label}: ${hexColor}"><span style="display:inline-block;width:10px;height:10px;
            background:${hexColor};border:1px solid ${borderColor};border-radius:2px;vertical-align:middle;"></span> ${hexColor}</span>`;
}

// ===== シートテーブルレンダリング =====
function renderSheetTable(r, name){
    const rows=xlcompHideEq?r.rows.filter(row=>row.status!=='eq'):r.rows;
    const showColors = r.cmpBg || r.cmpFont;

    const truncateHtml=r.truncated?`
    <div style="background:#fff3cd;border:1px solid #ffc107;border-top:none;
                padding:8px 16px;font-size:0.82rem;color:#856404;">
        ⚠️ ${r.truncateMsg}
    </div>`:'';

    if(rows.length===0) return truncateHtml+`
        <div style="padding:20px;background:#eafaf1;border:1px solid #a9dfbf;
                    border-top:none;text-align:center;color:#27ae60;">✅ 无差异行</div>`;

    const RENDER_LIMIT=500;
    let renderRows=rows;
    let omitHtml='';

    if(rows.length>RENDER_LIMIT){
        const diffOnly=rows.filter(row=>row.status!=='eq');
        const eqCount=rows.length-diffOnly.length;
        renderRows=diffOnly.slice(0, RENDER_LIMIT);
        const stillOmit=diffOnly.length-renderRows.length;
        omitHtml=`
        <div style="background:#fff8e8;border:1px solid #f39c12;border-top:none;
                    padding:8px 16px;font-size:0.82rem;color:#856404;">
            📊 已自动隐藏 <b>${eqCount.toLocaleString()}</b> 个相同行，
            显示 <b>${renderRows.length.toLocaleString()}</b> 个差异行
            ${stillOmit>0?`，另有 <b>${stillOmit.toLocaleString()}</b> 个差异行超出显示限制`:''}
        </div>`;
    }

    // 列ヘッダー — 色対比ありの場合はファイルA/B各2列（値＋色）
    let html=truncateHtml+omitHtml+`
    <div style="overflow-x:auto;border:1px solid #ddd;border-top:none;
                max-height:500px;overflow-y:auto;">
    <table style="width:100%;border-collapse:collapse;
                  font-family:'Courier New',monospace;font-size:0.82rem;min-width:600px;">
    <thead style="position:sticky;top:0;z-index:5;">
        <tr>
            <th style="background:#dde;color:#556;padding:7px 10px;
                       border-bottom:2px solid #bbb;width:50px;text-align:center;">行号</th>
            <th style="background:#dde;color:#556;padding:7px 10px;
                       border-bottom:2px solid #bbb;min-width:80px;text-align:center;${showColors?'min-width:150px;':''}">状态</th>`;

    r.colHeaders.forEach(col=>{
        const span = showColors ? 2 : 2; // 値＋色情報を同じセル内に表示するのでspanはそのまま
        html+=`<th colspan="${span}" style="background:#c8e6ff;color:#1a3a6a;padding:7px 10px;
                    border-bottom:2px solid #bbb;border-left:1px solid #bbb;
                    text-align:center;white-space:nowrap;">${col}</th>`;
    });
    html+=`</tr><tr>
        <th style="background:#eee;border-bottom:2px solid #bbb;"></th>
        <th style="background:#eee;border-bottom:2px solid #bbb;"></th>`;
    r.colHeaders.forEach(()=>{
        html+=`
        <th style="background:#c8e6ff;color:#1a3a6a;padding:4px 8px;
                   border-bottom:2px solid #bbb;border-left:1px solid #bbb;
                   font-size:0.75rem;font-weight:normal;">▼ 文件A</th>
        <th style="background:#ffd8b0;color:#6a2a00;padding:4px 8px;
                   border-bottom:2px solid #bbb;font-size:0.75rem;
                   font-weight:normal;">▼ 文件B</th>`;
    });
    html+=`</tr></thead><tbody>`;

    renderRows.forEach(row=>{
        const bg=row.status==='add'?'#e8ffe8':row.status==='del'?'#ffe8e8':row.status==='mod'?'#fff8e8':'white';

        // 行ステータス表示 — 色差異がある場合は combinedStatus を使う
        let statusIcon;
        if(row.status==='add'){
            statusIcon='<span style="color:#27ae60;font-weight:bold;">＋新増</span>';
        } else if(row.status==='del'){
            statusIcon='<span style="color:#e74c3c;font-weight:bold;">－削除</span>';
        } else if(row.status==='mod'){
            // 最初の差異セルから combinedStatus を取得して表示
            const diffCell = row.cells.find(c => c.combinedStatus && c.combinedStatus !== 'eq');
            const combined = diffCell ? diffCell.combinedStatus : '≠変更';
            statusIcon=`<span style="color:#e67e22;font-weight:bold;">≠ ${esc(combined)}</span>`;
        } else {
            statusIcon='<span style="color:#bbb;">＝同じ</span>';
        }

        html+=`<tr style="background:${bg};border-bottom:1px solid #eee;">
            <td style="text-align:center;color:#888;font-size:0.75rem;padding:5px 8px;
                       background:#f5f5f5;border-right:1px solid #ddd;">${row.rowNo}</td>
            <td style="text-align:center;padding:5px 8px;font-size:0.78rem;
                       white-space:nowrap;">${statusIcon}</td>`;

        row.cells.forEach(cell=>{
            const cellStatus = cell.status==='mod'&&cell.combinedStatus&&cell.combinedStatus!=='eq' ? 'mod' : cell.status;
            const cellBgA=cellStatus==='add'?'#f0f0f0':cellStatus==='del'?'#ffcccc':cellStatus==='mod'?'#fff3cd':'white';
            const cellBgB=cellStatus==='add'?'#ccffcc':cellStatus==='del'?'#f0f0f0':cellStatus==='mod'?'#fff3cd':'white';
            const borderL=cellStatus!=='eq'?'2px solid #e74c3c':'1px solid #eee';
            let displayA=esc(String(cell.vA))||'&nbsp;';
            let displayB=esc(String(cell.vB))||'&nbsp;';
            if(cell.status==='mod'&&String(cell.vA)!==String(cell.vB)){
                const diff=charDiff(String(cell.vA),String(cell.vB));
                displayA=diff.left; displayB=diff.right;
            }
            const isDiff=cellStatus!=='eq';

            // 色情報をタイトルに追記
            let titleExtraA='', titleExtraB='';
            if(showColors){
                const fa=cell.fillA||'NONE', fb=cell.fillB||'NONE';
                const fta=cell.fontA||'AUTO', ftb=cell.fontB||'AUTO';
                titleExtraA=` (背景色:${fa} 字体色:${fta})`;
                titleExtraB=` (背景色:${fb} 字体色:${ftb})`;
            }

            // セル内容 — 値の下に色情報を表示
            let colorInfoA='', colorInfoB='';
            if(showColors){
                colorInfoA = `<div style="margin-top:2px;line-height:1.3;display:flex;flex-direction:column;gap:1px;">
                    ${_colorSwatchHTML(cell.fillA||'NONE', '背景色')}
                    ${_colorSwatchHTML(cell.fontA||'AUTO', '字体色')}
                </div>`;
                colorInfoB = `<div style="margin-top:2px;line-height:1.3;display:flex;flex-direction:column;gap:1px;">
                    ${_colorSwatchHTML(cell.fillB||'NONE', '背景色')}
                    ${_colorSwatchHTML(cell.fontB||'AUTO', '字体色')}
                </div>`;
            }

            html+=`
            <td style="padding:4px 8px;background:${cellBgA};border-left:${borderL};
                       max-width:250px;overflow:hidden;white-space:nowrap;vertical-align:top;"
                title="${esc(String(cell.vA))}${titleExtraA}">${displayA}${colorInfoA}</td>
            <td style="padding:4px 8px;background:${cellBgB};
                       max-width:250px;overflow:hidden;white-space:nowrap;vertical-align:top;"
                ${isDiff?'data-diff="1"':''}

function compareSheetFormula(name){
    const inA=xlcompWbA.SheetNames.includes(name);
    const inB=xlcompWbB.SheetNames.includes(name);
    if(!inA||!inB) return { diffs:[] };

    const wsA=xlcompWbA.Sheets[name];
    const wsB=xlcompWbB.Sheets[name];
    const diffs=[];
    const refA=wsA['!ref']?XLSX.utils.decode_range(wsA['!ref']):null;
    const refB=wsB['!ref']?XLSX.utils.decode_range(wsB['!ref']):null;
    if(!refA&&!refB) return { diffs:[] };

    const maxR=Math.max(refA?refA.e.r:0, refB?refB.e.r:0);
    const maxC=Math.max(refA?refA.e.c:0, refB?refB.e.c:0);

    for(let r=0;r<=maxR;r++){
        for(let c=0;c<=maxC;c++){
            const addr=XLSX.utils.encode_cell({r,c});
            const cellA=wsA[addr], cellB=wsB[addr];
            const fA=(cellA&&cellA.f)?'='+cellA.f:'';
            const fB=(cellB&&cellB.f)?'='+cellB.f:'';
            if(!fA&&!fB) continue;
            if(fA!==fB) diffs.push({ addr, row:r+1, col:XLSX.utils.encode_col(c), fA:fA||'（无公式）', fB:fB||'（无公式）' });
        }
    }
    return { diffs };
}

async function getTextboxesFromZip(zipFile, sheetName, wb){
    const textboxes=[];
    try{
        const zip=await JSZip.loadAsync(zipFile);
        const sheetIdx=wb.SheetNames.indexOf(sheetName);
        if(sheetIdx<0) return textboxes;
        const sheetNum=sheetIdx+1;
        const relsPath=`xl/worksheets/_rels/sheet${sheetNum}.xml.rels`;
        if(!zip.files[relsPath]) return textboxes;
        const relsXml=await zip.files[relsPath].async('string');
        const drawingMatch=relsXml.match(/Target="\.\.\/drawings\/(drawing\d+\.xml)"/);
        if(!drawingMatch) return textboxes;
        const drawingPath=`xl/drawings/${drawingMatch[1]}`;
        if(!zip.files[drawingPath]) return textboxes;
        const drawingXml=await zip.files[drawingPath].async('string');

        const spReg=/<xdr:sp\b[^>]*>([\s\S]*?)<\/xdr:sp>/g;
        let spMatch;
        while((spMatch=spReg.exec(drawingXml))!==null){
            const spContent=spMatch[1];
            const paraReg=/<a:p\b[^>]*>([\s\S]*?)<\/a:p>/g;
            let paraMatch;
            const spTexts=[];
            while((paraMatch=paraReg.exec(spContent))!==null){
                const tReg=/<a:t[^>]*>([^<]*)<\/a:t>/g;
                let tMatch, paraText='';
                while((tMatch=tReg.exec(paraMatch[1]))!==null) paraText+=tMatch[1];
                if(paraText.trim()) spTexts.push(paraText);
            }
            if(spTexts.length>0) textboxes.push(spTexts.join('\n').trim());
        }

        if(textboxes.length===0){
            const paraReg2=/<a:p\b[^>]*>([\s\S]*?)<\/a:p>/g;
            let paraMatch2;
            const paraTexts=[];
            while((paraMatch2=paraReg2.exec(drawingXml))!==null){
                const tReg2=/<a:t[^>]*>([^<]*)<\/a:t>/g;
                let tMatch2, paraText='';
                while((tMatch2=tReg2.exec(paraMatch2[1]))!==null) paraText+=tMatch2[1];
                if(paraText.trim()) paraTexts.push(paraText);
            }
            if(paraTexts.length>0) textboxes.push(paraTexts.join('\n').trim());
        }
    } catch(e){ console.log('文本框読み取りエラー:',e); }
    return textboxes;
}

function compareTextboxes(tbA, tbB){
    const maxLen=Math.max(tbA.length, tbB.length);
    const diffs=[];
    for(let i=0;i<maxLen;i++){
        const tA=i<tbA.length?tbA[i]:null;
        const tB=i<tbB.length?tbB[i]:null;
        let status='eq';
        if(tA===null) status='only_b';
        else if(tB===null) status='only_a';
        else if(tA!==tB) status='mod';
        diffs.push({ textA:tA, textB:tB, status });
    }
    return diffs;
}

// ===== ZIP対比 =====
async function readExcelsFromZip(zipFile){
    const data=await zipFile.arrayBuffer();
    const zip=await JSZip.loadAsync(data);
    const excels={};
    for(const [path,file] of Object.entries(zip.files)){
        if(file.dir) continue;
        if(!path.match(/\.(xlsx|xls)$/i)) continue;
        if(path.includes('__MACOSX')||path.split('/').some(p=>p.startsWith('.'))) continue;
        try{
            const buf=await file.async('arraybuffer');
            const wb=XLSX.read(new Uint8Array(buf),{ type:'array', cellStyles:true, cellNF:true, cellDates:true, cellFormula:true });
            wb._rawBuf = buf; // 保存原始バッファ（スタイルXML解析用）
            const fileName=path.split('/').pop();
            const key=excels[fileName]?path:fileName;
            excels[key]={ wb, fullPath:path, fileName };
        } catch(e){ console.warn('跳过:',path,e.message); }
    }
    return excels;
}

async function runZipComp(){
    if(!xlcompFileA||!xlcompFileB){ alert('请先上传两个ZIP文件'); return; }
    // 色比較オプションをチェックボックスから同期
    xlcompOnColorOptChange();
    const progress=document.getElementById('xlcomp-progress');
    progress.textContent='⏳ 正在解压并读取...';
    progress.classList.add('show');
    document.getElementById('xlcomp-result').innerHTML='';
    document.getElementById('xlcomp-sheet-select').style.display='none';

    try{
        await LibLoader.loadJSZip();
        await LibLoader.loadXLSX();

        progress.textContent='⏳ 正在解压 ZIP A...';
        const excelsA=await readExcelsFromZip(xlcompFileA);
        progress.textContent='⏳ 正在解压 ZIP B...';
        const excelsB=await readExcelsFromZip(xlcompFileB);

        const namesA=Object.keys(excelsA);
        const namesB=Object.keys(excelsB);

        const matchMap=new Map();
        const usedB=new Set();
        namesA.forEach(na=>{
            if(excelsB[na]&&!usedB.has(na)){ matchMap.set(na,na); usedB.add(na); return; }
            const cleanA=na.replace(/[-\s_\.]+/g,'').toLowerCase();
            const fuzzyB=namesB.find(nb=>{
                if(usedB.has(nb)) return false;
                const cleanB=nb.replace(/[-\s_\.]+/g,'').toLowerCase();
                const extA=cleanA.replace(/\.(xlsx|xls)$/i,'');
                const extB=cleanB.replace(/\.(xlsx|xls)$/i,'');
                return extA===extB||extA.includes(extB)||extB.includes(extA);
            });
            if(fuzzyB){ matchMap.set(na,fuzzyB); usedB.add(fuzzyB); }
        });

        const common=[...matchMap.keys()];
        const onlyA=namesA.filter(n=>!matchMap.has(n));
        const onlyB=namesB.filter(n=>!usedB.has(n));

        progress.textContent=`⏳ 正在对比 ${common.length} 个同名文件...`;

        const zipResult={ onlyA, onlyB, common, files:{} };
        onlyA.forEach(name=>{ zipResult.files[name]={ status:'only_a', sheets:{} }; });
        onlyB.forEach(name=>{ zipResult.files[name]={ status:'only_b', sheets:{} }; });

        // 色比較有効時：全ワークブックのスタイルマップを構築
        if(xlcompCmpBg || xlcompCmpFont){
            progress.textContent='⏳ 正在解析样式信息...';
            const allWbs = [...Object.values(excelsA), ...Object.values(excelsB)];
            for(const entry of allWbs){
                if(entry.wb._rawBuf && !entry.wb._cellStyleMap){
                    try{ await _ensureCellStyleMap(entry.wb, entry.wb._rawBuf, entry.fileName); }
                    catch(e){ console.warn('样式构建失败:', entry.fileName, e.message); }
                }
            }
        }

        for(const name of common){
            const wbA=excelsA[name].wb;
            const nameBMatched=matchMap.get(name);
            const wbB=excelsB[nameBMatched].wb;
            const isFuzzy=name!==nameBMatched;

            const _wbA=xlcompWbA, _wbB=xlcompWbB;
            xlcompWbA=wbA; xlcompWbB=wbB;

            const allSheets=[...new Set([...wbA.SheetNames, ...wbB.SheetNames])];
            const sheetResults={};
            allSheets.forEach(sheet=>{ sheetResults[sheet]=compareSheet(sheet); });

            xlcompWbA=_wbA; xlcompWbB=_wbB;

            const totalDiff=allSheets.reduce((s,sh)=>{
                const r=sheetResults[sh];
                return s+(r.diffCount||0)+(r.addCount||0)+(r.delCount||0);
            },0);

            zipResult.files[name]={ status:'both', sheets:sheetResults, sheetNames:allSheets, totalDiff, isFuzzy, matchedNameB:nameBMatched };
        }

        progress.classList.remove('show');
        document.getElementById('btn-exp-xlcomp').style.display='inline-block';
        renderZipCompResult(zipResult);

    } catch(err){
        progress.textContent='❌ 失败：'+err.message;
        console.error(err);
    }
}

function renderZipCompResult(zipResult){
    const result=document.getElementById('xlcomp-result');
    const totalFiles=Object.keys(zipResult.files).length;
    const diffFiles=Object.values(zipResult.files).filter(f=>
        f.status==='only_a'||f.status==='only_b'||(f.status==='both'&&f.totalDiff>0)).length;
    const totalDiffAll=Object.values(zipResult.files).reduce((s,f)=>s+(f.totalDiff||0),0);

    let html=`
    <div style="background:#2c3e50;color:white;border-radius:8px 8px 0 0;
                padding:12px 16px;display:flex;align-items:center;
                gap:16px;flex-wrap:wrap;position:sticky;top:0;z-index:100;
                box-shadow:0 3px 10px rgba(0,0,0,0.3);">
        <span style="font-weight:bold;font-size:0.95rem;">🗜️ ZIP对比结果</span>
        <span style="background:#e74c3c;border-radius:10px;padding:2px 10px;font-size:0.8rem;">有差异：${diffFiles}/${totalFiles} 个文件</span>
        <span style="background:#e67e22;border-radius:10px;padding:2px 10px;font-size:0.8rem;">总差异行：${totalDiffAll}</span>
        ${zipResult.onlyA.length>0?`<span style="background:#f39c12;border-radius:10px;padding:2px 10px;font-size:0.8rem;">仅A有：${zipResult.onlyA.length}个文件</span>`:''}
        ${zipResult.onlyB.length>0?`<span style="background:#27ae60;border-radius:10px;padding:2px 10px;font-size:0.8rem;">仅B有：${zipResult.onlyB.length}个文件</span>`:''}
        <div style="margin-left:auto;display:flex;align-items:center;gap:8px;">
            <button onclick="xlcompNav(-1)"
                    style="background:#e74c3c;color:white;border:none;border-radius:6px;
                           padding:6px 16px;font-size:0.85rem;font-weight:bold;cursor:pointer;"
                    onmouseover="this.style.background='#c0392b'"
                    onmouseout="this.style.background='#e74c3c'">⬆ 上一差异</button>
            <span id="xlcomp-nav-info-zip"
                  style="background:#e74c3c;color:white;padding:5px 16px;
                         border-radius:20px;font-size:0.88rem;font-weight:bold;
                         min-width:90px;text-align:center;">
                0 / ${totalDiffAll}
            </span>
            <button onclick="xlcompNav(1)"
                    style="background:#e74c3c;color:white;border:none;border-radius:6px;
                           padding:6px 16px;font-size:0.85rem;font-weight:bold;cursor:pointer;"
                    onmouseover="this.style.background='#c0392b'"
                    onmouseout="this.style.background='#e74c3c'">下一差异 ⬇</button>
        </div>
    </div>
    <div style="border:1px solid #ddd;border-top:none;border-radius:0 0 8px 8px;overflow:hidden;">`;

    Object.entries(zipResult.files).forEach(([name,fileData],fileIdx)=>{
        const hasDiff=fileData.status==='only_a'||fileData.status==='only_b'||(fileData.status==='both'&&fileData.totalDiff>0);
        const statusIcon=hasDiff?'⚠️':'✅';
        const statusColor=fileData.status==='only_a'?'#f39c12':fileData.status==='only_b'?'#27ae60':hasDiff?'#e74c3c':'#27ae60';
        const rowBg=hasDiff?'#fff8f8':'#f8fff8';

        html+=`
        <div style="border-bottom:1px solid #eee;">
            <div style="background:${rowBg};padding:10px 16px;
                        display:flex;align-items:center;gap:10px;
                        cursor:pointer;border-left:4px solid ${statusColor};"
                 onclick="xlzipToggleDetail('xlzip-detail-${fileIdx}', this)">
                <span>${statusIcon}</span>
                <span style="font-weight:bold;font-size:0.88rem;color:#2c3e50;flex:1;">📊 ${name}
                    ${fileData.isFuzzy?`<span style="font-size:0.72rem;color:#e67e22;font-weight:normal;margin-left:6px;">≈ 匹配到：${fileData.matchedNameB}</span>`:''}
                </span>
                ${fileData.status==='only_a'?`<span style="background:#f39c12;color:white;border-radius:4px;padding:2px 8px;font-size:0.75rem;">仅ZIP A有</span>`:''}
                ${fileData.status==='only_b'?`<span style="background:#27ae60;color:white;border-radius:4px;padding:2px 8px;font-size:0.75rem;">仅ZIP B有</span>`:''}
                ${fileData.status==='both'&&hasDiff?`<span style="background:#e74c3c;color:white;border-radius:4px;padding:2px 8px;font-size:0.75rem;">差异 ${fileData.totalDiff} 行</span>`:''}
                ${fileData.status==='both'&&!hasDiff?`<span style="background:#27ae60;color:white;border-radius:4px;padding:2px 8px;font-size:0.75rem;">✅ 完全一致</span>`:''}
                <span style="color:#aaa;font-size:0.8rem;">▼</span>
            </div>
            <div id="xlzip-detail-${fileIdx}" style="display:none;">`;

        if(fileData.status==='only_a'||fileData.status==='only_b'){
            html+=`<div style="padding:16px 20px;color:#888;font-size:0.85rem;background:#fafafa;text-align:center;">
                此文件仅存在于 ${fileData.status==='only_a'?'ZIP A':'ZIP B'} 中</div>`;
        } else {
            fileData.sheetNames.forEach(sheetName=>{
                const r=fileData.sheets[sheetName];
                const sheetDiff=(r.diffCount||0)+(r.addCount||0)+(r.delCount||0);
                html+=`
                <div style="border-top:1px solid #eee;">
                    <div style="background:#34495e;color:white;padding:6px 16px;
                                display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
                        <span style="font-size:0.85rem;font-weight:bold;">📋 ${sheetName}</span>`;
                if(r.status==='only_a') html+=`<span style="background:#f39c12;border-radius:8px;padding:1px 8px;font-size:0.75rem;">仅A有</span>`;
                else if(r.status==='only_b') html+=`<span style="background:#27ae60;border-radius:8px;padding:1px 8px;font-size:0.75rem;">仅B有</span>`;
                else html+=`
                    <span style="background:#e74c3c;border-radius:8px;padding:1px 8px;font-size:0.75rem;">修改 ${r.diffCount}</span>
                    <span style="background:#27ae60;border-radius:8px;padding:1px 8px;font-size:0.75rem;">新增 ${r.addCount}</span>
                    <span style="background:#c0392b;border-radius:8px;padding:1px 8px;font-size:0.75rem;">删除 ${r.delCount}</span>
                    <span style="background:#7f8c8d;border-radius:8px;padding:1px 8px;font-size:0.75rem;">A共${r.totalA||0}行 B共${r.totalB||0}行</span>`;
                html+=`</div>`;

                if(r.status!=='only_a'&&r.status!=='only_b'&&r.rows&&r.rows.length>0){
                    const _hide=xlcompHideEq;
                    xlcompHideEq=false;
                    html+=renderSheetTable(r, sheetName);
                    xlcompHideEq=_hide;
                } else if(r.status!=='only_a'&&r.status!=='only_b'){
                    html+=`<div style="padding:12px 16px;background:#eafaf1;color:#27ae60;font-size:0.85rem;text-align:center;">✅ 此Sheet无差异</div>`;
                }
                html+=`</div>`;
            });
        }
        html+=`</div></div>`;
    });

    html+=`</div>`;
    result.innerHTML=html;

    const switcher=document.getElementById('xlcomp-view-switcher');
    if(switcher) switcher.style.display='none';

    setTimeout(()=>{
        xlcompNavRows=[];
        xlcompNavIdx=-1;
        document.querySelectorAll('#xlcomp-result td').forEach(td=>{
            const style=td.getAttribute('style')||'';
            if(style.includes('border-left:2px solid #e74c3c')&&td.textContent.trim()!=='') xlcompNavRows.push(td);
        });
        if(!xlcompNavRows.length){
            document.querySelectorAll('#xlcomp-result tr').forEach(tr=>{
                const style=tr.getAttribute('style')||'';
                if(style.includes('e8ffe8')||style.includes('ffe8e8')||style.includes('fff8e8')) xlcompNavRows.push(tr);
            });
        }
        const info=document.getElementById('xlcomp-nav-info-zip');
        if(info) info.textContent=`0 / ${xlcompNavRows.length}`;
    },300);

    _addBackToTopBtn();
}

function xlzipToggleDetail(id, headerEl){
    const el=document.getElementById(id);
    if(!el) return;
    const isHidden=el.style.display==='none';
    el.style.display=isHidden?'block':'none';
    const arrow=headerEl.querySelector('span:last-child');
    if(arrow) arrow.textContent=isHidden?'▲':'▼';
}
</script>

</html>
