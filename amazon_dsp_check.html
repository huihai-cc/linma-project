<script>
// エスケープ関数
function esc(str){
    if(str === null || str === undefined) return '';
    return String(str)
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;')
        .replace(/'/g,'&#39;');
}

const LibLoader = {
    loadXLSX: function(){
        return new Promise((resolve, reject)=>{
            if(typeof XLSX !== 'undefined'){ resolve(); return; }
            const s = document.createElement('script');
            s.src = 'xlsx.full.min.js';
            s.onload = resolve;
            s.onerror = ()=> reject(new Error('xlsx.full.min.js の読み込みに失敗しました'));
            document.head.appendChild(s);
        });
    }
};
</script>

<!-- ========== 設定チェック ========== -->
<script>
(function(){

// ===== 状態変数 =====
const SC_COL_NO_W_DEFAULT = 40;
const SC_COL_LI_W_DEFAULT = 180;
const COL_ITEM_W_DEFAULT  = 120;
let SC_COL_NO_W  = SC_COL_NO_W_DEFAULT;
let SC_COL_LI_W  = SC_COL_LI_W_DEFAULT;
let SC_ROW_HEIGHT = 50;   // 行高（默认50px，用户可调整）
let scSystem = '';

// ===== sessionStorage 读写函数 =====
function scSaveRowHeight(val){
    try { sessionStorage.setItem('sc_row_height', String(val)); } catch(e) {}
}
function scLoadRowHeight(){
    try {
        const v = parseInt(sessionStorage.getItem('sc_row_height'));
        return v && v >= 20 && v <= 200 ? v : 50;
    } catch(e) { return 50; }
}
function scSaveColWidths(){
    try {
        const data = { no: SC_COL_NO_W, li: SC_COL_LI_W, item: COL_ITEM_W };
        sessionStorage.setItem('sc_col_widths', JSON.stringify(data));
    } catch(e) {}
}
function scLoadColWidths(){
    try {
        const raw = sessionStorage.getItem('sc_col_widths');
        if(!raw) return null;
        const data = JSON.parse(raw);
        return {
            no: (data.no && data.no >= 30) ? data.no : SC_COL_NO_W_DEFAULT,
            li: (data.li && data.li >= 100) ? data.li : SC_COL_LI_W_DEFAULT,
            item: (data.item && data.item >= 80) ? data.item : COL_ITEM_W_DEFAULT,
        };
    } catch(e) { return null; }
}
let scFilesS = [];   // 複数設定表
let scFilesD = [];   // 複数ダウンロードデータ
let scWbsS   = [];   // 読み込み済みWB（設定表）
let scWbsD   = [];   // 読み込み済みWB（ダウンロード）
let scResults = null;
let scCurrentFilter = 'all';
let _scKissonVisible = false;

const SC_SYSTEMS = {
    amazon_dsp: { label: 'Amazon DSP（Display）', color: '#FF9900', badge_bg: '#FF9900' },
    amazon_pva: { label: 'Amazon DSP（PVA）',     color: '#e74c3c', badge_bg: '#e74c3c' },
    amazon_ott: { label: 'Amazon OTT', color: '#8e44ad', badge_bg: '#8e44ad' },
};

// ===== 初期化 =====
document.addEventListener('DOMContentLoaded', function(){
    // 从 sessionStorage 恢复行高
    SC_ROW_HEIGHT = scLoadRowHeight();
    // 从 sessionStorage 恢复列宽
    const savedWidths = scLoadColWidths();
    if(savedWidths){
        SC_COL_NO_W = savedWidths.no;
        SC_COL_LI_W = savedWidths.li;
    }
    
    document.getElementById('sc-system-select').addEventListener('change', function(){
        scSystem = this.value;
        if(scSystem && SC_SYSTEMS[scSystem]){
            const sys = SC_SYSTEMS[scSystem];
            const badge = document.getElementById('sc-system-badge');
            badge.textContent = sys.label;
            badge.style.background = sys.badge_bg;
            badge.style.display = 'inline-block';
            document.getElementById('sc-upload-area').style.display = 'block';
        } else {
            document.getElementById('sc-system-badge').style.display = 'none';
            document.getElementById('sc-upload-area').style.display = 'none';
        }
    });
    initScMultiDrop('setting');
    initScMultiDrop('download');
});

// ===== 複数ファイルドロップ初期化 =====
function initScMultiDrop(side){
    const oldDrop = document.getElementById('sc-drop-'+side);
    if(!oldDrop) return;
    const drop = oldDrop.cloneNode(true);
    oldDrop.parentNode.replaceChild(drop, oldDrop);
    const input = document.getElementById('sc-input-'+side);
    if(!drop || !input) return;

    // 複数選択を有効化
    input.setAttribute('multiple', 'multiple');

    drop.addEventListener('click', e=>{
        if(e.target.tagName !== 'BUTTON') input.click();
    });
    input.addEventListener('change', e=>{
        if(e.target.files && e.target.files.length > 0){
            handleScFiles(side, Array.from(e.target.files));
        }
    });
    drop.addEventListener('dragover',  e=>{ e.preventDefault(); drop.classList.add('dragover'); });
    drop.addEventListener('dragleave', ()=> drop.classList.remove('dragover'));
    drop.addEventListener('drop', e=>{
        e.preventDefault(); drop.classList.remove('dragover');
        if(e.dataTransfer.files && e.dataTransfer.files.length > 0){
            handleScFiles(side, Array.from(e.dataTransfer.files));
        }
    });
}

// ===== 複数ファイル処理 =====
function handleScFiles(side, files){
    const validFiles = files.filter(f => f.name.match(/\.(xlsx|xls)$/i));
    if(!validFiles.length){ alert('Excelファイル（.xlsx / .xls）を選択してください'); return; }

    if(side === 'setting'){
        // 追加モード（既存リストに追加）
        validFiles.forEach(f => {
            if(!scFilesS.find(existing => existing.name === f.name)){
                scFilesS.push(f);
            }
        });
    } else {
        validFiles.forEach(f => {
            if(!scFilesD.find(existing => existing.name === f.name)){
                scFilesD.push(f);
            }
        });
    }

    renderScFileList(side);

    if(scFilesS.length > 0 && scFilesD.length > 0){
        document.getElementById('sc-controls').style.display = 'flex';
        document.getElementById('sc-controls').style.flexWrap = 'wrap';
    }
}

// ===== ファイルリスト表示 =====
function renderScFileList(side){
    const files = side === 'setting' ? scFilesS : scFilesD;
    const drop  = document.getElementById('sc-drop-'+side);
    const icon  = side === 'setting' ? '📋' : '📥';
    const label = side === 'setting' ? '設定表' : 'ダウンロードデータ';

    if(files.length === 0){
        drop.innerHTML = `
            <div class="drop-icon">${icon}</div>
            <div class="drop-text">拖入${label}</div>
            <div class="drop-sub">支持 .xlsx / .xls（複数可）</div>
            <input type="file" id="sc-input-${side}" accept=".xlsx,.xls" multiple style="display:none">
        `;
        initScMultiDrop(side);
        return;
    }

    let listHtml = files.map((f, idx) => `
        <div style="display:flex;align-items:center;gap:6px;background:white;
                    border:1px solid #d0e8d0;border-radius:6px;padding:5px 10px;
                    margin-bottom:4px;font-size:0.78rem;">
            <span style="color:#27ae60;flex-shrink:0;">✅</span>
            <span style="flex:1;word-break:break-all;color:#333;">${f.name}</span>
            <span style="color:#999;flex-shrink:0;">${(f.size/1024).toFixed(0)}KB</span>
            <button onclick="scRemoveFile('${side}', ${idx})"
                style="background:#e74c3c;color:white;border:none;border-radius:3px;
                       padding:1px 6px;font-size:0.72rem;cursor:pointer;flex-shrink:0;">✕</button>
        </div>
    `).join('');

    drop.innerHTML = `
        <div style="width:100%;max-height:120px;overflow-y:auto;padding:4px 0;">
            ${listHtml}
        </div>
        <div style="margin-top:6px;font-size:0.75rem;color:#27ae60;font-weight:bold;text-align:center;">
            ${icon} ${files.length}件 ／ クリックして追加
        </div>
        <input type="file" id="sc-input-${side}" accept=".xlsx,.xls" multiple style="display:none">
    `;

    initScMultiDrop(side);

    // infoエリア更新
    const infoEl = document.getElementById('sc-'+(side==='setting'?'setting':'download')+'-info');
    if(infoEl) infoEl.innerHTML = `<span style="color:#27ae60;">✅ ${files.length}件選択済み</span>`;
}

// ===== ファイル削除 =====
window.scRemoveFile = function(side, idx){
    if(side === 'setting'){
        scFilesS.splice(idx, 1);
    } else {
        scFilesD.splice(idx, 1);
    }
    renderScFileList(side);

    if(scFilesS.length === 0 || scFilesD.length === 0){
        document.getElementById('sc-controls').style.display = 'none';
    }
};

// ===== チェック実行 =====
function runSettingCheck(){
    if(!scFilesS.length || !scFilesD.length){ alert('設定表とダウンロードデータを両方アップロードしてください'); return; }
    if(!scSystem){ alert('案件タイプを選択してください'); return; }
    const progress = document.getElementById('sc-progress');
    progress.textContent = '⏳ ファイルを読み込み中...';
    progress.classList.add('show');
    document.getElementById('sc-result-area').innerHTML = '';
    LibLoader.loadXLSX().then(() => _runSettingCheck());
}

function _runSettingCheck(){
    const progress = document.getElementById('sc-progress');
    let doneS = 0, doneD = 0;
    const wbsS = [], wbsD = [];

    function tryProceed(){
        if(doneS === scFilesS.length && doneD === scFilesD.length){
            scWbsS = wbsS;
            scWbsD = wbsD;
            _doSettingCheck();
        }
    }

    scFilesS.forEach((file, idx)=>{
        readWb(file, wb=>{ wbsS[idx] = { wb, fileName: file.name }; doneS++; tryProceed(); });
    });
    scFilesD.forEach((file, idx)=>{
        readWb(file, wb=>{ wbsD[idx] = { wb, fileName: file.name }; doneD++; tryProceed(); });
    });
}

function readWb(file, cb){
    const reader = new FileReader();
    reader.onload = e=>{
        const data = new Uint8Array(e.target.result);
        const wb   = XLSX.read(data, {type:'array', cellStyles:true, cellNF:true, cellDates:true});
        cb(wb);
    };
    reader.readAsArrayBuffer(file);
}

function _doSettingCheck(){
    const progress = document.getElementById('sc-progress');
    progress.textContent = '⏳ データ解析中...';
    setTimeout(()=>{
        try{
            if(scSystem.startsWith('amazon')){
                scResults = checkAmazon(scWbsS, scWbsD, scSystem);
            } else {
                scResults = { error: 'このシステムは未対応です。' };
            }
            document.getElementById('sc-progress').classList.remove('show');
            renderScResult();
        } catch(err){
            document.getElementById('sc-progress').textContent = '❌ チェック失敗：' + err.message;
            console.error(err);
        }
    }, 50);
}

// ===== 正規化・解析関数（変更なし） =====
function normNum(v){
    if(v === null || v === undefined || v === '') return '';
    const s = String(v).replace(/[¥￥$€]/g,'').replace(/,/g,'').trim();
    if(!s || s.toLowerCase() === 'nan' || s.toLowerCase() === 'none') return '';
    const f = parseFloat(s);
    if(isNaN(f)) return s;
    return f === Math.floor(f) ? String(Math.floor(f)) : f.toFixed(2);
}

function _convertTo24h(timeStr){
    if(!timeStr) return { hh:'00', mm:'00' };
    const s = String(timeStr).trim();
    const m24 = s.match(/^(\d{1,2})[：:](\d{2})$/);
    if(m24) return { hh: m24[1].padStart(2,'0'), mm: m24[2] };
    const m12 = s.match(/^(\d{1,2})[：:](\d{2})\s*(AM|PM)$/i);
    if(m12){
        let h = parseInt(m12[1]);
        const mm = m12[2];
        const period = m12[3].toUpperCase();
        if(period === 'AM'){ if(h === 12) h = 0; }
        else { if(h !== 12) h += 12; }
        return { hh: String(h).padStart(2,'0'), mm };
    }
    return { hh:'00', mm:'00' };
}

function normDateTime(v){
    if(!v) return '';
    const s = String(v).trim();
    if(/^\d{2}-\d{2}-\d{4}-\d{2}-\d{2}$/.test(s)) return s;
    const m = s.match(/(\d{4})-(\d{2})-(\d{2})[T\s](\d{2}):(\d{2})/);
    if(m){
        const { hh, mm } = _convertTo24h(`${m[4]}:${m[5]}`);
        return `${m[2]}-${m[3]}-${m[1]}-${hh}-${mm}`;
    }
    try{
        const parsed = new Date(s);
        if(!isNaN(parsed)){
            const mo = String(parsed.getMonth()+1).padStart(2,'0');
            const d  = String(parsed.getDate()).padStart(2,'0');
            const y  = parsed.getFullYear();
            return `${mo}-${d}-${y}-00-00`;
        }
    } catch(e){}
    return s;
}

function normDateTimeS(dayV, timeV){
    if(!dayV) return '';
    try{
        const dayS = String(dayV).trim();
        let dm = dayS.match(/(\d{4})-(\d{2})-(\d{2})/);
        if(!dm){
            const num = parseFloat(dayS);
            if(!isNaN(num) && num > 40000){
                const date = new Date((num - 25569) * 86400 * 1000);
                const y = date.getUTCFullYear();
                const mo = String(date.getUTCMonth()+1).padStart(2,'0');
                const d  = String(date.getUTCDate()).padStart(2,'0');
                const { hh, mm } = _convertTo24h(String(timeV || ''));
                return `${mo}-${d}-${y}-${hh}-${mm}`;
            }
            try{
                const parsed = new Date(dayS);
                if(!isNaN(parsed)){
                    const y  = parsed.getFullYear();
                    const mo = String(parsed.getMonth()+1).padStart(2,'0');
                    const d  = String(parsed.getDate()).padStart(2,'0');
                    const { hh, mm } = _convertTo24h(String(timeV || ''));
                    return `${mo}-${d}-${y}-${hh}-${mm}`;
                }
            } catch(e){}
            return dayS;
        }
        const { hh, mm } = _convertTo24h(String(timeV || ''));
        return `${dm[2]}-${dm[3]}-${dm[1]}-${hh}-${mm}`;
    } catch(e){ return String(dayV); }
}

function normSupplyS(v){
    if(!v) return '';
    const s = v.trim();
    if(s.includes('Amazon内')) return 'on_amazon';
    if(s.includes('Amazon外')) return 'off_amazon';

function judgeSSPFromThreeCols(owned, pubDirect, thirdParty){
    const hasOwned    = /[○✓✔YES有]/i.test(String(owned || ''));
    const hasPubDirect= /[○✓✔YES有]/i.test(String(pubDirect || ''));
    const hasThird    = /[○✓✔YES有]/i.test(String(thirdParty || ''));
    if(!hasOwned && !hasPubDirect && !hasThird) return { sSupplyNorm: '', sTwitchNorm: '' };
    const amazonOn = hasOwned || hasPubDirect;
    const thirdOn  = hasThird;
    let sSupplyNorm = '';
    if(amazonOn && thirdOn)  sSupplyNorm = 'all_ssp';
    else if(amazonOn)        sSupplyNorm = 'on_amazon';
    else if(thirdOn)         sSupplyNorm = 'off_amazon';

function judgeSupplyD(dSupply, sSupplyNorm, sTwitchNorm){
    if(!dSupply) return { ok: false, reason: '後台Supply sourceが空です' };
    const d = dSupply.toLowerCase();
    const hasAmazon = d.includes('amazon');
    const hasThird  = ['apd','aja','fluct','google adx','pubmatic','openx','magnite',
        'index','yieldone','teads','triplelift','media.net','equativ','sovrn',
        'improvedigital','inmobi','smaato','verizon','ironsource','kargo','ogury',
        'sharethrough','nativo','microsoft monetize','gumgum','onetag','spotify',
        'vungle','loopme','unity','unruly','yieldmo','mediagrid','exte'].some(k=>d.includes(k));
    const hasTwitch = d.includes('twitch');
    let supplyOk = false, supplyReason = '';
    if(!sSupplyNorm){
        supplyOk = true;
    } else if(sSupplyNorm === 'on_amazon'){
        supplyOk = hasAmazon && !hasThird;
        if(!supplyOk) supplyReason = hasThird ?
            '設定表はAmazon内ですが後台に第三者SSPが含まれています' :
            '設定表はAmazon内ですが後台にAmazon系SSPが見つかりません';
    } else if(sSupplyNorm === 'off_amazon'){
        supplyOk = hasThird;
        if(!supplyOk) supplyReason = '設定表はAmazon外ですが後台に第三者SSPが見つかりません';
    } else if(sSupplyNorm === 'all_ssp'){
        supplyOk = hasAmazon && hasThird;
        if(!supplyOk) supplyReason = '設定表は全SSPですが後台にAmazon系または第三者SSPが不足しています';
    }
    let twitchOk = true, twitchReason = '';
    if(sTwitchNorm === 'no_twitch' && hasTwitch){
        twitchOk = false;
        twitchReason = '設定表はTwitchなしですが後台にTwitchが含まれています';
    } else if(sTwitchNorm === 'twitch' && !hasTwitch){
        twitchOk = false;
        twitchReason = '設定表はTwitchありですが後台にTwitchが見つかりません';
    }
    return { ok: supplyOk && twitchOk, supplyOk, twitchOk,
             reason: [supplyReason, twitchReason].filter(r=>r).join('\n') };
}

function normFrequency(v){
    if(!v) return '';
    const s = String(v).trim();
    // 空白、模板值、NaN → 空（無設定扱い）
    if(!s || /^●(回|times?)[\/／]●(日間|day)/i.test(s) || s.toLowerCase() === 'nan') return '';
    // 日文格式: 支持半角 / 和全角 ／
    // 例: 1回／1日間, 1回/1日, 2回/7日間, 1回/1時間, 1回/30分
    const jp = s.match(/(\d+)\s*回\s*[\/／]\s*(?:(\d+)\s*)?(日間|日|時間|時|分間|分)/);
    if(jp){
        const u={'日間':'days','日':'days','時間':'hours','時':'hours','分間':'minutes','分':'minutes'};
        return `${jp[1]}_${jp[2]||'1'}_${u[jp[3]]||'days'}`;
    }
    // 英文格式: 5times/1day, 10times/7days, 3times/1hour
    // 設定表使用英文表記時的格式
    const en = s.match(/(\d+)\s*times?\s*\/\s*(\d+)\s*(day|days|hour|hours|minute|minutes)/i);
    if(en) return `${en[1]}_${en[2]}_${_normFreqUnit(en[3])}`;
    // 下载数据格式: FrequencyCap1:[User, 1, 1, Days]（含半角/全角空格）
    const m2 = s.match(/FrequencyCap\d*:?\s*\[User,\s*(\d+),\s*(\d+),\s*(\w+)\]/i);
    if(m2) return `${m2[1]}_${m2[2]}_${_normFreqUnit(m2[3])}`;
    // 無 FrequencyCap 前缀的格式: [User, 1, 1, Days]
    const m3 = s.match(/\[User,\s*(\d+),\s*(\d+),\s*(\w+)\]/i);
    if(m3) return `${m3[1]}_${m3[2]}_${_normFreqUnit(m3[3])}`;
    // 无法解析 → null 表示"要確認"（不可静默判定一致/不一致）
    return null;
}
// 单位归一化（Day/Days→days, Hour/Hours→hours, Minute/Minutes→minutes）
function _normFreqUnit(u){
    const ul = String(u||'').toLowerCase().trim();
    const map = {day:'days', days:'days', hour:'hours', hours:'hours', minute:'minutes', minutes:'minutes'};
    return map[ul] || ul;
}

function _normalizeAudienceName(name){
    return name
        .trim()
        // 去除末尾的 (数字ID)
        .replace(/\s*[\(\[]\d{5,}[\)\]]\s*$/g, '') 
        // 去除 Demo/Demographic 前缀
        .replace(/^(Demo|Demographic|Demographics)\s*[-：:]\s*/i, '')
        // 去除末尾 -Demographic/-Age/-Gender 等
        .replace(/\s*-\s*(Demographic|Demographics|Age|Gender)\s*$/i, '')
        // 全角空格→半角
        .replace(/\u3000/g, ' ')
        // 合并多余空格
        .replace(/\s+/g, ' ')
        .replace(/^(\S+)\s+\1\s+/i, '$1 ')
        .trim();
}
function audienceNameEquals(a,b){
    const an = _normalizeAudienceName(a || '');
    const bn = _normalizeAudienceName(b || '');
    if(an === bn) return true;
    const stripAmc = v => v.replace(/^AMC\s+/i, '').trim();
    return stripAmc(an) === stripAmc(bn) &&
        (/^AMC\s+/i.test(an) || /^AMC\s+/i.test(bn));
}
function parseAudienceS(v){
    if(!v) return { groups:[], notItems:[], raw:'' };
    const raw = String(v).trim();
    if(!raw || raw==='無し' || raw==='なし') return { groups:[], notItems:[], raw:'' };
    const notItems=[], notParts=raw.split(/\band\s+not\b/i);
    const mainPart=notParts[0].trim();
    for(let i=1;i<notParts.length;i++){
        const np=notParts[i].replace(/\([^)]+\)/g,'').trim();
        for(const item of np.split(/[\n;；,，]/)){
            const it=_normalizeAudienceName(item.trim().replace(/^(or|and)\s+/i, ''));
            if(it && !['AND','NOT','OR',''].includes(it.toUpperCase())) notItems.push(it);
        }
    }
    const lines=mainPart.split('\n').map(l=>l.trim()).filter(l=>l);
    const groupsRaw=[];let current=[];
    for(const line of lines){
        if(line.toLowerCase()==='and'||line==='and条件'){if(current.length){groupsRaw.push(current);current=[];}}
        else current.push(line);
    }
    if(current.length) groupsRaw.push(current);
    const groups=[];
    for(const grpLines of groupsRaw){
        const items=[];
        for(const line of grpLines){
            for(const seg of line.split(/[,;；,，]/)){
    // ★ 数字IDのみ除去（英数字を含む(ALL)などは保持）
    const s=seg.replace(/\s*[\(\[]\d{5,}[\)\]]\s*/g,'').trim();
    const name=_normalizeAudienceName(s.replace(/^(or|and)\s+/i, '').trim());
    if(name&&!['AND','NOT','OR',''].includes(name.toUpperCase())) items.push(name);
}
        }
        if(items.length) groups.push({items:items.sort()});
    }
    return {groups,notItems,raw};
}
function parseAudienceD(dlRow){
    if(!dlRow) return { groups:[], notItems:[], rawAr:'', rawAt:'' };

    const arVal = dlRow['Audiences - include'] || '';
    const atVal = dlRow['Audience names'] || '';

    if(!arVal && !atVal) return { groups:[], notItems:[], rawAr:'', rawAt:'' };

    // ===== 第一步：从AT列构建 ID→名字 映射 =====
    // AT列格式: "名前A (ID1); 名前B (ID2); ..."
    const idToName = {};  // { "426773...": "2604_MEMEME_90日-ProductViews" }
    const allNamesInOrder = []; // 按出现顺序保存所有名字

    if(atVal){
        for(const item of atVal.split(/[;；\n]/)){
            const it = item.trim();
            if(!it) continue;

            const m = it.match(/^(.+?)\s*\((\d{5,})\)\s*$/);
            if(m){
                const cleanName = _normalizeAudienceName(m[1]);
                const id = m[2].trim();
                idToName[id] = cleanName;
                allNamesInOrder.push(cleanName);
            } else {
                // 没有ID的纯名字
                const cleanName = _normalizeAudienceName(it);
                if(cleanName) allNamesInOrder.push(cleanName);
            }
        }
    }

    // ===== 第二步：用AR列解析关系（include / NOT） =====
    // AR列格式示例:
    //   只有include:  "(ID1; ID2)"  或  "(ID1)(ID2)"（多AND组）
    //   有NOT:        "(ID1)[NOT ID2]"  或  "(ID1; ID2)[NOT ID3; ID4]"
    //   无括号结构:   直接是名字（旧格式）

    const groups = [];
    const notItems = [];

    if(arVal){
        // 提取NOT部分
        const notMatch = arVal.match(/\[NOT\s+([^\]]+)\]/i);
        let arMain = arVal;

        if(notMatch){
            // 解析NOT中的ID列表
            const notIds = notMatch[1].split(/[;；\s]+/).filter(s => s.trim());
            for(const nid of notIds){
                const nid2 = nid.trim();
                if(!nid2) continue;
                if(idToName[nid2]){
                    notItems.push(idToName[nid2]);
                } else {
                    // ID在AT列没找到名字，保留原ID供提示
                    notItems.push(`(UnknownID:${nid2})`);
                }
            }
            arMain = arVal.substring(0, notMatch.index).trim();
        }

        // 解析include部分的AND分组
        // 格式: "(ID1; ID2)(ID3; ID4)" 或 "(ID1)"
        const parenGroups = [...arMain.matchAll(/\(([^)]+)\)/g)];

        if(parenGroups.length > 0){
            for(const pg of parenGroups){
                const ids = pg[1].split(/[;；\s]+/).filter(s => s.trim());
                const names = [];
                for(const id of ids){
                    const id2 = id.trim();
                    if(!id2) continue;
                    if(idToName[id2]){
                        names.push(idToName[id2]);
                    } else if(/^\d{5,}$/.test(id2)){
                        // 纯数字ID但AT列没有名字（可能AT列是空的）
                        names.push(`(UnknownID:${id2})`);
                    } else {
                        // 不是数字，当作名字直接用
                        names.push(_normalizeAudienceName(id2));
                    }
                }
                if(names.length > 0){
                    groups.push({ items: names.sort() });
                }
            }
        } else if(allNamesInOrder.length > 0){
            // AR列没有括号结构 → 用AT列的全部名字作为一个组
            // （排除已经在notItems里的）
            const notSet = new Set(notItems);
            const includeNames = allNamesInOrder.filter(n => !notSet.has(n));
            if(includeNames.length > 0){
                groups.push({ items: includeNames.sort() });
            }
        }
    } else if(allNamesInOrder.length > 0){
        // AR列为空，只有AT列 → 全部作为include
        groups.push({ items: allNamesInOrder.sort() });
    }

    return { groups, notItems, rawAr: arVal, rawAt: atVal };
}

function compareAudience(sP, dP){
    const diffs = [];
    let allMatch = true;

    // 两边都空 → 一致
    if(sP.groups.length === 0 && sP.notItems.length === 0 &&
       dP.groups.length === 0 && dP.notItems.length === 0){
        return { matched: true, diffs: [] };
    }

    // 设定表空，后台有 → 要确认（返回null）
    if(sP.groups.length === 0 && sP.notItems.length === 0 &&
       (dP.groups.length > 0 || dP.notItems.length > 0)){
        return { matched: null, diffs: ['設定表にAudienceの記載なし（後台には設定あり）'] };
    }

    // 设定表有，后台空 → 不一致
    if((sP.groups.length > 0 || sP.notItems.length > 0) &&
       dP.groups.length === 0 && dP.notItems.length === 0){
        const sDesc = sP.groups.map(g => g.items.join(' / ')).join(' AND ');
        return {
            matched: false,
            diffs: [`後台にAudienceが未設定（設定表：${sDesc}${sP.notItems.length>0?' AND NOT '+sP.notItems.join('/'):''}）`]
        };
    }

    // ===== include グループ比対 =====
    // 策略：把所有include名字扁平化成一个Set来比对
    // （因为AR列的括号分组和设定表的AND分组不一定完全一致）
    const sAllIncludes = new Set(sP.groups.flatMap(g => g.items));
    const dAllIncludes = new Set(dP.groups.flatMap(g => g.items)
        .filter(n => !n.startsWith('(UnknownID:')));  // 过滤掉无法识别的ID

    const sIncludes = [...sAllIncludes];
    const dIncludes = [...dAllIncludes];
    const includeWholeMatch =
        (sIncludes.length > 1 && dIncludes.length === 1 && audienceNameEquals(sIncludes.join(','), dIncludes[0])) ||
        (dIncludes.length > 1 && sIncludes.length === 1 && audienceNameEquals(sIncludes[0], dIncludes.join(',')));
    const onlyInS = includeWholeMatch ? [] : sIncludes.filter(n => !dIncludes.some(d => audienceNameEquals(n,d)));
    const onlyInD = includeWholeMatch ? [] : dIncludes.filter(n => !sIncludes.some(s => audienceNameEquals(n,s)));

    if(onlyInS.length > 0){
        allMatch = false;
        diffs.push(`【設定表にあるが後台未設定（ダウンロード後に存在しない）】\n  → ${onlyInS.join('\n  → ')}`);
    }
    if(onlyInD.length > 0){
        allMatch = false;
        diffs.push(`【後台にあるが設定表に記載なし】\n  → ${onlyInD.join('\n  → ')}`);
    }

    // ===== NOT条件比対 =====
    const sNotSet = new Set(sP.notItems);
    const dNotSet = new Set(dP.notItems.filter(n => !n.startsWith('(UnknownID:')));

    const onlySNot = [...sNotSet].filter(n => ![...dNotSet].some(d => audienceNameEquals(n,d)));
    const onlyDNot = [...dNotSet].filter(n => ![...sNotSet].some(s => audienceNameEquals(n,s)));

    if(onlySNot.length > 0){
        allMatch = false;
        diffs.push(`【NOT条件：設定表にあるが後台未設定】\n  → ${onlySNot.join('\n  → ')}`);
    }
    if(onlyDNot.length > 0){
        allMatch = false;
        diffs.push(`【NOT条件：後台にあるが設定表に記載なし】\n  → ${onlyDNot.join('\n  → ')}`);
    }

    return { matched: allMatch, diffs };
}

function readAreaSheet(wb){
    const result = { targeted: [], excluded: [] };
    const sheetName = wb.SheetNames.find(n =>
        n.includes('エリアシート') || n.includes('エリア') || n.toLowerCase().includes('area')
    );
    if(!sheetName) return result;
    const ws = wb.Sheets[sheetName];
    if(!ws || !ws['!ref']) return result;
    const rows = XLSX.utils.sheet_to_json(ws, { header:1, defval:'', raw:false });

    for(let i = 3; i < rows.length; i++){
        const bVal = String(rows[i][0] || '').trim();  // A列→含む/除外
        const cVal = String(rows[i][1] || '').trim();  // B列→エリア名
        if(!cVal) continue;

        // ★ 日語→英語変換
        const enName = convertAreaNameToEn(cVal);

        if(bVal.includes('含む') || bVal.toLowerCase().includes('targeted')){
            result.targeted.push(enName);
        } else if(bVal.includes('除外') || bVal.toLowerCase().includes('excluded')){
            result.excluded.push(enName);
        }
    }
    return result;
}

/**
 * 日語地名を英語に変換する
 * 英語がすでに入っている場合はそのまま返す
 */
function convertAreaNameToEn(name) {
    const trimmed = name.trim();
    if(!trimmed) return '';
    // まず辞書で直接検索
    if(JP_AREA_JA_TO_EN[trimmed]) return JP_AREA_JA_TO_EN[trimmed];
    // 前方一致（長い順に検索してより正確に）
    const keys = Object.keys(JP_AREA_JA_TO_EN).sort((a,b) => b.length - a.length);
    for(const k of keys){
        if(trimmed.startsWith(k)) return JP_AREA_JA_TO_EN[k];
    }
    // 変換できなかった場合はそのまま返す（英語で書かれている可能性）
    return trimmed;
}

// ===== セグメントシート読み込み（PVA用）=====
function readAllSegmentSheets(wb) {
    const segMap = {};
    for (const sheetName of wb.SheetNames) {
        if (!sheetName.includes('セグメントシート') && !sheetName.includes('セグメント')) continue;
        const ws = wb.Sheets[sheetName];
        if (!ws || !ws['!ref']) continue;
        const rows = XLSX.utils.sheet_to_json(ws, { header:1, defval:'', raw:false });
        let isNewFMT = false;
        const settingSheetName = wb.SheetNames.find(n =>
            n.includes('PVA設定') || n.includes('設定シート')
        );
        if (settingSheetName) {
            const settingWs = wb.Sheets[settingSheetName];
            const a1Cell = settingWs && settingWs['A1'];
            const verStr = a1Cell ? String(a1Cell.v || '').trim() : '';
            const verMatch = verStr.match(/Ver\.?(\d+)-(\d+)/i);
            if (verMatch) {
                const major = parseInt(verMatch[1]);
                const minor = parseInt(verMatch[2]);
                isNewFMT = (major > 1) || (major === 1 && minor >= 6);
            }
        }
        if (!isNewFMT) {
            const row2 = rows[2] || [];
            const row2C = String(row2[2] || '').trim();
            const row2H = String(row2[7] || '').trim();
            const row2M = String(row2[12] || '').trim();
            isNewFMT = [row2C, row2H, row2M].some(v =>
                v.toLowerCase().includes('include') ||
                v.toLowerCase().includes('exclude') ||
                v.includes('含む') || v.includes('除外')
            );
        }
        const data = isNewFMT
            ? _readSegmentSheetNewFMT(rows)
            : _readSegmentSheetOldFMT(rows);
        segMap[sheetName] = data;
    }
    return segMap;
}

function _findSegmentForLI(audienceVal, segMap, liName) {
    if (!audienceVal || !audienceVal.includes('セグメントシート')) {
        return { groups: [], groupOps: [] };
    }
    // ★ 「セグメントシート（CTV）」など括弧内のキーワードを抽出
    const m = audienceVal.match(/セグメントシート[（(「]([^）)」]+)[）)」]/);
    let keyword = m ? m[1].trim() : '';

    // ★ キーワードが取れない場合（「セグメントシート」で指定 など）
    //    LI名からキーワードを推測（例：PVA_demo_CTV_30s → CTV）
    if(!keyword && liName){
        // LI名の _ 区切りパーツから、セグメントシート名に含まれるものを探す
        const liParts = liName.split(/[_\-]/).map(p => p.trim()).filter(p => p.length >= 2);
        for(const [sheetName, data] of Object.entries(segMap)){
            // シート名の括弧内の文字列を抽出（例：セグメントシート（CTV）→ CTV）
            const sm = sheetName.match(/[（(]([^）)]+)[）)]/);
            const sheetKey = sm ? sm[1].trim() : '';
            if(sheetKey && liParts.some(p =>
                p.toLowerCase() === sheetKey.toLowerCase() ||
                sheetKey.toLowerCase().includes(p.toLowerCase())
            )){
                return data;
            }
        }
        // フォールバック：LI名の全パーツについてシート名に含まれるかチェック
        for(const [sheetName, data] of Object.entries(segMap)){
            if(liParts.some(p => p.length >= 2 && sheetName.toLowerCase().includes(p.toLowerCase()))){
                return data;
            }
        }
        return { groups: [], groupOps: [] };
    }

    if (!keyword) return { groups: [], groupOps: [] };
    for (const [sheetName, data] of Object.entries(segMap)) {
        if (sheetName.includes(keyword)) return data;
    }
    // 模糊匹配兜底
    const keyParts = keyword.split(/[×・]/);
    for (const [sheetName, data] of Object.entries(segMap)) {
        if (keyParts.every(p => p.trim() && sheetName.includes(p.trim()))) return data;
    }
    return { groups: [], groupOps: [] };
}

// ===== 新FMT(Ver.1-6) =====
// 行0: グループヘッダー
// 行1: グループ間演算子
// 行2: 含む/除外（C列=index2, H列=index7, M列=index12）
// 行3: グループ内演算子
// 行4: セグメント名ラベル
// 行5～: セグメントデータ
function _readSegmentSheetNewFMT(rows){
    const result = { groups: [], groupOps: [] };

    // グループ間演算子：行1のE列(4)とJ列(9)
    const row1 = rows[1] || [];
    [4, 9].forEach(col => {
        const op = String(row1[col] || '').trim();
        if(op.includes('および') || op.toLowerCase().includes('and')){
            result.groupOps.push('and');
        } else if(op.includes('または') || op.toLowerCase().includes('or')){
            result.groupOps.push('or');
        }
    });

    // 含む/除外：行2のC列(2), H列(7), M列(12)
    const row2 = rows[2] || [];
    const TYPE_COLS = [2, 7, 12];
    const SEG_COLS  = [1, 6, 11];
    const DATA_START_ROW = 5;

    TYPE_COLS.forEach((typeCol, idx) => {
        const typeVal = String(row2[typeCol] || '').trim();
        if(!typeVal) return;

        const type = (typeVal.toLowerCase().includes('exclude') || typeVal.includes('除外'))
            ? 'Exclude' : 'Include';

        const segCol = SEG_COLS[idx];
        const segments = [];
        for(let i = DATA_START_ROW; i < rows.length; i++){
            const seg = String(rows[i][segCol] || '').trim();
            if(!seg) continue;
            if(['セグメント名','グループ内演算子','含む/除外',
                'グループ間演算子'].includes(seg)) continue;
            segments.push(seg);
        }

        if(segments.length > 0){
            result.groups.push({ type, segments });
        }
    });

    console.log('★新FMT結果:', JSON.stringify(result));
    return result;
}

// ===== 旧FMT(Ver.1-5) =====
// 行0: グループヘッダー
// 行1: グループ内演算子
// 行2: セグメント名ラベル
// 行3～: Include/Exclude + セグメントデータ
//   B列(1)=Include/Exclude, C列(2)=セグメント名（グループ1）
//   F列(5)=Include/Exclude, G列(6)=セグメント名（グループ2）
//   J列(9)=Include/Exclude, K列(10)=セグメント名（グループ3）
function _readSegmentSheetOldFMT(rows){
    const result = { groups: [], groupOps: [] };

    // ===== 列構造を動的に検出 =====
    // 旧FMTのヘッダー行（行2か行3）からInclude/Excludeの列を探す
    // データ行（行3以降）でInclude/Excludeが入っている列 = TYPE_COL
    // その右隣の列 = SEG_COL

    // まずグループ間演算子を行0～2から探す
    for(let ri = 0; ri <= 2; ri++){
        const r = rows[ri] || [];
        r.forEach(v => {
            const s = String(v || '').trim();
            if(result.groupOps.length >= 2) return;
            if(s.includes('および') || s.toLowerCase() === 'and'){
                result.groupOps.push('and');
            } else if(s.includes('または') || s.toLowerCase() === 'or'){
                result.groupOps.push('or');
            }
        });
    }

    // ===== データ行から列インデックスを動的検出 =====
    // 行3（index=3）を見て、Include/Excludeが入っている列を探す
    const SKIP_LABELS = [
        'セグメント名','グループ内演算子','含む/除外',
        'グループ間演算子','グループ1','グループ2','グループ3',
        'および(and)','または(or)'
    ];

    // データ開始行を探す（Include/Excludeが最初に現れる行）
    let dataStartRow = -1;
    const typeCols = [];   // Include/Excludeが入る列インデックス
    const segCols  = [];   // セグメント名が入る列インデックス

    for(let ri = 2; ri < Math.min(6, rows.length); ri++){
        const r = rows[ri] || [];
        const foundTypeCols = [];
        r.forEach((v, ci) => {
            const s = String(v || '').trim();
            if(s.toLowerCase() === 'include' || s.toLowerCase() === 'exclude'
               || s === '含む' || s === '除外'){
                foundTypeCols.push(ci);
            }
        });
        if(foundTypeCols.length > 0){
            dataStartRow = ri;
            foundTypeCols.forEach(tc => {
                typeCols.push(tc);
                // セグメント名の列 = type列の右隣（+1）
                segCols.push(tc + 1);
            });
            break;
        }
    }

    console.log('★旧FMT dataStartRow:', dataStartRow, 'typeCols:', typeCols, 'segCols:', segCols);

    if(dataStartRow === -1 || typeCols.length === 0){
        console.log('★旧FMT: 列構造検出失敗');
        return result;
    }

    // ===== グループごとにセグメント収集 =====
    const groupData = typeCols.map(() => ({ segments: [], type: 'Include' }));

    for(let i = dataStartRow; i < rows.length; i++){
        typeCols.forEach((typeCol, idx) => {
            const typeVal = String(rows[i][typeCol] || '').trim();
            const segVal  = String(rows[i][segCols[idx]] || '').trim();

            if(!segVal) return;
            if(SKIP_LABELS.some(s => segVal.includes(s))) return;

            if(typeVal.toLowerCase() === 'include' || typeVal.includes('含む')){
                groupData[idx].type = 'Include';
            } else if(typeVal.toLowerCase() === 'exclude' || typeVal.includes('除外')){
                groupData[idx].type = 'Exclude';
            }

            groupData[idx].segments.push(segVal);
        });
    }

    groupData.forEach(g => {
        if(g.segments.length > 0){
            result.groups.push({ type: g.type, segments: g.segments });
        }
    });

    console.log('★旧FMT結果:', JSON.stringify(result));
    return result;
}

function fixLiNameColumnFromPreviousHeader(allRows, headerRowIdx, colIdx){
    if('LI_NAME' in colIdx) return;
    for(let r=headerRowIdx-1; r>=Math.max(0, headerRowIdx-2); r--){
        const row = allRows[r] || [];
        for(let c=0; c<row.length; c++){
            const cell = String(row[c] || '');
            if(cell.includes('Line Item Name') || cell.includes('ラインアイテム名')){
                colIdx['LI_NAME'] = c;
                return;
            }
        }
    }
    // Last-resort fallback for legacy sheets; may read row numbers if the format changed.
    colIdx['LI_NAME'] = 1;
}

// ===== VIDEO LINE ITEMS 下载数据読み取り（PVA/OTT共用）=====
function readDownloadDataVideoMulti(wbsD){
    const liMap = {};
    const files = [];
    const ioDownloadMap = {};

    wbsD.forEach(({ wb, fileName }) => {
        let targetSheet = null, targetHeaderRow = 0, bestScore = 0;

        for(const sname of wb.SheetNames){
            const ws = wb.Sheets[sname];
            if(!ws || !ws['!ref']) continue;
            const rows = XLSX.utils.sheet_to_json(ws,{header:1,defval:'',raw:false}).slice(0,30);
            for(let i=0; i<rows.length; i++){
                const rowStr = rows[i].join(' ');
                let score = 0;
                if(rowStr.includes('Line name'))              score += 5;
                if(rowStr.includes('Video Ad Content Type'))  score += 8;
                if(rowStr.includes('Supply source'))           score += 4;
                if(rowStr.includes('Base supply bid'))         score += 3;
                if(rowStr.includes('Pacing profile'))          score += 3;
                if(rowStr.includes('Audience names'))          score += 3;
                // ★ VIDEO LINE ITEMS を最優先
                if(sname.toUpperCase().includes('VIDEO LINE ITEMS'))   score += 20;
                if(sname.toUpperCase().includes('DISPLAY LINE ITEMS')) score -= 30;
                if(score > bestScore){
                    bestScore = score;
                    targetSheet = sname;
                    targetHeaderRow = i;
                }
            }
        }

        if(!targetSheet || bestScore < 5){
            files.push({ fileName, sheet:'（未発見）', liCount:0, lis:[] });
            return;
        }

        const ws = wb.Sheets[targetSheet];
        const allRows = XLSX.utils.sheet_to_json(ws,{header:1,defval:'',raw:false});
        const headers = allRows[targetHeaderRow].map(h => String(h).trim());
        const liColIdx = headers.findIndex(h => h.toLowerCase().includes('line name'));
        const orderColIdx = headers.findIndex(h =>
            h.toLowerCase().includes('order name') || h === 'Order name - (READ ONLY)');

        if(liColIdx === -1){
            files.push({ fileName, sheet:targetSheet, liCount:0, lis:[] });
            return;
        }

        const junkPattern = /Follow instructions|Choose from|Don't delete|READ ONLY|informational|Use letters|Enter a number|Leave blank|Choose from dropdown/i;
        const fileLis = [];
        let fileIoName = '';

        for(let i=targetHeaderRow+1; i<allRows.length; i++){
            const row = allRows[i];
            const liName = row[liColIdx] ? String(row[liColIdx]).trim() : '';
            if(!liName || junkPattern.test(liName)) continue;

            const obj = { __LI_NAME__: liName };
            headers.forEach((h,idx) => {
                if(h) obj[h] = row[idx] !== undefined ? String(row[idx]).trim() : '';
            });

            if(orderColIdx !== -1 && !fileIoName){
                const orderVal = String(row[orderColIdx] || '').trim();
                if(orderVal && !junkPattern.test(orderVal)) fileIoName = orderVal;
            }

            obj.__IO_NAME_D__ = fileIoName;
            obj.__FILE_D__    = fileName;

            liMap[liName] = obj;
            fileLis.push({ name:liName, status:obj['Active/Inactive']||'' });

            if(fileIoName){
                if(!ioDownloadMap[fileIoName]) ioDownloadMap[fileIoName] = [];
                ioDownloadMap[fileIoName].push(liName);
            }
        }

        files.push({
            fileName, sheet:targetSheet,
            liCount:fileLis.length, lis:fileLis, ioName:fileIoName
        });
    });

    return { liMap, files, ioDownloadMap };
}

// ===== PVA/OTT 共用列定義 =====
const DL_COLUMNS_VIDEO = [
    { key:'Line ID',                   ja:'ラインID',            checkFn:null, autoHide:true },
    { key:'Advertiser ID*',            ja:'広告主ID',            checkFn:null, autoHide:true },
    { key:'Advertiser name',           ja:'広告主名',            checkFn:null, autoHide:true },
    { key:'Order ID*',                 ja:'オーダーID',          checkFn:null, autoHide:true },
    { key:'Order name - (READ ONLY)',  ja:'オーダー名',          checkFn:null, autoHide:true },
    { key:'Line type*',                ja:'広告フォーマット',
      checkFn:(s,v) => !!(v && v.toLowerCase().includes('video'))
    },
    { key:'Line name*',                ja:'ラインアイテム名',    checkFn:null },
    { key:'Video Ad Content Type*',    ja:'VideoコンテンツType',
      checkFn:(s,v) => !!(v && v.toUpperCase().includes('STREAMING_TV'))
    },
    { key:'Line start date',           ja:'開始日時',
      checkFn:(s,v) => {
        const sd = normDateTimeS(s.start_day, s.start_time);
        return !sd || sd === normDateTime(v);
      }
    },
    { key:'Line end date',             ja:'終了日時',
      checkFn:(s,v) => {
        const ed = normDateTimeS(s.end_day, s.end_time);
        return !ed || ed === normDateTime(v);
      }
    },
    { key:'Active/Inactive',           ja:'配信状態',
      checkFn:(s,v) => v && v.toLowerCase() === 'pause'
    },
    { key:'Product categories*',       ja:'商材カテゴリ',
      checkFn:(s,v) => {
        if(!v || !s.product_small) return true;
        const dLast = (v.split(':').pop() || '').replace(/\s/g,'').toLowerCase();
        const sSmall = (s.product_small || '').replace(/\s/g,'').toLowerCase();
        return !sSmall || dLast.includes(sSmall) || sSmall.includes(dLast);
      }
    },
    { key:'Device type',               ja:'デバイス',
      checkFn:(s,v) => {
        const sd = (s.device || '').toLowerCase();
        const dv = (v  || '').toLowerCase();
        if(!sd) return null;
        const sHasAll = sd.includes('all') || (sd.includes('desktop') && sd.includes('mobile') && sd.includes('connected'));
        if(sHasAll) return dv.includes('all') || (dv.includes('desktop') && dv.includes('mobile'));
        return (sd.includes('desktop') === dv.includes('desktop')) &&
               (sd.includes('mobile')  === dv.includes('mobile'))  &&
               (sd.includes('connected') === dv.includes('connected'));
      }
    },
    { key:'Mobile environment',        ja:'モバイル環境',
      checkFn:(s,v) => normMobileEnv(s.mobile_env) === normMobileEnv(v)
    },
    { key:'Supply source',             ja:'SSP/Supply source',
      checkFn:(s,v) => {
        if(!v) return null;
        const dv = v.toLowerCase();
        // PVA: DealIDが含まれているか確認
    if(s.__SYSTEM__ === 'amazon_pva'){
        const dealId = (s.deal_id || '').trim().toLowerCase();
        if(!dealId) return null;
        return dv.includes(dealId);
    }
        // OTT: 設定表のSSP欄と照合
        const ssp = (s.ssp || '').toLowerCase();
        if(!ssp || ssp === 'all') return null;
        return dv.includes(ssp) || ssp.includes(dv.split(':')[0].trim());
      }
    },
    // 修正後 ★ Netflix Web Video: などのプレフィックスを除去
{ key:'Deal selection', ja:'DealID',
  checkFn:(s,v) => {
    if(!s.deal_id || !v) return null;
    // 後台の "Netflix Web Video:UUID" → UUIDだけ抽出して比対
    const cleanV = v.replace(/^[^:]+:\s*/,'').trim();
    return cleanV === s.deal_id.trim() || v.includes(s.deal_id);
  }
},
    { key:'Targeting - Content', ja:'コンテンツ(Rating)',
  checkFn:(s,v) => {
    const dv = (v||'').trim().toLowerCase();
    if(!dv || dv.includes('twitch_expanded')) return true;   // ✅ 正常
    return null;                                              // ☞ 開発者連絡
  }
},

    // 修正後 ★ DSP版に合わせて強化
{ key:'Location targeting by',    ja:'位置情報シグナル',
  checkFn:(s,v) => {
    // location_sig優先、なければlocationから判定
    const sig = (s.location_sig || s.location || '').toLowerCase();
    if(!sig) return null;
    
    const dv = (v || '').toLowerCase();
    
    // 設定表に "only if currently in" が含まれる場合
    // → 後台も "currently" が含まれればOK
    if(sig.includes('only if currently') || sig.includes('real-time')){
      if(!dv) return null;  // 後台が空なら要確認
      return dv.includes('currently');
    }
    
    // それ以外は比対スキップ
    return null;
  }
},

    { key:'Location targeting 1 of 2', ja:'配信地域（含む）',
  checkFn:(s,v) => {
    // ★ PVA PG案件：LocationはDealレベルで管理されるため比較対象外
    if(s.__SYSTEM__ === 'amazon_pva' &&
       String(s.deal_type || '').trim().toLowerCase() === 'programmatic guaranteed'){
        s.__pg_skip__ = 'PGのため比較対象外';
        return null;
    }
    const loc = (s.location || s.region || '').trim();
    const locL = loc.toLowerCase();

    // ===== エリアシート参照モード =====
    if(locL.includes('別紙') || locL.includes('エリアシート')){
        const area = s.__AREA_SHEET__;
        if(!area || area.targeted.length === 0) return null;
        if(!v || !v.trim()){
            s.__location_diff__ = `エリアシートに含む地域が指定されていますが後台が空です：${area.targeted.join(', ')}`;
            return false;
        }

        // ★ 後台の地域名を正規化（"Prefecture:Osaka, JP" → "osaka"）
        const normLocName = (raw) => {
            const s = raw.trim();
            const colonIdx = s.indexOf(':');
            let name = colonIdx !== -1
                ? s.substring(colonIdx + 1).split(',')[0].trim()
                : s;
            // ★ " Prefecture" / " prefecture" を除去して正規化
            return name.replace(/\s*prefecture\s*$/i, '').trim().toLowerCase();
        };

        const dLocNames = v.split(';').map(normLocName).filter(Boolean);

        // ★ 設定表側も同様に " Prefecture" を除去して正規化
        const normSettingName = (name) =>
            name.replace(/\s*prefecture\s*$/i, '').trim().toLowerCase();

        const missing = area.targeted.filter(a =>
            !dLocNames.includes(normSettingName(a))
        );
        if(missing.length > 0){
            s.__location_diff__ = `後台に含まれていない地域：${missing.join(', ')}`;
            return false;
        }
        return true;
    }

    // ===== 通常モード =====
    if(!locL) return null;
    if(locL.includes('japan')) return (v || '').toLowerCase().includes('japan');
    return null;
  }
},
    { key:'Location excluding 1 of 2', ja:'除外地域（エリアシート）',
  checkFn:(s,v) => {
    const loc = (s.location || s.region || '').trim();
    const locL = loc.toLowerCase();
    if(!(locL.includes('別紙') || locL.includes('エリアシート'))) return null;
    const area = s.__AREA_SHEET__;
    if(!area || area.excluded.length === 0) return null;
    if(!v || !v.trim()){
        s.__location_excl_diff__ = `エリアシートに除外地域が指定されていますが後台が空です：${area.excluded.join(', ')}`;
        return false;
    }

    // ★ 同じ正規化ロジック
    const normLocName2 = (raw) => {
        const s = raw.trim();
        const colonIdx = s.indexOf(':');
        let name = colonIdx !== -1
            ? s.substring(colonIdx + 1).split(',')[0].trim()
            : s;
        return name.replace(/\s*prefecture\s*$/i, '').trim().toLowerCase();
    };

    const dLocNames2 = v.split(';').map(normLocName2).filter(Boolean);

    const normSettingName2 = (name) =>
        name.replace(/\s*prefecture\s*$/i, '').trim().toLowerCase();

    const missing = area.excluded.filter(a =>
        !dLocNames2.includes(normSettingName2(a))
    );
    if(missing.length > 0){
        s.__location_excl_diff__ = `後台に除外されていない地域：${missing.join(', ')}`;
        return false;
    }
    return true;
  }
},
    { key:'Audiences - include',       ja:'オーディエンスID',   checkFn:null, autoHide:true },
    { key:'Reach similar audiences', ja:'類似オーディエンス',
  checkFn:(s,v)=>{
    const sP = parseAudienceS(s.audience);
    const hasAud = sP.groups.length > 0 || sP.notItems.length > 0;
    const dv = (v||'').trim().toUpperCase();
    if(hasAud){
        if(dv === 'NO') return true;
        else if(!dv || dv === 'YES') return false;
        else return null;
    } else {
        if(!dv || dv === 'YES') return true;
        else return null;
    }
}
},
    { key:'Audience names', ja:'オーディエンス名',
  checkFn:(s, v, dlRow)=>{
    const settingVal = (s.audience || '').trim();

    // 設定表が「セグメントシート」参照の場合
    const isSegSheet = settingVal.includes('セグメントシート');

    if(isSegSheet){
        const seg = s.__SEGMENT_SHEET__;
        if(!seg || seg.groups.length === 0) return null;

        // 後台のAudience names列からIDを除去して名前リストを作成
        const rawNames = (v || '').split(';').map(item => {
            return item.replace(/\(\d+\)/g, '').trim();
        }).filter(Boolean);

        // 後台のAudiences - include列からグループ構造を解析
        const arVal = dlRow ? (dlRow['Audiences - include'] || '') : '';

        // グループ数カウント（Includeグループ = ()の数, Excludeグループ = []の数）
        const dIncludeGroups = (arVal.match(/\([^)]+\)/g) || []);
        const dExcludeGroups = (arVal.match(/\[[^\]]+\]/g) || []);

        const sIncludeGroups = seg.groups.filter(g => g.type === 'Include');
        const sExcludeGroups = seg.groups.filter(g => g.type === 'Exclude');

        // グループ数比較
        if(sIncludeGroups.length !== dIncludeGroups.length){
            s.__audience_diff__ = 
                `Includeグループ数不一致：設定表${sIncludeGroups.length}グループ / 後台${dIncludeGroups.length}グループ`;
            return false;
        }
        if(sExcludeGroups.length !== dExcludeGroups.length){
            s.__audience_diff__ = 
                `Excludeグループ数不一致：設定表${sExcludeGroups.length}グループ / 後台${dExcludeGroups.length}グループ`;
            return false;
        }

        // 全セグメント名が後台に存在するか確認（順不同）
        // ★ 両側を _normalizeAudienceName で正規化してから比較
        //    （設定表: "Demographic > Age > AudienceOne: Age 20-21"
        //      後台:   "Demo - AudienceOne: Age 20-21" → 正規化で "AudienceOne: Age 20-21"）
        const allSettingSegs = seg.groups.flatMap(g => g.segments);
        const normalizedDNames = rawNames.map(d => ({
            orig: d,
            norm: _normalizeAudienceName(d).toLowerCase(),
        }));
        const missing = allSettingSegs.filter(segName => {
            const normS = _normalizeAudienceName(segName).toLowerCase();
            // 階層区切り > の最終部分も比較用に抽出（"Demographic > Age > X" → "X"）
            const lastPart = normS.includes('>') ? normS.split('>').pop().trim() : '';
            return !normalizedDNames.some(({norm: normD}) =>
                normD.includes(normS) || normS.includes(normD) ||
                (lastPart && (normD.includes(lastPart) || lastPart.includes(normD)))
            );
        });

        if(missing.length > 0){
            s.__audience_diff__ = `後台に見つからないセグメント：\n${missing.join('\n')}`;
            return false;
        }

        return true;
    }

    // 通常モード（既存ロジック）
    const sP = parseAudienceS(s.audience);
    const hasS = sP.groups.length > 0 || sP.notItems.length > 0;
    const hasD = !!(v && v.trim());
    if(!hasS && !hasD) return true;
    if(!hasS && hasD)  return null;
    const dP = parseAudienceD(
        dlRow || { 'Audience names': v, 'Audiences - include': '' }
    );
    const result = compareAudience(sP, dP);
    if(result.diffs && result.diffs.length > 0){
        s.__audience_diff__ = result.diffs.join('\n\n');
    }
    return result.matched === null ? null : result.matched;
  }
},
    { key:'Automated optimization',    ja:'自動最適化',
      checkFn:(s,v) => {
        const sa = normAutoOpt(s.auto_opt);
        return !sa || sa === normAutoOpt(v);
      }
    },
    { key:'Line item budget',          ja:'予算',
      checkFn:(s,v) => {
        const sb = normNum(s.budget);
        return !sb || sb === normNum(v);
      }
    },
    { key:'Budget cap',                ja:'日予算',
      checkFn:(s,v) => {
        const sc = normNum(s.budget_cap);
        return !sc || sc === normNum(v);
      }
    },
    { key:'Pacing profile',            ja:'配信ペース',
      checkFn:(s,v) => {
        // ★ PVA PG案件：配信ペースはDealレベルで管理されるため比較対象外
        if(s.__SYSTEM__ === 'amazon_pva' &&
           String(s.deal_type || '').trim().toLowerCase() === 'programmatic guaranteed'){
            s.__pg_skip__ = 'PGのため比較対象外';
            return null;
        }
        const sp = normPacing(s.pacing);
        return !sp || sp === normPacing(v);
      }
    },
    { key:'3P fees',                   ja:'3Pフィー',            checkFn:null, autoHide:true },
    { key:'Base supply bid*',          ja:'ベースCPM',
      checkFn:(s,v) => {
        // ★ PVA PG案件：ベースCPMはDealレベルで管理されるため比較対象外
        if(s.__SYSTEM__ === 'amazon_pva' &&
           String(s.deal_type || '').trim().toLowerCase() === 'programmatic guaranteed'){
            s.__pg_skip__ = 'PGのため比較対象外';
            return null;
        }
        return normNum(s.base_cpm) === normNum(v);
      }
    },
    { key:'Maximum average CPM', ja:'上限CPM',
  checkFn:(s,v) => {
    // ★ PVA PG案件：上限CPMはDealレベルで管理されるため比較対象外
    if(s.__SYSTEM__ === 'amazon_pva' &&
       String(s.deal_type || '').trim().toLowerCase() === 'programmatic guaranteed'){
        s.__pg_skip__ = 'PGのため比較対象外';
        return null;
    }
    if(!s.max_cpm || !v) return null;
    // ¥1,822 → 1822
    const sVal = parseFloat(s.max_cpm.replace(/[¥,￥\s]/g, ''));
    // 1821.6 → 1821.6（四捨五入しない）
    const dVal = parseFloat(String(v).replace(/[¥,￥\s]/g, ''));
    if(isNaN(sVal) || isNaN(dVal)) return null;
    return sVal === dVal;  // 厳密比対
  }
},
    { key:'Creative rotation type', ja:'クリエイティブローテーション',
      checkFn:(s,v) => {
        const dv = (v || '').trim().toLowerCase();
        if(!dv || dv === 'random') return true;  // 空またはRandomは✅
        return null;  // それ以外は要確認
      }
    },
    { key:'Upload failure',            ja:'アップロードエラー',  checkFn:null, autoHide:true },
];

// ===== PVA/OTT マッチング比対 =====
function matchAndCompareVideo(settingData, downloadMap, system){
    const results = [];

    for(const sRow of settingData){
        const liName  = sRow.__LI_NAME__;
        const ioName  = sRow.__IO_NAME__ || '';
        let dRow = null, matchedName = liName;

        // ① 完全一致
        if(downloadMap[liName]) dRow = downloadMap[liName];

        // ② IO名スコープでファジー検索
        if(!dRow && ioName){
            const scopedNames = Object.keys(downloadMap).filter(n => {
                const d = downloadMap[n];
                return d.__IO_NAME_D__ &&
                    (d.__IO_NAME_D__.includes(ioName) || ioName.includes(d.__IO_NAME_D__));
            });
            const fuzzy = scopedNames.find(n => {
                const nl = n.toLowerCase(), ll = liName.toLowerCase();
                return nl === ll ||
                    (nl.includes(ll) && ll.length/nl.length > 0.7) ||
                    (ll.includes(nl) && nl.length/ll.length > 0.7);
            });
            if(fuzzy){ dRow = downloadMap[fuzzy]; matchedName = fuzzy; }
        }

        // ③ 全体ファジー（フォールバック）
        if(!dRow){
            const fuzzy = Object.keys(downloadMap).find(n => {
                const nl = n.toLowerCase(), ll = liName.toLowerCase();
                return nl === ll ||
                    (nl.includes(ll) && ll.length/nl.length > 0.7) ||
                    (ll.includes(nl) && nl.length/ll.length > 0.7);
            });
            if(fuzzy){ dRow = downloadMap[fuzzy]; matchedName = fuzzy; }
        }

        const found = !!dRow;

        function dGet(key){
            if(!dRow) return '';
            if(dRow[key] !== undefined) return String(dRow[key] || '');
            const aliases = DL_COL_ALIASES[key] || [];
            for(const a of aliases){ if(dRow[a] !== undefined) return String(dRow[a] || ''); }
            return '';
        }

        function sGetForCol(key){
            const map = {
                'Line name*':              sRow.__LI_NAME__,
                'Line type*':              'Video',
                'Video Ad Content Type*':  'STREAMING_TV',
                'Line start date':         [sRow.start_day, sRow.start_time].filter(Boolean).join(' '),
                'Line end date':           [sRow.end_day,   sRow.end_time].filter(Boolean).join(' '),
                'Active/Inactive':         'Pause',
                'Product categories*':     sRow.product_small,
                'Device type':             sRow.device,
                'Mobile environment':      sRow.mobile_env,
                'Supply source':           system === 'amazon_pva'
                    ? `DealID: ${sRow.deal_id || ''}` : sRow.ssp,
                'Deal selection':          sRow.deal_id,
                'Targeting - Content':     sRow.content,
                'Location targeting by':   sRow.location_sig || sRow.location,
                'Location targeting 1 of 2': sRow.location || sRow.region,
                'Audiences - include':     sRow.audience,
                'Reach similar audiences': sRow.audience ? '（AudienceありのためNO）' : '',
                'Audience names': (sRow.audience || '').includes('セグメントシート')
                    ? `セグメントシート参照（グループ数:${(sRow.__SEGMENT_SHEET__?.groups||[]).length}）`
                    : sRow.audience,
                'Automated optimization':  sRow.auto_opt,
                'Line item budget':        sRow.budget,
                'Budget cap':              sRow.budget_cap,
                'Pacing profile':          sRow.pacing,
                'Base supply bid*':        sRow.base_cpm,
                'Maximum average CPM':     sRow.max_cpm,
            };
            return map[key] !== undefined ? String(map[key] || '') : '';
        }

        const PG_SKIP_KEYS = ['Location targeting 1 of 2', 'Pacing profile', 'Base supply bid*', 'Maximum average CPM'];
        const colResults = DL_COLUMNS_VIDEO.map(col => {
    const dVal = dGet(col.key);
    const sVal = sGetForCol(col.key);
    let result = null;
    if(found && col.checkFn){
        try { result = col.checkFn(sRow, dVal, dRow); }  // ← 加第3个参数 dRow
        catch(e){ result = null; }
    }
    return { key:col.key, ja:col.ja, sVal, dVal, result,
        skipReason: sRow.__pg_skip__ && PG_SKIP_KEYS.includes(col.key)
            ? sRow.__pg_skip__ : '' };
});

        results.push({
    liName,
    __IO_NAME__:    sRow.__IO_NAME__ || '',
    __SHEET__:      sRow.__SHEET__   || '',
    __FILE_S__:     sRow.__FILE_S__  || '',
    found,
    matchedName:    dRow ? matchedName : null,
    matchedIOName:  dRow ? (dRow.__IO_NAME_D__ || '') : '',
    matchedFileD:   dRow ? (dRow.__FILE_D__    || '') : '',
    isPause:        dRow ? (dRow['Active/Inactive']||'').toLowerCase()==='pause' : null,
    activeStatus:   dRow ? dRow['Active/Inactive'] : '',
    colResults,
    mismatchCount:  colResults.filter(c => c.result === false && !c.skipReason).length,
    // ★ sRowから差異情報を引き継ぐ
    __audience_diff__:      sRow.__audience_diff__      || '',
    __location_diff__:      sRow.__location_diff__      || '',
    __location_excl_diff__: sRow.__location_excl_diff__ || '',
    __brand_content_note__: sRow.__brand_content_note__ || '',
    __brand_tier_note__:    sRow.__brand_tier_note__     || '',
});
    }
    return results;
}

// ===== checkAmazon（複数ファイル対応版） =====
function checkAmazon(wbsS, wbsD, system){
    let allSettingData = [];

    // ★ PVA/OTT は専用読み取り関数を使用
    const readFn = (system === 'amazon_pva' || system === 'amazon_ott')
        ? (wb) => readSettingTableVideo(wb, system)
        : readSettingTableDSP;

    wbsS.forEach(({ wb, fileName }) => {
        const rows = readFn(wb);
        rows.forEach(r => r.__FILE_S__ = fileName);
        allSettingData = allSettingData.concat(rows);
    });

    // ★ PVA/OTT は VIDEO LINE ITEMS を読む
    const downloadData = (system === 'amazon_pva' || system === 'amazon_ott')
        ? readDownloadDataVideoMulti(wbsD)
        : readDownloadDataDSPMulti(wbsD);

    return {
        system,
        settingCount:  allSettingData.length,
        downloadCount: Object.keys(downloadData.liMap).length,
        downloadFiles: downloadData.files,
        settingData:   allSettingData,
        downloadData:  downloadData.liMap,
        ioDownloadMap: downloadData.ioDownloadMap,
        items: (system === 'amazon_pva' || system === 'amazon_ott')
            ? matchAndCompareVideo(allSettingData, downloadData.liMap, system)
            : matchAndCompareDSP(allSettingData, downloadData.liMap, system),
    };
}

// ===== 複数ダウンロードデータ読み込み（IO名紐付け） =====
function readDownloadDataDSPMulti(wbsD){
    const liMap = {};
    const files = [];
    const ioDownloadMap = {}; // IO名 → LI名配列

    wbsD.forEach(({ wb, fileName }) => {
        let targetSheet = null, targetHeaderRow = 0, bestScore = 0;
        for(const sname of wb.SheetNames){
            const ws = wb.Sheets[sname];
            if(!ws || !ws['!ref']) continue;
            const rows = XLSX.utils.sheet_to_json(ws,{header:1,defval:'',raw:false}).slice(0,30);
            for(let i=0; i<rows.length; i++){
                const rowStr = rows[i].join(' ');
                let score = 0;
                if(rowStr.includes('Line name'))          score+=5;
                if(rowStr.includes('Line type'))          score+=4;
                if(rowStr.includes('Supply source'))       score+=4;
                if(rowStr.includes('Base supply bid'))     score+=3;
                if(rowStr.includes('Pacing profile'))      score+=3;
                if(rowStr.includes('Audience names'))      score+=3;
                if(rowStr.includes('Awareness'))           score-=10;
                if(rowStr.includes('Consideration'))       score-=10;
                if(sname.includes('DISPLAY LINE ITEMS'))   score+=10;
                if(score>bestScore){ bestScore=score; targetSheet=sname; targetHeaderRow=i; }
            }
        }

        if(!targetSheet || bestScore<5){
            files.push({ fileName, sheet:'（未発見）', liCount:0, lis:[] });
            return;
        }

        const ws = wb.Sheets[targetSheet];
        const allRows = XLSX.utils.sheet_to_json(ws,{header:1,defval:'',raw:false});
        const headers = allRows[targetHeaderRow].map(h=>String(h).trim());
        const liColIdx = headers.findIndex(h=>h.toLowerCase().includes('line name'));
        const orderColIdx = headers.findIndex(h=>
            h.toLowerCase().includes('order name') || h === 'Order name - (READ ONLY)');

        if(liColIdx === -1){
            files.push({ fileName, sheet:targetSheet, liCount:0, lis:[] });
            return;
        }

        // ダウンロードデータのIO名を抽出（Order name列から）
        const junkPattern = /Follow instructions|Choose from|Don't delete|READ ONLY|informational|Use letters|Enter a number|Leave blank|Choose from dropdown/i;
        const fileLis = [];
        let fileIoName = '';

        for(let i=targetHeaderRow+1; i<allRows.length; i++){
            const row = allRows[i];
            const liName = row[liColIdx] ? String(row[liColIdx]).trim() : '';
            if(!liName || junkPattern.test(liName)) continue;

            const obj = { __LI_NAME__: liName };
            headers.forEach((h,idx)=>{ if(h) obj[h] = row[idx]!==undefined ? String(row[idx]).trim() : ''; });

            // Order名からIO名を取得
            if(orderColIdx !== -1 && !fileIoName){
                const orderVal = String(row[orderColIdx]||'').trim();
                if(orderVal && !junkPattern.test(orderVal)) fileIoName = orderVal;
            }

            obj.__IO_NAME_D__ = fileIoName; // ダウンロード側のIO名
            obj.__FILE_D__    = fileName;

            liMap[liName] = obj;
            fileLis.push({ name:liName, status:obj['Active/Inactive']||'' });

            // ioDownloadMapに追加
            if(fileIoName){
                if(!ioDownloadMap[fileIoName]) ioDownloadMap[fileIoName] = [];
                ioDownloadMap[fileIoName].push(liName);
            }
        }

        files.push({ fileName, sheet:targetSheet, liCount:fileLis.length, lis:fileLis, ioName:fileIoName });
    });

    return { liMap, files, ioDownloadMap };
}

// ===== DSP用セグメントsheet解析 =====
function readDSPSegmentSheet(wb) {
    // シート名に「セグメント」を含むものを探す
    const sheetName = wb.SheetNames.find(n =>
        n === 'セグメント' || n.includes('セグメント')
    );
    if (!sheetName) return null;

    const ws = wb.Sheets[sheetName];
    if (!ws || !ws['!ref']) return null;

    const allRows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '', raw: false });

    // LIブロックリスト: [{ liNames:[], groups:[], notItems:[] }, ...]
    const blocks = [];
    let i = 0;

    while (i < allRows.length) {
    const row = allRows[i];
    const bVal = String(row[1] || '').trim();
    const cVal = String(row[2] || '').trim();

    // ★ 対象LI行の判定を明確化
    // 条件: B列が「対象LI」を含む行
    const isLIHeader = bVal === '対象LI' || bVal.includes('対象LI');

    if (!isLIHeader) { i++; continue; }

    // LI名をC列から取得（改行で分割）
    const liNames = cVal.split(/\n|\r\n|\r/)
        .map(s => s.trim())
        .filter(s => s.length > 0);

    if (liNames.length === 0) { i++; continue; }

    i++; // 対象LI行の次へ

    // 表頭行を探す（「セグメント」と「つなぎ方」を含む行）
    let foundHeader = false;
    for (let j = 0; j < 5 && i < allRows.length; j++, i++) {
        const hStr = allRows[i].join(' ');
        if (hStr.includes('セグメント') && hStr.includes('つなぎ方')) {
            foundHeader = true;
            i++; // 表頭行をスキップ
            break;
        }
    }

    if (!foundHeader) continue;

    // データ行を収集
    const groups = {};
    const notItems = [];

    while (i < allRows.length) {
        const dRow = allRows[i];
        const segName = String(dRow[1] || '').trim(); // B列
        const tsunagi = String(dRow[2] || '').trim(); // C列
        const groupVal = String(dRow[4] || '').trim(); // E列

        // 次の対象LIブロック開始を検出
        if (String(dRow[1] || '').trim() === '対象LI' ||
            String(dRow[1] || '').trim().includes('対象LI')) {
            break; // iをインクリメントせずbreak
        }

        // 空行チェック（B/C/E列すべて空）
if (segName === '' && tsunagi === '' && groupVal === '') {
    // ★ 次の非空行を先読みして判断
    let peekIdx = i + 1;
    while (peekIdx < allRows.length) {
        const peekRow = allRows[peekIdx];
        const peekB = String(peekRow[1] || '').trim();
        const peekC = String(peekRow[2] || '').trim();
        const peekE = String(peekRow[4] || '').trim();
        
        // 次のブロック開始（対象LI行）なら終了
        if (peekB === '対象LI' || peekB.includes('対象LI')) {
            i = peekIdx;
            break;
        }
        // 空行でない → まだ同じブロック内（Group間の空行）
        if (peekB !== '' || peekC !== '' || peekE !== '') {
            i = peekIdx; // 空行をスキップして継続
            break;
        }
        peekIdx++;
    }
    // peekIdxがallRows.lengthに達した → ファイル終端
    if (peekIdx >= allRows.length) {
        i = peekIdx;
        break;
    }
    // 次のブロック開始なら外側のwhileへ
    const checkRow = allRows[i];
    const checkB = String(checkRow[1] || '').trim();
    if (checkB === '対象LI' || checkB.includes('対象LI')) break;
    continue; // 同じブロック内→データ収集継続
}

        // 表頭キーワードはスキップ
        const TABLE_HEADERS = ['セグメント','つなぎ方','ステータス',
                               'Group','依頼日','メモ','Daily reach'];
        if (segName !== '' && !TABLE_HEADERS.includes(segName)) {
            if (tsunagi.toLowerCase() === 'not') {
                notItems.push(segName);
            } else {
                const gKey = groupVal || 'Group1';
                if (!groups[gKey]) groups[gKey] = [];
                groups[gKey].push(segName);
            }
        }
        i++;
    }

    // groups → 配列変換（Group1, Group2... の順）
    const groupKeys = Object.keys(groups).sort((a, b) => {
        const na = parseInt(a.replace(/\D/g, '')) || 0;
        const nb = parseInt(b.replace(/\D/g, '')) || 0;
        return na - nb;
    });

    const groupList = groupKeys.map(k => ({
        key: k,
        items: groups[k]
    }));

    blocks.push({ liNames, groups: groupList, notItems });
} return blocks.length > 0 ? blocks : null;
}

// セグメントsheetからLI名でブロックを検索
function findDSPSegmentBlock(blocks, liName) {
    if (!blocks || !blocks.length) return null;
    const liLower = liName.toLowerCase().trim();
    for (const block of blocks) {
        if (block.liNames.some(n => n.toLowerCase().trim() === liLower)) {
            return block;
        }
    }
    // 完全一致がない場合は部分一致
    for (const block of blocks) {
        if (block.liNames.some(n => {
            const nl = n.toLowerCase().trim();
            return nl.includes(liLower) || liLower.includes(nl);
        })) {
            return block;
        }
    }
    return null;
}

// ===== DSP用 KWシート解析 =====
function readKWSheet(wb) {
    const sheetName = wb.SheetNames.find(n =>
        n === 'KW' || n.includes('KW')
    );
    if (!sheetName) return null;
    const ws = wb.Sheets[sheetName];
    if (!ws || !ws['!ref']) return null;
    const allRows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '', raw: false });
    const keywords = [];
    for (const row of allRows) {
        const val = String(row[0] || '').trim();
        if (val && val.length > 0) keywords.push(val);
    }
    return keywords.length > 0 ? keywords : null;
}

// DSPセグメントsheet vs 後台 Audience対比
function compareDSPSegment(block, dlRow) {
    if (!block) return { matched: null, diffs: ['セグメントsheetに対応するLIブロックが見つかりません'] };

    const arVal = dlRow ? (dlRow['Audiences - include'] || '') : '';
    const atVal = dlRow ? (dlRow['Audience names'] || '') : '';

    // ===== AT列: ID → 名前マッピング =====
    const idToName = {};
    if (atVal) {
        for (const item of atVal.split(/[;；\n]/)) {
            const it = item.trim();
            if (!it) continue;
            const m = it.match(/^(.+?)\s*\((\d{5,})\)\s*$/);
            if (m) {
                idToName[m[2].trim()] = _normalizeAudienceName(m[1]);
            }
        }
    }

    // ===== AR列: AND組・NOT構造を解析 =====
    let arMain = arVal;
    const dNotNames = [];

    // NOT部分を抽出
    const notMatch = arVal.match(/\[NOT\s+([^\]]+)\]/i);
    if (notMatch) {
        const notIds = notMatch[1].split(/[;；\s]+/).filter(s => s.trim());
        for (const nid of notIds) {
            const n = nid.trim();
            if (n && idToName[n]) dNotNames.push(idToName[n]);
        }
        arMain = arVal.substring(0, notMatch.index).trim();
    }

    // include部分のAND組を抽出
    const parenGroups = [...arMain.matchAll(/\(([^)]+)\)/g)];
    const dGroups = []; // [[名前, ...], ...]

    for (const pg of parenGroups) {
        const ids = pg[1].split(/[;；\s]+/).filter(s => s.trim());
        const names = [];
        for (const id of ids) {
            const id2 = id.trim();
            if (!id2) continue;
            if (idToName[id2]) {
                names.push(idToName[id2]);
            } else if (/^\d{5,}$/.test(id2)) {
                names.push(`(UnknownID:${id2})`);
            }
        }
        if (names.length > 0) dGroups.push(names);
    }

    const sGroups = block.groups;   // [{ key, items }, ...]
    const sNotItems = block.notItems;

    const diffs = [];
    let allMatch = true;

    // ===== Groupの数を比較 =====
    // NOT以外のsGroupsとdGroupsの数
    const sIncludeCount = sGroups.length;
    const dIncludeCount = dGroups.length;

    if (sIncludeCount !== dIncludeCount) {
    // グループ数が違っても名前チェックで判断するため、falseにしない
    diffs.push(
        `【参考】ANDグループ数が異なります（設定表: ${sIncludeCount} / 後台: ${dIncludeCount}）`
    );
}

    // ===== 各GroupのセグメントをAT列と照合 =====
    // 後台の全名前（NOT以外）
    const dAllIncludeNames = dGroups.flat();

    sGroups.forEach((sGroup, idx) => {
        const missingInD = sGroup.items.filter(sName => {
            const sLower = sName.toLowerCase().trim();
            return !dAllIncludeNames.some(dName => {
                const dLower = dName.toLowerCase().trim();
                return dLower === sLower ||
                    dLower.includes(sLower) ||
                    sLower.includes(dLower);
            });
        });
        if (missingInD.length > 0) {
            allMatch = false;
            diffs.push(
                `【${sGroup.key}】後台に見つからないセグメント:\n  → ${missingInD.join('\n  → ')}`
            );
        }
    });

    // 後台にあって設定表にないもの（UnknownIDを除く）
    const sAllIncludeNames = sGroups.flatMap(g => g.items);
    const onlyInD = dAllIncludeNames.filter(dName => {
        if (dName.startsWith('(UnknownID:')) return false;
        const dLower = dName.toLowerCase().trim();
        return !sAllIncludeNames.some(sName => {
            const sLower = sName.toLowerCase().trim();
            return dLower === sLower ||
                dLower.includes(sLower) ||
                sLower.includes(dLower);
        });
    });
    if (onlyInD.length > 0) {
        allMatch = false;
        diffs.push(
            `【後台にあるが設定表に記載なし】\n  → ${onlyInD.join('\n  → ')}`
        );
    }

    // ===== NOT条件の照合 =====
    const sNotSet = sNotItems.map(n => n.toLowerCase().trim());
    const dNotSet = dNotNames.map(n => n.toLowerCase().trim());

    const onlySNot = sNotItems.filter(sn =>
        !dNotSet.some(dn => dn === sn.toLowerCase().trim() || dn.includes(sn.toLowerCase().trim()))
    );
    const onlyDNot = dNotNames.filter(dn =>
        !sNotSet.some(sn => sn === dn.toLowerCase().trim() || sn.includes(dn.toLowerCase().trim()))
    );

    if (onlySNot.length > 0) {
        allMatch = false;
        diffs.push(`【NOT条件: 設定表にあるが後台未設定】\n  → ${onlySNot.join('\n  → ')}`);
    }
    if (onlyDNot.length > 0) {
        allMatch = false;
        diffs.push(`【NOT条件: 後台にあるが設定表に記載なし】\n  → ${onlyDNot.join('\n  → ')}`);
    }

    return { matched: allMatch, diffs };
}

function readSettingTableDSP(wb){

            product_small:['商材カテゴリ','Product categories'],ssp:['SSP','Supply sources'],
            ssp_owned:['Amazon Owned and Operated'],ssp_pub:['Amazon Publisher Direct'],
            ssp_third:['Third Party Exchanges'],mobile_os:['Mobile OS'],
            device_type:['Device type'],audience:['セグメント','Audience'],

            domain_bl:['Domain'],mobile_app:['Mobile app targeting','Mobile app'],
            daypart:['配信時間帯','Daypart'],viewability_pct:['Viewability'],
            keyword:['Keyword','キーワード'],

        };
        headers.forEach((h,i)=>{

            const hs=hFull.split('\n')[0].replace(/（[^）]*）/g,'').replace(/\([^)]*\)/g,'').trim();
            for(const [key,keywords] of Object.entries(COL_KEYWORDS)){

function _extractIOName(ws){
    const allRows = XLSX.utils.sheet_to_json(ws,{header:1,defval:'',raw:false});
    let orderName='', settingOrderName='';
    for(let i=0; i<Math.min(60,allRows.length); i++){
        const row=allRows[i];
        for(let c=0; c<row.length; c++){
            const cell=String(row[c]||'').trim();
            if(cell.includes('設定Order名')){
                const v=String(row[c+1]||'').trim();
                if(v){ settingOrderName=v; break; }
            }
            if(cell.includes('Order名')&&!cell.includes('設定')&&!orderName){
                const v=String(row[c+1]||'').trim();
                if(v) orderName=v;
            }
        }
        if(settingOrderName) break;
    }
    return settingOrderName || orderName || '';
}

    { key:'Daypart period', ja:'デイパート期間',
  checkFn:(s,v)=>{
    const daypart = (s.daypart||'').trim();
    if(!daypart) return null; // 設定表空 → チェック対象外

    // ===== 設定表 → 5桁コード変換 =====
    const DAY_MAP = {
        'sunday':0,'monday':1,'tuesday':2,'wednesday':3,
        'thursday':4,'friday':5,'saturday':6
    };

    function timeToCode(t, isEnd){
        const s = t.trim().toUpperCase();
        // 12 AM
        if(s === '12 AM'){
            return isEnd ? '24' : '00';
        }
        // 12 PM
        if(s === '12 PM') return '12';
        const m = s.match(/^(\d{1,2})\s*(AM|PM)$/i);
        if(!m) return null;
        let h = parseInt(m[1]);
        const period = m[2].toUpperCase();
        if(period === 'PM' && h !== 12) h += 12;
        if(period === 'AM' && h === 12) h = 0;
        return String(h).padStart(2,'0');
    }

    function settingToCodes(text){
        const codes = new Set();
        // 各行をパース: "Monday: 12 AM - 2 AM, 5 AM - 12 AM"
        const lines = text.split('\n').map(l=>l.trim()).filter(l=>l);
        for(const line of lines){
            // 曜日を取得
            const dayMatch = line.match(/^(\w+)\s*:/i);
            if(!dayMatch) continue;
            const dayName = dayMatch[1].toLowerCase();
            const dayCode = DAY_MAP[dayName];
            if(dayCode === undefined) continue;

            // 時間帯部分を取得
            const timePart = line.substring(line.indexOf(':')+1).trim();
            // カンマで分割
            const segments = timePart.split(',').map(s=>s.trim()).filter(s=>s);
            for(const seg of segments){
                // "12 AM - 2 AM" 形式をパース
                const timeMatch = seg.match(/^(.+?)\s*-\s*(.+)$/);
                if(!timeMatch) continue;
                const startCode = timeToCode(timeMatch[1], false);
                const endCode   = timeToCode(timeMatch[2], true);
                if(startCode === null || endCode === null) continue;
                codes.add(`${startCode}${endCode}${dayCode}`);
            }
        }
        return codes;
    }

    // ===== 下载データをパース =====
    function downloadToCodes(text){
        const codes = new Set();
        text.split(';').map(s=>s.trim()).filter(s=>s).forEach(c=>{
            if(c.length === 5) codes.add(c);
        });
        return codes;
    }

    const sCodes = settingToCodes(daypart);
    const dCodes = downloadToCodes(v||'');

    if(sCodes.size === 0) return null;
    if(dCodes.size === 0) return false; // ❌ 設定表あるのに下载空

    // 比較
    const onlyS = [...sCodes].filter(c => !dCodes.has(c));
    const onlyD = [...dCodes].filter(c => !sCodes.has(c));

        if(sl.includes('全ssp') || sl.includes('all ssp')) sspType = 'all';
        else if(sl.includes('amazon外'))                   sspType = 'off';
        else if(sl.includes('amazon内'))                   sspType = 'on';
    } else {
        if((hasOwned || hasPub) && hasThird) sspType = 'all';
        else if(hasOwned || hasPub)          sspType = 'on';
        else if(hasThird)                    sspType = 'off';

    // ===== Amazon内配信 =====
    if(sspType === 'on'){
